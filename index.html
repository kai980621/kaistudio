<!DOCTYPE html>
<html lang="zh-Hant" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI Studio</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <script src="https://unpkg.com/lunr/lunr.js" defer></script> <!-- For client-side search -->
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
        }
        /* Custom styles for modern look */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ToastUI Editor Dark Mode Tweaks */
        .toastui-editor-defaultUI { border: 0 !important; font-family: 'Noto Sans TC', 'Inter', sans-serif; }
        html.dark .toastui-editor-defaultUI { background-color: #1f2937; /* gray-800 */ }
        html.dark .toastui-editor-md-container, html.dark .toastui-editor-ww-container { background-color: #374151; /* gray-700 */ }
        html.dark .ProseMirror, html.dark .toastui-editor-md-preview { color: #d1d5db; /* gray-300 */ }
        html.dark .toastui-editor-toolbar { background-color: #1f2937; }
        html.dark .toastui-editor-toolbar-icons { background-image: url('https://uicdn.toast.com/editor/latest/dist/theme/dark/toastui-editor-icons.png'); }

        /* Typography styles for article content, compatible with dark mode */
        .prose {
            --tw-prose-body: #374151; --tw-prose-headings: #111827; --tw-prose-links: #4f46e5;
            --tw-prose-pre-bg: #1f2937; --tw-prose-pre-code: #e5e7eb;
        }
        .dark .prose {
            --tw-prose-body: #d1d5db; --tw-prose-headings: #f9fafb; --tw-prose-links: #818cf8;
            --tw-prose-pre-bg: #1f2937; --tw-prose-pre-code: #e5e7eb;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <div class="max-w-screen-xl mx-auto flex">
        
        <!-- Sidebar (Desktop) -->
        <aside class="w-72 sticky top-0 h-screen p-8 border-r border-gray-200 dark:border-gray-700 hidden md:flex flex-col">
            <!-- Site Info -->
            <div class="text-center mb-8">
                <h1 id="site-title-sidebar" class="text-3xl font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer">🌐 KAI STUDIO</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">探索音樂的無限可能。</p>
            </div>

            <!-- Search -->
            <div class="relative mb-6">
                <input type="search" id="search-input" placeholder="搜尋文章..." class="w-full pl-10 pr-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700 border border-transparent focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <!-- Navigation -->
            <nav class="flex-grow space-y-2">
                <a href="#" id="nav-home" class="nav-link active flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <span>🏠</span><span>首頁</span>
                </a>
                <a href="#" id="nav-tags" class="nav-link flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <span>🏷️</span><span>所有標籤</span>
                </a>
                <!-- Admin buttons hidden by default -->
                <a href="#" id="nav-new-article" class="hidden nav-link flex items-center space-x-3 py-2 px-4 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">
                    <span>➕</span><span>新增文章</span>
                </a>
            </nav>

            <!-- Footer & Theme Toggle -->
            <div class="text-center space-y-4">
                <button id="theme-toggle" class="w-full flex justify-center items-center space-x-2 px-4 py-2 rounded-full border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <span id="theme-icon"></span>
                </button>
                <p id="admin-login" class="cursor-pointer text-gray-400 text-xs hover:text-indigo-400">&copy; 2025 KAI's Music Log</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="w-full md:flex-grow p-6 sm:p-12">
            <!-- Mobile Header -->
            <header class="md:hidden flex justify-between items-center mb-8">
                <h1 id="site-title-mobile" class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer">🌐 KAI STUDIO</h1>
                <button id="mobile-menu-button">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </header>
            
            <!-- Home View -->
            <div id="home-view" class="view active">
                 <h2 id="page-title" class="text-3xl font-bold mb-8 border-l-4 border-indigo-500 pl-4">最新文章</h2>
                <div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

            <!-- Single Article View -->
            <div id="article-view" class="view"></div>

            <!-- Tags View -->
            <div id="tags-view" class="view">
                <h2 class="text-3xl font-bold mb-8 border-l-4 border-indigo-500 pl-4">所有標籤</h2>
                <div id="tags-container" class="flex flex-wrap gap-4"></div>
            </div>
        </main>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>
    <div id="mobile-menu" class="fixed top-0 right-0 h-full w-72 bg-white dark:bg-gray-800 z-50 transform translate-x-full transition-transform duration-300 md:hidden p-6">
         <!-- Mobile Nav Content will be injected here -->
    </div>


    <!-- Editor Modal -->
    <div id="editor-overlay" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl w-11/12 max-w-5xl h-[90vh] flex flex-col">
            <!-- Metadata Inputs -->
            <div class="p-4 border-b dark:border-gray-700 space-y-3">
                <input type="text" id="editor-title" class="text-xl font-bold w-full bg-transparent focus:outline-none" placeholder="文章標題...">
                <input type="text" id="editor-cover-image" class="text-sm w-full bg-transparent focus:outline-none" placeholder="封面圖片 URL...">
                <input type="text" id="editor-tags" class="text-sm w-full bg-transparent focus:outline-none" placeholder="標籤 (用逗號分隔)...">
            </div>
            <!-- Editor -->
            <div class="flex-grow p-1 overflow-hidden relative">
                <div id="editor-container" class="h-full"></div>
            </div>
            <!-- Actions -->
            <div class="flex-shrink-0 p-4 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-700 flex justify-between items-center">
                <button id="delete-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">刪除文章</button>
                <div class="space-x-4">
                    <button id="cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition">取消</button>
                    <button id="save-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmation-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl p-6 w-11/12 max-w-sm text-center">
            <h3 id="confirmation-title" class="text-xl font-bold mb-4">確定要刪除嗎？</h3>
            <p id="confirmation-message" class="text-gray-600 dark:text-gray-300 mb-6">這個操作無法復原。</p>
            <div class="flex justify-center space-x-4">
                <button id="confirm-cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-6 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition">取消</button>
                <button id="confirm-action-btn" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600 transition">確定</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, update, increment } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // --- Firebase Config ---
        const firebaseConfig = { 
            apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y", authDomain: "blog-63ad2.firebaseapp.com", projectId: "blog-63ad2", 
            storageBucket: "blog-63ad2.appspot.com", messagingSenderId: "265914768921", 
            appId: "1:265914768921:web:e4c752780e604d0be69488", databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com", 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- State, UI Elements, and Global Variables ---
        let appState = { articles: {}, allTags: new Set(), isEditMode: false, currentArticleId: null, sortedIds: [] };
        let editor;
        let searchIndex;
        let confirmationCallback = null;

        const ui = {
            html: document.documentElement,
            homeView: document.getElementById('home-view'),
            articleView: document.getElementById('article-view'),
            tagsView: document.getElementById('tags-view'),
            articleGrid: document.getElementById('article-grid'),
            tagsContainer: document.getElementById('tags-container'),
            pageTitle: document.getElementById('page-title'),
            // Modals
            editorOverlay: document.getElementById('editor-overlay'),
            editorContainer: document.getElementById('editor-container'),
            editorTitle: document.getElementById('editor-title'),
            editorTags: document.getElementById('editor-tags'),
            editorCoverImage: document.getElementById('editor-cover-image'),
            saveBtn: document.getElementById('save-btn'),
            cancelBtn: document.getElementById('cancel-btn'),
            deleteBtn: document.getElementById('delete-btn'),
            confirmationModal: document.getElementById('confirmation-modal'),
            confirmActionBtn: document.getElementById('confirm-action-btn'),
            confirmCancelBtn: document.getElementById('confirm-cancel-btn'),
            // Navigation
            navLinks: document.querySelectorAll('.nav-link'),
            navHome: document.getElementById('nav-home'),
            navTags: document.getElementById('nav-tags'),
            navNewArticle: document.getElementById('nav-new-article'),
            siteTitles: [document.getElementById('site-title-sidebar'), document.getElementById('site-title-mobile')],
            // Mobile Menu
            mobileMenuButton: document.getElementById('mobile-menu-button'),
            mobileMenuOverlay: document.getElementById('mobile-menu-overlay'),
            mobileMenu: document.getElementById('mobile-menu'),
            // Features
            themeToggle: document.getElementById('theme-toggle'),
            themeIcon: document.getElementById('theme-icon'),
            searchInput: document.getElementById('search-input'),
            adminLogin: document.getElementById('admin-login'),
        };

        // --- HELPERS ---
        const ensureArray = data => Array.isArray(data) ? data : (typeof data === 'string' && data ? data.split(',').map(t => t.trim()) : []);
        const getTagColor = (tag) => {
            let hash = 0; for (let i = 0; i < tag.length; i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${hash % 360}, 70%, 40%)`;
        };
        const formatDate = (dateString) => new Date(dateString).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });

        // --- CORE LOGIC ---
        async function loadInitialData() {
            try {
                const articlesSnap = await get(ref(db, 'blogData/articles'));
                appState.articles = articlesSnap.exists() ? articlesSnap.val() : {};
                appState.sortedIds = Object.keys(appState.articles).sort((a, b) => new Date(appState.articles[b].date) - new Date(appState.articles[a].date));
                
                // Aggregate tags
                appState.allTags.clear();
                Object.values(appState.articles).forEach(article => {
                    ensureArray(article.tags).forEach(tag => appState.allTags.add(tag));
                });

                setupSearch();
                renderArticleGrid();
                renderTagsPage();

            } catch (error) {
                console.error("Data loading failed:", error);
                ui.articleGrid.innerHTML = `<p class="text-red-500 col-span-full">無法載入文章。</p>`;
            }
        }

        function setupSearch() {
            searchIndex = lunr(function () {
                this.ref('id');
                this.field('title', { boost: 10 });
                this.field('tags', { boost: 5 });
                this.field('content');
                
                appState.sortedIds.forEach(id => {
                    const article = appState.articles[id];
                    this.add({ id, title: article.title, tags: ensureArray(article.tags).join(' '), content: article.content });
                });
            });
        }
        
        // --- VIEW RENDERING ---
        function switchView(viewName) {
            ['home-view', 'article-view', 'tags-view'].forEach(id => {
                document.getElementById(id).classList.toggle('active', id === viewName);
            });
            ui.navLinks.forEach(link => link.classList.remove('active', 'bg-gray-200', 'dark:bg-gray-700'));
            if (viewName === 'home-view') ui.navHome.classList.add('active', 'bg-gray-200', 'dark:bg-gray-700');
            if (viewName === 'tags-view') ui.navTags.classList.add('active', 'bg-gray-200', 'dark:bg-gray-700');
            window.scrollTo(0, 0);
        }

        function renderArticleGrid(ids = appState.sortedIds) {
            if (ids.length === 0) {
                ui.articleGrid.innerHTML = `<p class="text-gray-500 col-span-full text-center">找不到相關文章。</p>`;
                return;
            }
            ui.articleGrid.innerHTML = ids.map(id => {
                const article = appState.articles[id];
                if (!article) return '';
                const tagsHtml = ensureArray(article.tags).map(tag => 
                    `<span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full text-white" style="background-color: ${getTagColor(tag)};">${tag}</span>`
                ).join(' ');
                
                return `
                <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden transform hover:-translate-y-1 transition-all duration-300 group" data-id="${id}">
                    <div class="relative">
                         <img src="${article.coverImage || `https://placehold.co/600x400/a78bfa/ffffff?text=${encodeURIComponent(article.title)}`}" alt="${article.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/600x400/cccccc/ffffff?text=Image+Error'">
                         <div class="absolute inset-0 bg-black/20"></div>
                    </div>
                    <div class="p-6 relative">
                        <h3 class="text-xl font-bold mb-2 truncate group-hover:text-indigo-500 dark:group-hover:text-indigo-400 cursor-pointer">${article.title}</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${formatDate(article.date)}</p>
                        <div class="flex flex-wrap gap-2">${tagsHtml}</div>
                        <button class="card-edit-btn absolute top-4 right-4 bg-indigo-500 text-white rounded-full w-8 h-8 ${appState.isEditMode ? 'flex' : 'hidden'} items-center justify-center opacity-80 hover:opacity-100" data-id="${id}">✏️</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function renderArticle(id) {
            appState.currentArticleId = id;
            const article = appState.articles[id];
            if (!article) { switchView('home-view'); return; }

            // Increment view count
            if (!sessionStorage.getItem(`viewed_${id}`)) {
                sessionStorage.setItem(`viewed_${id}`, 'true');
                const newCount = (article.viewCount || 0) + 1;
                await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount });
                article.viewCount = newCount;
            }

            const contentHtml = article.content ? marked.parse(article.content) : '<p>沒有內容</p>';
            ui.articleView.innerHTML = `
            <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-lg shadow-lg">
                <button id="back-to-list-btn" class="text-indigo-600 dark:text-indigo-400 hover:underline mb-6">← 返回列表</button>
                <h1 class="text-3xl md:text-5xl font-bold mb-4">${article.title}</h1>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-gray-500 dark:text-gray-400 mb-6 pb-6 border-b dark:border-gray-600">
                    <span>📅 ${formatDate(article.date)}</span>
                    <span>👁️ ${article.viewCount || 1} 次檢視</span>
                </div>
                ${article.coverImage ? `<img src="${article.coverImage}" class="w-full rounded-lg mb-8 aspect-video object-cover">` : ''}
                <div class="prose dark:prose-invert max-w-none">${contentHtml}</div>
            </div>`;

            if (window.hljs) ui.articleView.querySelectorAll('pre code').forEach(hljs.highlightBlock);
            ui.articleView.querySelector('#back-to-list-btn').addEventListener('click', () => switchView('home-view'));
            switchView('article-view');
        }

        function renderTagsPage() {
            ui.tagsContainer.innerHTML = [...appState.allTags].sort().map(tag => `
                <button class="tag-filter-btn text-white text-sm font-semibold py-2 px-4 rounded-full transition-transform hover:scale-105" style="background-color: ${getTagColor(tag)}" data-tag="${tag}">
                    ${tag}
                </button>
            `).join('');
        }

        // --- EDITOR & DATA MUTATION ---
        function openEditor(id = null) {
            const isNew = !id;
            const article = isNew ? {} : appState.articles[id];
            
            if (!editor) {
                editor = new toastui.Editor({
                    el: ui.editorContainer, height: '100%', initialEditType: 'markdown', previewStyle: 'vertical'
                });
            }
            
            ui.editorTitle.value = article.title || '';
            ui.editorTags.value = ensureArray(article.tags).join(', ');
            ui.editorCoverImage.value = article.coverImage || '';
            editor.setMarkdown(article.content || '在這裡撰寫你的內容...');

            ui.deleteBtn.dataset.id = id;
            ui.saveBtn.dataset.id = id;
            ui.deleteBtn.style.display = isNew ? 'none' : 'block';
            ui.editorOverlay.style.display = 'flex';
        }

        async function saveArticle() {
            const id = ui.saveBtn.dataset.id || `post_${Date.now()}`;
            const articleData = {
                ...appState.articles[id],
                title: ui.editorTitle.value.trim() || `未命名文章`,
                tags: ensureArray(ui.editorTags.value),
                coverImage: ui.editorCoverImage.value.trim(),
                content: editor.getMarkdown(),
                date: appState.articles[id]?.date || new Date().toISOString()
            };

            await set(ref(db, `blogData/articles/${id}`), articleData);
            appState.articles[id] = articleData;
            ui.editorOverlay.style.display = 'none';
            await loadInitialData(); // Reload all data to reflect changes
            if (appState.currentArticleId === id) renderArticle(id);
        }

        function deleteArticle(id) {
            if (!id) return;
            showConfirmation('確定要刪除嗎？', '這個操作無法復原。', async () => {
                await remove(ref(db, `blogData/articles/${id}`));
                delete appState.articles[id];
                ui.editorOverlay.style.display = 'none';
                ui.confirmationModal.style.display = 'none';
                await loadInitialData();
                switchView('home-view');
            });
        }
        
        function showConfirmation(title, message, onConfirm) {
            document.getElementById('confirmation-title').textContent = title;
            document.getElementById('confirmation-message').textContent = message;
            ui.confirmationModal.style.display = 'flex';
            confirmationCallback = onConfirm;
        }

        // --- FEATURES (THEME, ADMIN, MOBILE MENU) ---
        function initTheme() {
            const isDark = localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            ui.html.classList.toggle('dark', isDark);
            ui.themeIcon.textContent = isDark ? '☀️' : '🌙';
        }
        
        function toggleAdminMode(enable) {
            appState.isEditMode = enable;
            ui.navNewArticle.classList.toggle('hidden', !enable);
            renderArticleGrid(); // Re-render to show edit buttons
        }
        
        function toggleMobileMenu(show) {
            if (show) {
                ui.mobileMenuOverlay.classList.remove('hidden');
                ui.mobileMenu.innerHTML = document.querySelector('aside').innerHTML;
                // Use requestAnimationFrame for smooth transition
                requestAnimationFrame(() => ui.mobileMenu.classList.remove('translate-x-full'));
            } else {
                ui.mobileMenuOverlay.classList.add('hidden');
                ui.mobileMenu.classList.add('translate-x-full');
            }
        }

        // --- EVENT LISTENERS ---
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadInitialData();

            // Navigation
            ui.siteTitles.forEach(title => title.addEventListener('click', () => {
                 ui.searchInput.value = '';
                 ui.pageTitle.textContent = "最新文章";
                 renderArticleGrid();
                 switchView('home-view');
            }));
            ui.navHome.addEventListener('click', (e) => { e.preventDefault(); ui.searchInput.value = ''; ui.pageTitle.textContent = "最新文章"; renderArticleGrid(); switchView('home-view'); });
            ui.navTags.addEventListener('click', (e) => { e.preventDefault(); switchView('tags-view'); });
            ui.navNewArticle.addEventListener('click', (e) => { e.preventDefault(); openEditor(); });

            // Article Grid Interaction
            ui.articleGrid.addEventListener('click', e => {
                const card = e.target.closest('[data-id]');
                if (!card) return;
                const id = card.dataset.id;
                if (e.target.closest('.card-edit-btn')) openEditor(id);
                else renderArticle(id);
            });
            
            // Editor Modal
            ui.saveBtn.addEventListener('click', saveArticle);
            ui.cancelBtn.addEventListener('click', () => ui.editorOverlay.style.display = 'none');
            ui.deleteBtn.addEventListener('click', (e) => deleteArticle(e.target.dataset.id));
            
            // Confirmation Modal
            ui.confirmActionBtn.addEventListener('click', () => confirmationCallback && confirmationCallback());
            ui.confirmCancelBtn.addEventListener('click', () => { ui.confirmationModal.style.display = 'none'; confirmationCallback = null; });
            
            // Search
            ui.searchInput.addEventListener('keyup', e => {
                const query = e.target.value.trim();
                if (!query) {
                    ui.pageTitle.textContent = "最新文章";
                    renderArticleGrid();
                    return;
                }
                const results = searchIndex.search(query + '*'); // Add wildcard for partial matches
                const resultIds = results.map(r => r.ref);
                ui.pageTitle.textContent = `搜尋結果: "${query}"`;
                renderArticleGrid(resultIds);
                switchView('home-view');
            });

            // Tag Filtering
            ui.tagsContainer.addEventListener('click', e => {
                if (e.target.classList.contains('tag-filter-btn')) {
                    const tag = e.target.dataset.tag;
                    const filteredIds = appState.sortedIds.filter(id => ensureArray(appState.articles[id].tags).includes(tag));
                    ui.pageTitle.textContent = `標籤: #${tag}`;
                    renderArticleGrid(filteredIds);
                    switchView('home-view');
                }
            });

            // Feature Listeners
            ui.themeToggle.addEventListener('click', () => {
                ui.html.classList.toggle('dark');
                const isDark = ui.html.classList.contains('dark');
                localStorage.theme = isDark ? 'dark' : 'light';
                ui.themeIcon.textContent = isDark ? '☀️' : '🌙';
            });
            
            ui.adminLogin.addEventListener('click', () => {
                const pass = prompt('Admin Password:');
                if (pass === "980621") {
                    toggleAdminMode(true);
                    alert('管理模式已啟用！');
                } else if (pass) {
                    alert('密碼錯誤！');
                }
            });
            
            // Mobile Menu
            ui.mobileMenuButton.addEventListener('click', () => toggleMobileMenu(true));
            ui.mobileMenuOverlay.addEventListener('click', () => toggleMobileMenu(false));
            // Delegate events for the dynamically created mobile menu content
            ui.mobileMenu.addEventListener('click', (e) => {
                const targetId = e.target.closest('[id]')?.id;
                if (targetId) {
                    if (targetId.startsWith('nav-')) {
                        document.getElementById(targetId).click(); // Trigger original nav link
                        toggleMobileMenu(false);
                    } else if (targetId === 'site-title-sidebar') {
                        ui.siteTitles[0].click();
                        toggleMobileMenu(false);
                    } else if (targetId === 'theme-toggle') {
                        ui.themeToggle.click();
                    } else if (targetId === 'admin-login') {
                        ui.adminLogin.click();
                    }
                }
            });
        });
    </script>
</body>
</html>
