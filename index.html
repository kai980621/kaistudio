<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI Studio </title>
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link id="hl-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
    <link id="hl-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <script src="https://unpkg.com/lunr/lunr.js"></script>

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- Base & Fonts --- */
        body { 
            font-family: 'Noto Sans TC', 'Inter', sans-serif; 
            transition: background-color 0.3s, color 0.3s; 
        }
        .view { 
            display: none; 
        }
        .view.active { 
            display: block; 
            animation: fadeIn 0.4s ease; 
        }
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }

        /* --- Scrollbar --- */
        :root { 
            --scrollbar-thumb: #a0aec0; 
            --scrollbar-track: #edf2f7; 
        }
        html.dark { 
            --scrollbar-thumb: #4a5568; 
            --scrollbar-track: #1a202c; 
        }
        ::-webkit-scrollbar { 
            width: 8px; 
            height: 8px; 
        }
        ::-webkit-scrollbar-track { 
            background: var(--scrollbar-track); 
        }
        ::-webkit-scrollbar-thumb { 
            background: var(--scrollbar-thumb); 
            border-radius: 4px; 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: #718096; 
        }
        html.dark ::-webkit-scrollbar-thumb:hover { 
            background: #a0aec0; 
        }
        
        /* --- Toast Notification --- */
        #toast-notification {
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(-20px);
            opacity: 0;
            pointer-events: none;
        }
        #toast-notification.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        
        /* 優化: 卡片懸停效果 */
        .article-card {
            transition: all 0.3s ease;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        /* 優化: 標籤樣式 */
        .tag {
            transition: all 0.2s ease;
        }
        .tag:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        /* 優化: 按鈕樣式 */
        .btn {
            transition: all 0.2s ease;
        }
        .btn:active {
            transform: scale(0.98);
        }
        
        /* 優化: 載入動畫 */
        .loading-spinner {
            border-top-color: #4f46e5;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 antialiased">
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 bg-white dark:bg-gray-800 h-screen p-6 border-r border-gray-200 dark:border-gray-700 fixed top-0 left-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="text-center mb-6">
                <h1 id="site-title-sidebar" class="text-3xl font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer">🌐 KAI STUDIO</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">探索音樂的無限可能。</p>
            </div>
            <div class="relative mb-4">
                <input type="search" id="search-input" placeholder="搜尋文章..." class="w-full pl-10 pr-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700 border-transparent focus:ring-2 focus:ring-indigo-500 outline-none">
                <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="mb-4">
                <label for="sort-order" class="text-xs font-bold uppercase text-gray-500 dark:text-gray-400">排序方式</label>
                <select id="sort-order" class="form-select mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 text-sm">
                    <option value="newest">最新日期</option>
                    <option value="oldest">最舊日期</option>
                    <option value="views">最多觀看</option>

            </div>
            <div class="mb-4">
                <h3 class="text-xs font-bold uppercase text-gray-500 dark:text-gray-400 mb-2">熱門標籤</h3>

            </div>
            <nav class="flex-grow space-y-2">
                <a href="#home" class="nav-link flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700"><span>🏠</span><span>首頁</span></a>
                <a href="#tags" class="nav-link flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700"><span>🏷️</span><span>所有標籤</span></a>
                <a href="#new-article" id="new-article-link" class="hidden nav-link flex items-center space-x-3 py-2 px-4 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700"><span>➕</span><span>新增文章</span></a>
            </nav>

            <div id="admin-toolbar" class="mt-6 space-y-2 hidden">
                 <button id="export-json" class="w-full text-sm py-2 px-3 rounded-md border border-gray-300 dark:border-gray-600">匯出 JSON</button>
                 <label class="w-full text-sm py-2 px-3 rounded-md bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 cursor-pointer text-center">匯入 JSON<input type="file" id="import-json-input" accept="application/json" class="hidden"></label>
            </div>

            <div class="mt-auto pt-6 border-t dark:border-gray-700 space-y-4 text-center">
                 <button id="theme-toggle" class="w-full flex justify-center items-center space-x-2 px-4 py-2 rounded-full border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><span id="theme-icon"></span></button>
                 <p id="copyright-info" class="text-gray-400 text-xs cursor-pointer hover:text-gray-600 dark:hover:text-gray-300">© 2025 KAI Studio. All rights reserved.</p>
            </div>
        </aside>
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

        <!-- Main Content -->
        <main id="main-content" class="w-full transition-all duration-300 ease-in-out md:ml-72">
            <header class="sticky top-0 z-20 bg-gray-100/80 dark:bg-gray-900/80 backdrop-blur-md flex items-center justify-between p-4 md:p-6 border-b dark:border-gray-700">
                <button id="sidebar-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700" aria-label="Toggle Menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 id="header-title" class="text-xl font-bold text-gray-800 dark:text-gray-200 md:hidden">最新文章</h2>
            </header>
            
            <div id="view-container" class="p-6 sm:p-8 lg:p-12">
                <div id="home-view" class="view"><div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div></div>
                <div id="article-view" class="view"></div>
                <div id="tags-view" class="view"></div>
                <div id="editor-view" class="view"></div>
                <div id="loading-view" class="view flex justify-center items-center h-64"><div class="loading-spinner rounded-full h-16 w-16 border-t-2 border-b-2 border-indigo-500"></div></div>

    <!-- Toast Notification Element -->
    <div id="toast-notification" class="fixed top-5 right-5 bg-green-500 text-white py-2 px-4 rounded-lg shadow-md z-50">
        <p id="toast-message"></p>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmation-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center"><div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl p-6 w-11/12 max-w-sm text-center"><h3 id="confirmation-title" class="text-xl font-bold mb-4"></h3><p id="confirmation-message" class="text-gray-600 dark:text-gray-300 mb-6"></p><div class="flex justify-center space-x-4"><button id="confirm-cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-6 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="confirm-action-btn" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">確定</button></div></div></div>

    <script type="module">
        // Firebase Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";
        
        // Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y", 
            authDomain: "blog-63ad2.firebaseapp.com", 
            projectId: "blog-63ad2", 
            storageBucket: "blog-63ad2.appspot.com", 
            messagingSenderId: "265914768921", 
            appId: "1:265914768921:web:e4c752780e604d0be69488", 
            databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com", 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // --- GLOBAL STATE & UI ELEMENTS ---
        const state = { 
            articles: {}, 
            allTags: new Map(), 
            tagColors: {}, 
            isEditMode: false, 
            currentArticleId: null, 
            sortedIds: [], 
            isSidebarOpen: false,
            currentView: 'home-view'
        };
        
        let editor = null;
        let searchIndex = null;
        let confirmationCallback = null;
        let searchDebounceTimer = null;
        let editorIsDirty = false;
        
        // UI 元素快取
        const ui = {
            html: document.documentElement,
            sidebar: document.getElementById('sidebar'),
            mainContent: document.getElementById('main-content'),
            sortOrder: document.getElementById('sort-order'),
            headerTitle: document.getElementById('header-title'),
            confirmationModal: document.getElementById('confirmation-modal'),
            adminToolbar: document.getElementById('admin-toolbar'),
            newArticleLink: document.getElementById('new-article-link'),
            toast: {
                element: document.getElementById('toast-notification'),
                message: document.getElementById('toast-message'),
            },
            views: {
                home: document.getElementById('home-view'),
                article: document.getElementById('article-view'),
                tags: document.getElementById('tags-view'),
                editor: document.getElementById('editor-view'),
                loading: document.getElementById('loading-view')
            }
        };

        // --- 工具函數 ---
        const utils = {
            // 生成雜湊值
            getHash: (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    hash = str.charCodeAt(i) + ((hash << 5) - hash);
                }
                return Math.abs(hash);
            },
            
            // 格式化日期
            formatDate: (dateStr) => {
                return new Date(dateStr).toLocaleDateString('zh-TW', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
            },
            
            // 獲取標籤顏色
            getTagColor: (tag) => {
                return state.tagColors[tag] || `hsl(${utils.getHash(tag) % 360}, 60%, 45%)`;
            },
            
            // 防抖函數
            debounce: (func, delay) => {
                let timeoutId;
                return (...args) => {
                    clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => func.apply(this, args), delay);
                };
            },
            
            // 安全解析 HTML
            sanitizeHTML: (html) => {
                const temp = document.createElement('div');
                temp.textContent = html;
                return temp.innerHTML;
            }
        };

        // --- 核心應用邏輯 ---
        const appLogic = {
            // 載入資料
            async loadData() {
                appUI.switchView('loading-view');
                try {
                    const [articlesSnap, tagColorsSnap] = await Promise.all([
                        get(ref(db, 'blogData/articles')),
                        get(ref(db, 'blogData/tagColors'))
                    ]);
                    
                    state.articles = articlesSnap.exists() ? articlesSnap.val() : {};
                    state.tagColors = tagColorsSnap.exists() ? tagColorsSnap.val() : {};
                    state.sortedIds = Object.keys(state.articles);
                    
                    appLogic.processTags();
                    appLogic.setupSearch();
                    appLogic.sortArticles();
                    
                    appUI.renderPopularTags();
                    
                    // 資料載入完成後處理路由
                    appRouter.handleHashChange();

                } catch (error) { 
                    console.error('資料載入失敗:', error); 
                    appUI.showToast('資料載入失敗', 'error');
                    appUI.switchView('home-view'); 
                }
            },
            
            // 處理標籤
            processTags() {
                state.allTags.clear();
                Object.values(state.articles).forEach(article => {
                    (article.tags || []).forEach(tag => {
                        state.allTags.set(tag, (state.allTags.get(tag) || 0) + 1);
                    });
                });
            },
            
            // 排序文章
            sortArticles() {
                const sortMethod = ui.sortOrder.value;
                state.sortedIds.sort((a, b) => {
                    const artA = state.articles[a];
                    const artB = state.articles[b];
                    
                    if (sortMethod === 'oldest') {
                        return new Date(artA.date) - new Date(artB.date);
                    }
                    if (sortMethod === 'views') {
                        return (artB.viewCount || 0) - (artA.viewCount || 0);
                    }
                    // 預設為最新
                    return new Date(artB.date) - new Date(artA.date);
                });
                
                appUI.renderArticleGrid();
                appUI.updatePageTitle('home-view');
            },
            
            // 設置搜尋索引
            setupSearch() {
                try {
                    searchIndex = lunr(function () {
                        this.ref('id');
                        this.field('title', { boost: 10 });
                        this.field('tags', { boost: 5 });
                        this.field('content');
                        
                        state.sortedIds.forEach(id => {
                            this.add({
                                id,
                                ...state.articles[id],
                                tags: (state.articles[id].tags || []).join(' ')
                            });
                        });
                    });
                } catch (e) {
                    console.warn('lunr 初始化失敗，使用備用搜尋功能', e);
                    searchIndex = null;
                }
            },
            
            // 執行搜尋
            performSearch(query) {
                if (!query.trim()) {
                    appUI.renderArticleGrid();
                    return;
                }
                
                let results = [];
                
                if (searchIndex) {
                    // 使用 lunr 搜尋
                    const searchResults = searchIndex.search(query);
                    results = searchResults.map(result => result.ref);
                } else {
                    // 備用搜尋功能
                    const queryLower = query.toLowerCase();
                    results = state.sortedIds.filter(id => {
                        const article = state.articles[id];
                        return (
                            article.title.toLowerCase().includes(queryLower) ||
                            (article.tags || []).some(tag => tag.toLowerCase().includes(queryLower)) ||
                            (article.content || '').toLowerCase().includes(queryLower)
                        );
                    });
                }
                
                appUI.renderArticleGrid(results);
            }
        };

        // --- UI 渲染與操作 ---
        const appUI = {
            // 切換視圖
            switchView(viewName, data = null) {
                // 隱藏所有視圖
                Object.values(ui.views).forEach(view => {
                    view.classList.remove('active');
                });
                
                // 顯示當前視圖
                ui.views[viewName.replace('-view', '')].classList.add('active');
                state.currentView = viewName;
                
                appUI.updatePageTitle(viewName, data);

                if (viewName === 'editor-view') {
                    appUI.renderEditor(data?.id);
                } else if (editor) {
                    if (editorIsDirty && !confirm('有未儲存的變更，確定要離開嗎？')) {
                        location.hash = `#edit/${document.getElementById('save-btn').dataset.id}`;
                        return;
                    }
                    editor.destroy();
                    editor = null;
                    editorIsDirty = false;
                }
                
                window.scrollTo(0, 0);
            },
            
            // 更新頁面標題
            updatePageTitle(viewName, data) {
                let title = '';
                const sortMethod = ui.sortOrder.value;
                const titleMap = { 
                    newest: '最新文章', 
                    oldest: '最舊文章', 
                    views: '最多觀看文章' 
                };

                switch(viewName) {
                    case 'home-view': 
                        title = data?.title || titleMap[sortMethod] || '最新文章'; 
                        break;
                    case 'tags-view': 
                        title = '所有標籤'; 
                        break;
                    case 'article-view': 
                        title = state.articles[state.currentArticleId]?.title || '文章'; 
                        break;
                    case 'editor-view': 
                        title = data?.id ? '編輯文章' : '新增文章'; 
                        break;
                }
                
                ui.headerTitle.textContent = title;
            },
            
            // 渲染文章網格
            renderArticleGrid(ids = state.sortedIds) {
                const grid = document.getElementById('article-grid');
                
                if (ids.length === 0) {
                    grid.innerHTML = `<p class="text-gray-500 col-span-full text-center py-12">找不到文章。</p>`;
                    return;
                }
                
                grid.innerHTML = ids.map(id => {
                    const article = state.articles[id];
                    if (!article) return '';
                    
                    const tagsHtml = (article.tags || []).map(tag => 
                        `<span class="text-xs font-semibold py-1 px-2 uppercase rounded-full text-white tag" style="background-color: ${utils.getTagColor(tag)};">${tag}</span>`
                    ).join(' ');
                    
                    const cover = article.coverImage || `https://placehold.co/600x400/a78bfa/ffffff?text=${encodeURIComponent(article.title)}`;
                    
                    return `
                        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden article-card group flex flex-col">
                            <div class="relative">
                                <a href="#article/${id}" class="article-link">
                                    <img src="${cover}" alt="${utils.sanitizeHTML(article.title)}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300">
                                </a>
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                <h3 class="text-xl font-bold mb-2 line-clamp-2 group-hover:text-indigo-500 dark:group-hover:text-indigo-400">
                                    <a href="#article/${id}" class="article-link">${utils.sanitizeHTML(article.title)}</a>
                                </h3>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${utils.formatDate(article.date)}</p>
                                <div class="flex flex-wrap gap-2 mt-auto pt-4">${tagsHtml}</div>
                            </div>
                            ${state.isEditMode ? `
                                <a href="#edit/${id}" class="card-edit-btn absolute top-3 right-3 bg-indigo-600 text-white rounded-full w-12 h-12 flex items-center justify-center opacity-80 hover:opacity-100 z-10 transition-opacity" aria-label="編輯文章">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.5L14.732 3.732z"></path>
                                    </svg>
                                </a>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            },
            
            // 渲染熱門標籤
            renderPopularTags() {
                const container = document.getElementById('popular-tags-container');
                const popularTags = [...state.allTags.entries()]
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 7);
                
                container.innerHTML = popularTags.map(([tag]) => 
                    `<a href="#tags/${tag}" class="tag text-xs font-semibold py-1 px-2 rounded-full text-white" style="background-color: ${utils.getTagColor(tag)};" data-tag="${tag}">${tag}</a>`
                ).join('');
            },
            
            // 渲染文章
            async renderArticle(id) {
                state.currentArticleId = id;
                const article = state.articles[id];
                
                if (!article) {
                    appUI.switchView('home-view');
                    return;
                }
                
                // 更新瀏覽次數
                if (!sessionStorage.getItem(`viewed_${id}`)) {
                    sessionStorage.setItem(`viewed_${id}`, 'true');
                    const newCount = (article.viewCount || 0) + 1;
                    
                    try {
                        await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount });
                        article.viewCount = newCount;
                    } catch(e) {
                        console.warn('更新瀏覽次數失敗', e);
                    }
                }
                
                // 預處理內容
                const preprocessed = (article.content || '').replace(/==([^=]+)==/g, '<mark>$1</mark>');
                const contentHtml = marked.parse(preprocessed);
                const view = document.getElementById('article-view');

                const adminControls = state.isEditMode ? `
                    <div class="flex items-center gap-4 mb-6">
                        <a href="#edit/${id}" class="btn bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700">編輯文章</a>
                        <button data-id="${id}" class="delete-article-btn bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-700">刪除文章</button>
                    </div>
                ` : '';

                view.innerHTML = `
                    <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-xl shadow-lg">
                        <a href="#home" class="back-to-list-btn text-indigo-600 dark:text-indigo-400 hover:underline mb-6 inline-block">← 返回列表</a>
                        <h1 class="text-3xl md:text-5xl font-extrabold mb-4 tracking-tight">${utils.sanitizeHTML(article.title)}</h1>
                        <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-gray-500 dark:text-gray-400 mb-6 pb-6 border-b dark:border-gray-600">
                            <span>📅 ${utils.formatDate(article.date)}</span>
                            <span>👁️ ${article.viewCount || 1} 次檢視</span>
                        </div>
                        ${adminControls}
                        ${article.coverImage ? `
                            <img src="${article.coverImage}" alt="${utils.sanitizeHTML(article.title)}" class="w-full rounded-lg mb-8 aspect-video object-cover shadow-sm">
                        ` : ''}
                        <div class="prose dark:prose-invert max-w-none">${contentHtml}</div>
                    </div>
                `;
                
                // 代碼高亮
                if (window.hljs) {
                    view.querySelectorAll('pre code').forEach(el => {
                        hljs.highlightElement(el);
                    });
                }
                
                appUI.switchView('article-view');
            },
            
            // 渲染所有標籤頁面
            renderAllTagsPage() {
                const container = document.getElementById('tags-view');
                const sortedTags = [...state.allTags.entries()].sort((a, b) => b[1] - a[1]);
                
                container.innerHTML = `
                    <div class="flex flex-wrap gap-4">
                        ${sortedTags.map(([tag, count]) => `
                            <a href="#tags/${tag}" class="tag text-white font-semibold py-2 px-4 rounded-full transition-transform hover:scale-105" style="background-color: ${utils.getTagColor(tag)};" data-tag="${tag}">
                                ${tag} <span class="ml-2 text-xs opacity-75">${count}</span>
                            </a>
                        `).join('')}
                    </div>
                `;
                
                appUI.switchView('tags-view');
            },
            
            // 渲染編輯器
            renderEditor(id = null) {
                const editorView = document.getElementById('editor-view');
                const article = id ? state.articles[id] : null;
                
                editorView.innerHTML = `
                    <div class="max-w-7xl mx-auto">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                            <h2 class="text-2xl font-bold">${id ? '編輯文章' : '新增文章'}</h2>
                            <div class="flex items-center gap-2 w-full sm:w-auto">
                                <span id="dirty-indicator" class="text-sm text-gray-500 mr-auto"></span>
                                <a href="#home" class="btn bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded-lg hover:bg-gray-300">返回</a>
                                <button id="save-btn" data-id="${id || ''}" class="btn bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">儲存</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div class="lg:col-span-1 space-y-6 bg-white dark:bg-gray-800 p-6 rounded-xl shadow-lg h-fit">
                                <div>
                                    <label for="editor-title" class="block text-sm font-medium">標題</label>
                                    <input type="text" id="editor-title" value="${article ? utils.sanitizeHTML(article.title) : ''}" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600">
                                </div>
                                <div>
                                    <label for="editor-date" class="block text-sm font-medium">發布日期</label>
                                    <input type="date" id="editor-date" value="${article ? article.date.split('T')[0] : new Date().toISOString().split('T')[0]}" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium">標籤</label>
                                    <div id="tags-input-container" class="form-input mt-1 flex flex-wrap gap-2 items-center dark:bg-gray-700 dark:border-gray-600">
                                        <input type="text" id="tags-input" class="flex-grow bg-transparent border-none focus:ring-0 p-0" placeholder="輸入後按 Enter...">
                                    </div>
                                </div>
                                <div id="tag-color-editor" class="space-y-4 pt-2"></div>
                                <div>
                                    <label class="block text-sm font-medium">封面圖片</label>
                                    <div class="mt-1">
                                        <img id="cover-preview" class="w-full aspect-video object-cover rounded bg-gray-200 dark:bg-gray-700 ${article && article.coverImage ? '' : 'hidden'} mb-2">
                                        <input type="text" id="editor-cover-image-url" value="${article ? article.coverImage : ''}" class="form-input w-full mb-2 dark:bg-gray-700 dark:border-gray-600" placeholder="貼上 URL 或上傳">
                                        <label for="cover-upload" class="cursor-pointer bg-gray-500 text-white text-center py-2 px-4 rounded-md hover:bg-gray-600 w-full inline-block">上傳圖片</label>
                                        <input type="file" id="cover-upload" class="hidden" accept="image/*">
                                        <div id="upload-progress-container" class="w-full bg-gray-200 rounded-full h-2.5 mt-2 hidden">
                                            <div id="upload-progress-bar" class="bg-indigo-600 h-2.5 rounded-full" style="width: 0%"></div>
                                        </div>
                                    </div>
                                </div>
                                ${id ? `
                                    <div class="border-t dark:border-gray-600 pt-6">
                                        <button id="delete-btn" data-id="${id}" class="btn w-full bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">刪除這篇文章</button>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="lg:col-span-2 bg-white dark:bg-gray-800 rounded-xl shadow-lg min-h-[600px]">
                                <div id="editor-container" class="h-full"></div>
                            </div>
                        </div>
                    </div>
                `;
                
                // 初始化編輯器
                if (editor) {
                    editor.destroy();
                }
                
                editor = new toastui.Editor({
                    el: document.getElementById('editor-container'),
                    height: '100%',
                    initialEditType: 'markdown',
                    previewStyle: 'vertical',
                    theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light'
                });
                
                // 設置內容
                if (article) {
                    editor.setMarkdown(article.content || '');
                    
                    // 添加現有標籤
                    (article.tags || []).forEach(tag => {
                        appUI.createTagPill(tag);
                    });
                } else {
                    editor.setMarkdown("> [!NOTE] 這是一個提示框。\n\n一般文字可以用 `==` 來 ==高亮== 顯示。");
                }
                
                // 更新預覽圖
                if (article && article.coverImage) {
                    appUI.updateCoverPreview(article.coverImage);
                }
                
                // 渲染標籤顏色編輯器
                appUI.renderTagColorEditors(appUI.getTagsFromEditor());
                
                // 設置編輯器事件
                editor.on('change', () => {
                    appUI.setEditorDirty(true);
                });
                
                appUI.setEditorDirty(false);
            },
            
            // 設置編輯器髒狀態
            setEditorDirty(isDirty) {
                editorIsDirty = isDirty;
                const indicator = document.getElementById('dirty-indicator');
                if (indicator) {
                    indicator.textContent = isDirty ? '有未儲存的變更' : '';
                }
            },
            
            // 從編輯器獲取標籤
            getTagsFromEditor() {
                const tagElements = document.querySelectorAll('.tag-pill');
                return Array.from(tagElements).map(el => el.dataset.tag);
            },
            
            // 創建標籤藥丸
            createTagPill(tag) {
                const container = document.getElementById('tags-input-container');
                const existingTags = appUI.getTagsFromEditor();
                
                if (existingTags.includes(tag)) return;
                
                const tagEl = document.createElement('div');
                tagEl.className = 'tag-pill inline-flex items-center bg-indigo-100 dark:bg-indigo-900 text-indigo-800 dark:text-indigo-100 text-sm px-3 py-1 rounded-full';
                tagEl.dataset.tag = tag;
                tagEl.innerHTML = `
                    ${tag}
                    <button type="button" class="ml-2 text-indigo-500 hover:text-indigo-700" aria-label="移除標籤">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                `;
                
                container.insertBefore(tagEl, document.getElementById('tags-input'));
                appUI.setEditorDirty(true);
            },
            
            // 渲染標籤顏色編輯器
            renderTagColorEditors(tags) {
                const container = document.getElementById('tag-color-editor');
                container.innerHTML = '';
                
                if (tags.length === 0) return;
                
                const title = document.createElement('h4');
                title.className = 'text-sm font-medium';
                title.textContent = '標籤顏色';
                container.appendChild(title);
                
                tags.forEach(tag => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'flex items-center justify-between';
                    
                    const label = document.createElement('span');
                    label.className = 'text-sm';
                    label.textContent = tag;
                    
                    const input = document.createElement('input');
                    input.type = 'color';
                    input.dataset.tag = tag;
                    input.value = utils.getTagColor(tag);
                    input.className = 'w-8 h-8 cursor-pointer';
                    
                    wrapper.appendChild(label);
                    wrapper.appendChild(input);
                    container.appendChild(wrapper);
                });
            },
            
            // 更新封面預覽
            updateCoverPreview(url) {
                const preview = document.getElementById('cover-preview');
                if (!preview) return;
                
                if (url) {
                    preview.src = url;
                    preview.classList.remove('hidden');
                } else {
                    preview.classList.add('hidden');
                }
            },
            
            // 上傳封面圖片
            async uploadCoverImage(file, id) {
                return new Promise((resolve, reject) => {
                    const storagePath = `covers/${id}_${file.name}`;
                    const uploadRef = storageRef(storage, storagePath);
                    const uploadTask = uploadBytesResumable(uploadRef, file);
                    
                    const progressContainer = document.getElementById('upload-progress-container');
                    const progressBar = document.getElementById('upload-progress-bar');
                    
                    progressContainer.classList.remove('hidden');
                    
                    uploadTask.on('state_changed',
                        (snapshot) => {
                            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                            progressBar.style.width = progress + '%';
                        },
                        (error) => {
                            progressContainer.classList.add('hidden');
                            reject(error);
                        },
                        async () => {
                            progressContainer.classList.add('hidden');
                            try {
                                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                                resolve(downloadURL);
                            } catch (error) {
                                reject(error);
                            }
                        }
                    );
                });
            },
            
            // 儲存文章
            async saveArticle() {
                const saveBtn = document.getElementById('save-btn');
                const id = saveBtn.dataset.id || `post_${Date.now()}`;
                
                saveBtn.disabled = true;
                saveBtn.textContent = '儲存中...';
                
                let coverImageUrl = document.getElementById('editor-cover-image-url').value.trim();
                const file = document.getElementById('cover-upload').files[0];
                
                // 上傳圖片
                if (file) {
                    try {
                        coverImageUrl = await appUI.uploadCoverImage(file, id);
                    } catch (error) {
                        appUI.showToast('圖片上傳失敗!', 'error');
                        console.error(error);
                        saveBtn.disabled = false;
                        saveBtn.textContent = '儲存';
                        return;
                    }
                }
                
                // 準備文章資料
                const articleData = {
                    title: document.getElementById('editor-title').value.trim() || '未命名文章',
                    date: new Date(document.getElementById('editor-date').value).toISOString(),
                    tags: appUI.getTagsFromEditor(),
                    coverImage: coverImageUrl,
                    content: editor.getMarkdown(),
                    viewCount: (state.articles[id]?.viewCount) || 0
                };
                
                // 儲存到資料庫
                try {
                    await set(ref(db, `blogData/articles/${id}`), articleData);
                } catch(e) {
                    appUI.showToast('儲存失敗', 'error');
                    console.error(e);
                    saveBtn.disabled = false;
                    saveBtn.textContent = '儲存';
                    return;
                }
                
                // 更新標籤顏色
                const newColors = {};
                document.querySelectorAll('#tag-color-editor input[type="color"]').forEach(input => {
                    newColors[input.dataset.tag] = input.value;
                });
                
                try {
                    await update(ref(db, 'blogData/tagColors'), newColors);
                } catch (e) {
                    console.warn('更新標籤顏色失敗', e);
                }
                
                appUI.setEditorDirty(false);
                appUI.showToast('文章已儲存');
                saveBtn.disabled = false;
                saveBtn.textContent = '儲存';
                
                // 重新載入資料
                await appLogic.loadData();
            },
            
            // 刪除文章
            async deleteArticle(id) {
                if (!id || !state.articles[id]) return;
                
                appUI.showConfirmation(
                    `確定刪除 "${state.articles[id].title}"?`, 
                    '此操作無法復原。', 
                    async () => {
                        try {
                            await remove(ref(db, `blogData/articles/${id}`));
                            ui.confirmationModal.style.display = 'none';
                            appUI.showToast('文章已刪除');
                            await appLogic.loadData();
                            location.hash = '#home';
                        } catch (error) {
                            console.error('刪除文章失敗', error);
                            appUI.showToast('刪除失敗', 'error');
                        }
                    }
                );
            },
            
            // 切換側邊欄
            toggleSidebar(forceState) {
                const shouldBeOpen = typeof forceState === 'boolean' ? forceState : !state.isSidebarOpen;
                state.isSidebarOpen = shouldBeOpen;
                
                ui.sidebar.classList.toggle('-translate-x-full', !shouldBeOpen);
                document.getElementById('sidebar-backdrop').classList.toggle('hidden', !shouldBeOpen);
                
                if (window.innerWidth < 768) {
                    document.body.classList.toggle('overflow-hidden', shouldBeOpen);
                }
            },
            
            // 更新主題
            updateTheme(isDark) {
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                ui.html.classList.toggle('dark', isDark);
                document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
                
                document.getElementById('hl-light').disabled = isDark;
                document.getElementById('hl-dark').disabled = !isDark;
                
                if (editor) {
                    editor.setTheme(isDark ? 'dark' : 'light');
                }
            },
            
            // 切換管理模式
            toggleAdminMode(enable) {
                state.isEditMode = enable;
                ui.newArticleLink.classList.toggle('hidden', !enable);
                ui.adminToolbar.classList.toggle('hidden', !enable);
                
                appUI.showToast(enable ? '管理模式已啟用' : '已退出管理模式');
                
                // 重新渲染當前視圖以顯示/隱藏管理控制項
                appRouter.handleHashChange();
            },
            
            // 顯示確認對話框
            showConfirmation(title, message, onConfirm) {
                document.getElementById('confirmation-title').textContent = title;
                document.getElementById('confirmation-message').textContent = message;
                ui.confirmationModal.style.display = 'flex';
                confirmationCallback = onConfirm;
            },
            
            // 顯示提示訊息
            showToast(message, type = 'success') {
                ui.toast.message.textContent = message;
                
                if (type === 'error') {
                    ui.toast.element.classList.remove('bg-green-500');
                    ui.toast.element.classList.add('bg-red-500');
                } else {
                    ui.toast.element.classList.remove('bg-red-500');
                    ui.toast.element.classList.add('bg-green-500');
                }
                
                ui.toast.element.classList.add('show');
                
                setTimeout(() => {
                    ui.toast.element.classList.remove('show');
                }, 3000);
            }
        };

        // --- 路由處理 ---
        const appRouter = {
            // 處理 hash 變化
            handleHashChange() {
                if (editorIsDirty) {
                    if (!confirm('有未儲存的變更，確定要離開嗎？')) {
                        return;
                    }
                    editorIsDirty = false;
                }
                
                const hash = location.hash || '#home';
                
                if (hash.startsWith('#article/')) {
                    const id = hash.substring(9);
                    appUI.renderArticle(id);
                } else if (hash.startsWith('#tags/')) {
                    const tag = decodeURIComponent(hash.substring(6));
                    const ids = state.sortedIds.filter(id => 
                        (state.articles[id].tags || []).includes(tag)
                    );
                    appUI.renderArticleGrid(ids);
                    appUI.switchView('home-view', { title: `標籤: #${tag}` });
                } else if (hash === '#tags') {
                    appUI.renderAllTagsPage();
                } else if (hash === '#new-article' && state.isEditMode) {
                    appUI.switchView('editor-view', { id: null });
                } else if (hash.startsWith('#edit/') && state.isEditMode) {
                    const id = hash.substring(6);
                    appUI.switchView('editor-view', { id });
                } else {
                    appLogic.sortArticles();
                    appUI.switchView('home-view');
                }
            }
        };

        // --- 事件處理 ---
        const eventHandlers = {
            // 初始化事件監聽器
            init() {
                // 主題初始化
                appUI.updateTheme(ui.html.classList.contains('dark'));
                
                // 載入資料
                appLogic.loadData();
                
                // hashchange 事件
                window.addEventListener('hashchange', () => {
                    appRouter.handleHashChange();
                });
                
                // 點擊事件委派
                document.body.addEventListener('click', (e) => {
                    const target = e.target;
                    const closest = (sel) => target.closest(sel);
                    
                    // 導航連結
                    const navLink = closest('a.nav-link');
                    if (navLink) {
                        e.preventDefault();
                        location.hash = navLink.getAttribute('href');
                        if (window.innerWidth < 768) {
                            appUI.toggleSidebar(false);
                        }
                        return;
                    }
                    
                    // 文章連結
                    const articleLink = closest('a.article-link');
                    if (articleLink) {
                        e.preventDefault();
                        location.hash = articleLink.getAttribute('href');
                        return;
                    }
                    
                    // 側邊欄切換
                    if (closest('#sidebar-toggle')) {
                        appUI.toggleSidebar();
                        return;
                    }
                    
                    // 側邊欄背景點擊
                    if (closest('#sidebar-backdrop')) {
                        appUI.toggleSidebar(false);
                        return;
                    }
                    
                    // 網站標題點擊
                    if (closest('#site-title-sidebar')) {
                        document.getElementById('search-input').value = '';
                        location.hash = '#home';
                        return;
                    }
                    
                    // 標籤過濾按鈕
                    const tagFilterBtn = closest('.tag-filter-btn');
                    if (tagFilterBtn) {
                        e.preventDefault();
                        location.hash = tagFilterBtn.getAttribute('href');
                        return;
                    }
                    
                    // 主題切換
                    if (closest('#theme-toggle')) {
                        appUI.updateTheme(!ui.html.classList.contains('dark'));
                        return;
                    }
                    
                    // 版權資訊點擊 (管理模式切換)
                    if (closest('#copyright-info')) {
                        const p = prompt('請輸入管理密碼:');
                        if (p === "980621") {
                            appUI.toggleAdminMode(!state.isEditMode);
                        } else if (p) {
                            alert('密碼錯誤！');
                        }
                        return;
                    }
                    
                    // 儲存按鈕
                    if (closest('#save-btn')) {
                        appUI.saveArticle();
                        return;
                    }
                    
                    // 刪除按鈕
                    if (closest('#delete-btn')) {
                        appUI.deleteArticle(closest('#delete-btn').dataset.id);
                        return;
                    }
                    
                    // 刪除文章按鈕
                    if (closest('.delete-article-btn')) {
                        appUI.deleteArticle(closest('.delete-article-btn').dataset.id);
                        return;
                    }
                    
                    // 標籤藥丸刪除按鈕
                    if (closest('.tag-pill button')) {
                        closest('.tag-pill').remove();
                        appUI.setEditorDirty(true);
                        appUI.renderTagColorEditors(appUI.getTagsFromEditor());
                        return;
                    }
                    
                    // 確認對話框按鈕
                    if (closest('#confirm-action-btn')) {
                        if (confirmationCallback) {
                            confirmationCallback();
                        }
                        return;
                    }
                    
                    if (closest('#confirm-cancel-btn')) {
                        ui.confirmationModal.style.display = 'none';
                        return;
                    }
                });
                
                // 輸入事件
                document.body.addEventListener('input', (e) => {
                    if (e.target.closest('#editor-view')) {
                        if (e.target.id === 'editor-cover-image-url') {
                            appUI.updateCoverPreview(e.target.value);
                        }
                        appUI.setEditorDirty(true);
                    }
                });
                
                // 變更事件
                document.body.addEventListener('change', (e) => {
                    if (e.target.id === 'cover-upload') {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                appUI.updateCoverPreview(ev.target.result);
                            };
                            reader.readAsDataURL(file);
                            appUI.setEditorDirty(true);
                        }
                    }
                });
                
                // 鍵盤事件
                document.body.addEventListener('keydown', (e) => {
                    if (e.target.id === 'tags-input' && (e.key === 'Enter' || e.key === ',')) {
                        e.preventDefault();
                        if (e.target.value) {
                            appUI.createTagPill(e.target.value);
                            e.target.value = '';
                        }
                        appUI.setEditorDirty(true);
                    }
                });
                
                // 排序選擇事件
                ui.sortOrder.addEventListener('change', () => {
                    appLogic.sortArticles();
                });
                
                // 搜尋輸入事件 (防抖)
                document.getElementById('search-input').addEventListener('input', 
                    utils.debounce((e) => {
                        appLogic.performSearch(e.target.value);
                    }, 300)
                );
                
                // 離開頁面前確認
                window.addEventListener('beforeunload', (e) => {
                    if (editorIsDirty) {
                        e.preventDefault();
                        e.returnValue = '';
                    }
                });
            }
        };

        // 初始化應用
        document.addEventListener('DOMContentLoaded', () => {
            eventHandlers.init();
        });
    </script>
</body>
</html>
