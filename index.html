        body { font-family: 'Noto Sans TC', 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }

<div id="confirmation-modal" class="fixed inset-0 bg-black/60 z-[60] hidden items-center justify-center"><div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl p-6 w-11/12 max-w-sm text-center"><h3 id="confirmation-title" class="text-xl font-bold mb-4"></h3><p id="confirmation-message" class="text-gray-600 dark:text-gray-300 mb-6"></p><div class="flex justify-center space-x-4"><button id="confirm-cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-6 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="confirm-action-btn" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">確定</button></div></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

    const firebaseConfig = { apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y", authDomain: "blog-63ad2.firebaseapp.com", projectId: "blog-63ad2", storageBucket: "blog-63ad2.appspot.com", messagingSenderId: "265914768921", appId: "1:265914768921:web:e4c752780e604d0be69488", databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com", };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    let appState = { articles: {}, allTags: new Map(), tagColors: {}, isEditMode: false, currentArticleId: null, sortedIds: [], isSidebarOpen: false };
    let editor; let searchIndex; let confirmationCallback = null; let searchDebounceTimer = null; let editorIsDirty = false;

    const ui = {
        editorOverlay: document.getElementById('editor-overlay'),
        confirmationModal: document.getElementById('confirmation-modal'),
        adminToolbar: document.getElementById('admin-toolbar'),
        newArticleLink: document.getElementById('new-article-link'),
        sortOrder: document.getElementById('sort-order'),
        pageTitle: document.getElementById('page-title'),
        popularTagsContainer: document.getElementById('popular-tags-container'),
        editor: {
            title: document.getElementById('editor-title'),
            date: document.getElementById('editor-date'),
            tagsInput: document.getElementById('tags-input'),
            tagsContainer: document.getElementById('tags-input-container'),
            coverUrl: document.getElementById('editor-cover-image-url'),
            coverUpload: document.getElementById('cover-upload'),
            coverPreview: document.getElementById('cover-preview'),
            uploadProgressContainer: document.getElementById('upload-progress-container'),
            uploadProgressBar: document.getElementById('upload-progress-bar'),
            container: document.getElementById('editor-container'),
            saveBtn: document.getElementById('save-btn'),
            cancelBtn: document.getElementById('cancel-btn'),
            deleteBtn: document.getElementById('delete-btn')
        },
        tagColorEditor: document.getElementById('tag-color-editor')
    };

    const getHash = str => { let h = 0; for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h); return Math.abs(h); };
    const formatDate = dateStr => new Date(dateStr).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
    const getTagColor = tag => appState.tagColors[tag] || `hsl(${getHash(tag) % 360}, 60%, 45%)`;

    async function loadData() {
        switchView('loading-view');
        try {
            const [articlesSnap, tagColorsSnap] = await Promise.all([
                get(ref(db, 'blogData/articles')),
                get(ref(db, 'blogData/tagColors'))
            ]);
            appState.articles = articlesSnap.exists() ? articlesSnap.val() : {};
            appState.tagColors = tagColorsSnap.exists() ? tagColorsSnap.val() : {};
            appState.sortedIds = Object.keys(appState.articles);
            processTags();
            setupSearch();
            sortArticles();
            renderPopularTags();
            switchView('home-view');
        } catch (error) {
            console.error('Data loading failed:', error);
            document.getElementById('article-grid').innerHTML = `<p class="text-red-500 col-span-full text-center">無法載入文章。</p>`;
            switchView('home-view');
        }
    }

    function processTags() {
        appState.allTags.clear();
        Object.values(appState.articles).forEach(a => (a.tags || []).forEach(t => appState.allTags.set(t, (appState.allTags.get(t) || 0) + 1)));
    }

    function sortArticles() {
        const sortMethod = ui.sortOrder.value;
        appState.sortedIds.sort((a, b) => {
            const artA = appState.articles[a], artB = appState.articles[b];
            if (sortMethod === 'oldest') return new Date(artA.date) - new Date(artB.date);
            if (sortMethod === 'views') return (artB.viewCount || 0) - (artA.viewCount || 0);
            return new Date(artB.date) - new Date(artA.date);
        });
        ui.pageTitle.textContent = { newest: '最新文章', oldest: '最舊文章', views: '最多觀看文章' }[sortMethod] || '最新文章';
        renderArticleGrid();
    }

    function setupSearch() {
        searchIndex = lunr(function () { this.ref('id'); this.field('title', { boost: 10 }); this.field('content'); this.field('tags', { boost: 5 }); Object.values(appState.articles).forEach(doc => this.add({ ...doc, tags: (doc.tags || []).join(' ') })); });
    }

    function renderArticleGrid(ids = appState.sortedIds) {
        const grid = document.getElementById('article-grid');
        grid.innerHTML = ids.length === 0 ? `<p class="text-gray-500 col-span-full text-center">找不到文章。</p>` : ids.map(id => {
            const article = appState.articles[id]; if (!article) return '';
            const tagsHtml = (article.tags || []).map(tag => `<span class="text-xs font-semibold py-1 px-2 uppercase rounded-full text-white" style="background-color: ${getTagColor(tag)};">${tag}</span>`).join(' ');
            const cover = article.coverImage || `https://placehold.co/600x400/a78bfa/ffffff?text=${encodeURIComponent(article.title)}`;
            // FIX: Removed truncate and added min-height to allow multi-line titles while keeping card alignment
            return `<div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transform hover:-translate-y-2 transition-all duration-300 group flex flex-col" data-id="${id}"><div class="relative"><img src="${cover}" alt="${article.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"></div><div class="p-6 relative flex-grow flex flex-col"><div class="min-h-[64px] mb-2"><h3 class="text-lg font-bold group-hover:text-indigo-500 dark:group-hover:text-indigo-400 cursor-pointer">${article.title}</h3></div><p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${formatDate(article.date)}</p><div class="flex flex-wrap gap-2 mt-auto">${tagsHtml}</div>${appState.isEditMode ? `<button class="card-edit-btn absolute top-4 right-4 bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center opacity-80 hover:opacity-100" data-id="${id}">✏️</button>` : ''}</div></div>`;
        }).join('');
    }

    async function renderArticle(id) {
        appState.currentArticleId = id;
        const article = appState.articles[id]; if (!article) { switchView('home-view'); return; }
        if (!sessionStorage.getItem(`viewed_${id}`)) {
            sessionStorage.setItem(`viewed_${id}`, 'true');
            const newCount = (article.viewCount || 0) + 1;
            await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount }).catch(e => console.warn('Failed to update view count', e));
            article.viewCount = newCount;
        }
        const contentHtml = marked.parse((article.content || '').replace(/==([^=]+)==/g, '<mark>$1</mark>'));
        const view = document.getElementById('article-view');
        view.innerHTML = `<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-xl shadow-md"><button class="back-to-list-btn text-indigo-600 dark:text-indigo-400 hover:underline mb-6">← 返回列表</button><h1 class="text-3xl md:text-5xl font-bold mb-4">${article.title}</h1><div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-gray-500 dark:text-gray-400 mb-6 pb-6 border-b dark:border-gray-600"><span>📅 ${formatDate(article.date)}</span><span>👁️ ${article.viewCount || 1} 次檢視</span></div>${article.coverImage ? `<img src="${article.coverImage}" class="w-full rounded-lg mb-8 aspect-video object-cover shadow-sm">` : ''}<div class="prose dark:prose-invert max-w-none">${contentHtml}</div></div>`;
        view.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        switchView('article-view');
    }

    function renderAllTagsPage() {
        const sortedTags = [...appState.allTags.entries()].sort((a, b) => b[1] - a[1]);
        document.getElementById('tags-container').innerHTML = sortedTags.map(([tag, count]) => `<button class="tag-filter-btn text-white font-semibold py-2 px-4 rounded-full transition-transform hover:scale-105" style="background-color: ${getTagColor(tag)};" data-tag="${tag}">${tag} <span class="ml-2 text-xs opacity-75">${count}</span></button>`).join('');
    }

    function renderPopularTags() {
        const sortedTags = [...appState.allTags.entries()].sort((a, b) => b[1] - a[1]).slice(0, 7);
        ui.popularTagsContainer.innerHTML = sortedTags.map(([tag]) => `<button class="tag-filter-btn text-xs font-semibold py-1 px-2 rounded-full text-white" style="background-color: ${getTagColor(tag)};" data-tag="${tag}">${tag}</button>`).join('');
    }

    function openEditor(id = null) {
        if (editor) editor.destroy();
        editor = new toastui.Editor({
            el: ui.editor.container,
            height: '100%',
            initialEditType: 'markdown',
            previewStyle: window.innerWidth < 768 ? 'tab' : 'vertical',
            theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light',
            toolbarItems: [['heading', 'bold', 'italic'], ['hr', 'quote'], ['ul', 'ol', 'task'], ['table', 'image', 'link'], ['code', 'codeblock']]
        });
        editor.on('change', () => setEditorDirty(true));
        resetEditorForm();
        const article = id ? appState.articles[id] : null;
        if (article) {
            ui.editor.title.value = article.title || '';
            ui.editor.date.value = article.date ? article.date.split('T')[0] : '';
            ui.editor.coverUrl.value = article.coverImage || '';
            updateCoverPreview(article.coverImage);
            (article.tags || []).forEach(createTagPill);
            editor.setMarkdown(article.content || '');
            ui.editor.saveBtn.dataset.id = id;
            setEditorDirty(false);
        } else {
            ui.editor.date.value = new Date().toISOString().split('T')[0];
            delete ui.editor.saveBtn.dataset.id;
            setEditorDirty(true);
        }
        renderTagColorEditors(getTagsFromEditor());
        ui.editor.deleteBtn.dataset.id = id;
        ui.editor.deleteBtn.style.display = id ? 'block' : 'none';
        ui.editorOverlay.style.display = 'flex';
        document.body.classList.add('overflow-hidden');
    }
    
    function closeEditor() {
        if (editorIsDirty && !confirm('有未儲存的變更，確定要離開嗎？')) return;
        ui.editorOverlay.style.display = 'none';
        document.body.classList.remove('overflow-hidden');
        setEditorDirty(false);
    }

    async function saveArticle() {
        // FIX: Reliable ID generation for new posts
        const isNewArticle = !ui.editor.saveBtn.dataset.id;
        const id = isNewArticle ? `post_${Date.now()}` : ui.editor.saveBtn.dataset.id;

        let coverImageUrl = ui.editor.coverUrl.value.trim();
        const file = ui.editor.coverUpload.files[0];
        if (file) {
            try { coverImageUrl = await uploadCoverImage(file, id); }
            catch (error) { alert('圖片上傳失敗!'); console.error(error); return; }
        }
        const articleData = {
            id, title: ui.editor.title.value.trim() || '未命名文章',
            date: new Date(ui.editor.date.value).toISOString(),
            tags: getTagsFromEditor(), coverImage: coverImageUrl, content: editor.getMarkdown(),
            viewCount: (id && appState.articles[id]?.viewCount) || 0,
        };
        try {
            await set(ref(db, `blogData/articles/${id}`), articleData);
            const newColors = {};
            ui.tagColorEditor.querySelectorAll('input[type="color"]').forEach(input => { newColors[input.dataset.tag] = input.value; });
            if (Object.keys(newColors).length) await update(ref(db, 'blogData/tagColors'), newColors);
            
            closeEditor();
            await loadData();
            // FIX: Navigate to the new article after creation for better UX
            if (isNewArticle) {
                renderArticle(id);
            } else if (appState.currentArticleId === id) {
                renderArticle(id);
            } else {
                switchView('home-view');
            }
        } catch(e) { alert('儲存失敗'); console.error(e); }
    }

    function deleteArticle(id) {
        if (!id || !appState.articles[id]) return;
        showConfirmation(`確定刪除 "${appState.articles[id].title}"?`, '此操作無法復原。', async () => {
            await remove(ref(db, `blogData/articles/${id}`));
            closeEditor();
            ui.confirmationModal.style.display = 'none';
            await loadData();
            switchView('home-view');
        });
    }

    function uploadCoverImage(file, id) {
        return new Promise((resolve, reject) => {
            const fileRef = storageRef(storage, `covers/${id}_${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(fileRef, file);
            ui.editor.uploadProgressContainer.style.display = 'block';
            uploadTask.on('state_changed', s => { ui.editor.uploadProgressBar.style.width = ((s.bytesTransferred / s.totalBytes) * 100) + '%'; }, reject, async () => { resolve(await getDownloadURL(uploadTask.snapshot.ref)); });
        });
    }

    function setEditorDirty(v) { editorIsDirty = v; document.getElementById('dirty-indicator').style.background = v ? '#ef4444' : '#a0aec0'; }
    function updateCoverPreview(url) { ui.editor.coverPreview.style.display = url ? 'block' : 'none'; if (url) ui.editor.coverPreview.src = url; }
    function resetEditorForm() { ui.editor.title.value = ''; ui.editor.date.value = ''; ui.editor.coverUrl.value = ''; ui.editor.coverUpload.value = ''; updateCoverPreview(''); ui.editor.tagsContainer.querySelectorAll('.tag-pill').forEach(el => el.remove()); editor?.setMarkdown(''); ui.editor.uploadProgressContainer.style.display = 'none'; ui.tagColorEditor.innerHTML = ''; setEditorDirty(false); }
    function getTagsFromEditor() { return [...ui.editor.tagsContainer.querySelectorAll('.tag-pill')].map(p => p.dataset.tag); }
    function createTagPill(tag) { tag = tag.trim(); if (!tag || getTagsFromEditor().includes(tag)) return; const pill = document.createElement('span'); pill.className = 'tag-pill flex items-center bg-indigo-100 dark:bg-indigo-800 text-indigo-800 dark:text-indigo-100 text-sm font-medium pl-2.5 pr-1 py-0.5 rounded-full'; pill.dataset.tag = tag; pill.innerHTML = `${tag} <button type="button" class="ml-1.5 flex-shrink-0 h-4 w-4 rounded-full inline-flex items-center justify-center text-indigo-400 hover:bg-indigo-200 dark:hover:bg-indigo-700 hover:text-indigo-500 focus:outline-none">&times;</button>`; ui.editor.tagsContainer.insertBefore(pill, ui.editor.tagsInput); renderTagColorEditors(getTagsFromEditor()); }
    function renderTagColorEditors(tags) { ui.tagColorEditor.innerHTML = tags.length ? `<label class="block text-sm font-medium pt-2">標籤顏色</label>` + tags.map(tag => `<div class="flex items-center gap-2"><input type="color" value="${getTagColor(tag)}" data-tag="${tag}" class="h-8 w-10 rounded border-gray-300 dark:border-gray-600"><span class="text-sm">${tag}</span></div>`).join('') : ''; }

    function switchView(viewName) { ['home-view', 'article-view', 'tags-view', 'loading-view'].forEach(id => document.getElementById(id).classList.toggle('active', id === viewName)); window.scrollTo(0, 0); if(viewName !== 'article-view') appState.currentArticleId = null; }
    
    function toggleSidebar(forceState) {
        const shouldBeOpen = typeof forceState === 'boolean' ? forceState : !appState.isSidebarOpen;
        appState.isSidebarOpen = shouldBeOpen;
        document.getElementById('sidebar').classList.toggle('-translate-x-full', !shouldBeOpen);
        document.getElementById('sidebar-backdrop').classList.toggle('hidden', !shouldBeOpen);
        if (window.innerWidth < 768) document.body.classList.toggle('overflow-hidden', shouldBeOpen);
    }

    function updateTheme(isDark) {
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', isDark);
        document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
        document.getElementById('hl-light').disabled = isDark;
        document.getElementById('hl-dark').disabled = !isDark;
        if (editor) editor.setTheme(isDark ? 'dark' : 'light');
    }

    function toggleAdminMode(enable) { appState.isEditMode = enable; ui.newArticleLink.classList.toggle('hidden', !enable); ui.adminToolbar.style.display = enable ? 'block' : 'none'; renderArticleGrid(); }
    function showConfirmation(title, message, onConfirm) { document.getElementById('confirmation-title').textContent = title; document.getElementById('confirmation-message').textContent = message; ui.confirmationModal.style.display = 'flex'; confirmationCallback = onConfirm; }

    document.addEventListener('DOMContentLoaded', () => {
        updateTheme(document.documentElement.classList.contains('dark'));
        loadData();

        document.body.addEventListener('click', e => {
            const target = e.target; const closest = sel => target.closest(sel);
            const navTarget = closest('.nav-link');
            if (closest('#sidebar-toggle')) toggleSidebar();
            else if (closest('#sidebar-backdrop')) toggleSidebar(false);
            else if (closest('#site-title-sidebar')) { document.getElementById('search-input').value = ''; sortArticles(); switchView('home-view'); toggleSidebar(false); }
            else if (navTarget) { e.preventDefault(); const nav = navTarget.dataset.nav; if (nav === 'home') { sortArticles(); switchView('home-view'); } else if (nav === 'tags') { renderAllTagsPage(); switchView('tags-view'); } else if (nav === 'new-article') openEditor(); toggleSidebar(false); }
            else if (closest('.card-edit-btn')) openEditor(closest('[data-id]').dataset.id);
            else if (closest('.group[data-id]')) renderArticle(closest('[data-id]').dataset.id);
            else if (closest('.back-to-list-btn')) switchView('home-view');
            else if (closest('.tag-filter-btn')) { const tag = closest('.tag-filter-btn').dataset.tag; const ids = appState.sortedIds.filter(id => (appState.articles[id].tags || []).includes(tag)); renderArticleGrid(ids); document.getElementById('page-title').textContent = `標籤: #${tag}`; switchView('home-view'); toggleSidebar(false); }
            else if (closest('#theme-toggle')) updateTheme(!document.documentElement.classList.contains('dark'));
            else if (closest('#copyright-info')) { const p = prompt('Admin Password:'); if (p === "980621") { toggleAdminMode(true); alert('管理模式已啟用！'); } else if (p) { alert('密碼錯誤！'); } }
            else if (closest('#save-btn')) saveArticle();
            else if (closest('#cancel-btn')) closeEditor();
            else if (closest('#delete-btn')) deleteArticle(closest('#delete-btn').dataset.id);
            else if (closest('#confirm-action-btn')) confirmationCallback && confirmationCallback();
            else if (closest('#confirm-cancel-btn')) ui.confirmationModal.style.display = 'none';
            else if (closest('.tag-pill button')) { closest('.tag-pill').remove(); setEditorDirty(true); renderTagColorEditors(getTagsFromEditor()); }
        });
        
        ui.sortOrder.addEventListener('change', sortArticles);
        document.getElementById('search-input').addEventListener('input', e => { clearTimeout(searchDebounceTimer); searchDebounceTimer = setTimeout(() => { const query = e.target.value.trim().toLowerCase(); if (!query) { sortArticles(); return; } try { const results = searchIndex.search(query + '*').map(r => r.ref); renderArticleGrid(results); } catch (err) { const results = appState.sortedIds.filter(id => { const a = appState.articles[id]; return (a.title+a.content).toLowerCase().includes(query); }); renderArticleGrid(results); } document.getElementById('page-title').textContent = `搜尋結果: "${query}"`; switchView('home-view'); }, 250); });

        ui.editor.coverUpload.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => updateCoverPreview(ev.target.result); r.readAsDataURL(f); setEditorDirty(true); } });
        ui.editor.coverUrl.addEventListener('input', e => { updateCoverPreview(e.target.value); setEditorDirty(true); });
        ui.editor.tagsInput.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); createTagPill(ui.editor.tagsInput.value); ui.editor.tagsInput.value = ''; setEditorDirty(true); } });
        ['input', 'change'].forEach(evt => { ui.editor.title.addEventListener(evt, () => setEditorDirty(true)); ui.editor.date.addEventListener(evt, () => setEditorDirty(true)); ui.tagColorEditor.addEventListener(evt, e => { if(e.target.type === 'color') setEditorDirty(true); }); });

        document.getElementById('export-json').addEventListener('click', () => { const blob = new Blob([JSON.stringify(appState.articles, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `kai_studio_backup.json`; a.click(); URL.revokeObjectURL(a.href); });
        document.getElementById('import-json-input').addEventListener('change', async e => { const f = e.target.files[0]; if (!f) return; try { const obj = JSON.parse(await f.text()); if (!confirm('匯入將覆蓋所有遠端文章，確定繼續？')) return; await set(ref(db, `blogData/articles`), obj); alert('匯入成功！'); await loadData(); } catch (err) { alert('匯入失敗，檔案格式錯誤'); } });
        
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { if (ui.confirmationModal.style.display !== 'none') ui.confirmationModal.style.display = 'none'; else if (ui.editorOverlay.style.display !== 'none') closeEditor(); }});
        window.addEventListener('beforeunload', e => { if (editorIsDirty) { e.preventDefault(); e.returnValue = ''; } });
    });
</script>
</body>
</html>
