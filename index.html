    <style>
        body { font-family: 'Noto Sans TC', 'Inter', sans-serif; opacity: 0; transition: opacity 0.5s; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        :root { --scrollbar-thumb: #a0aec0; --scrollbar-track: #edf2f7; }
        html.dark { --scrollbar-thumb: #4a5568; --scrollbar-track: #1a202c; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        
        .toastui-editor-defaultUI { border: 0 !important; }
        html.dark .toastui-editor-defaultUI, html.dark .toastui-editor-toolbar { background-color: #1f2937; }
        html.dark .toastui-editor-md-container, html.dark .toastui-editor-ww-container { background-color: #374151; }
        html.dark .ProseMirror, html.dark .toastui-editor-md-preview { color: #d1d5db; }
        html.dark .toastui-editor-toolbar-icons { background-image: url('https://uicdn.toast.com/editor/latest/dist/theme/dark/toastui-editor-icons.png'); }

        mark { background-color: #fef08a; padding: 0.1em 0.2em; border-radius: 3px; }
        html.dark mark { background-color: #a16207; color: #fefce8; }

        .callout { padding: 1rem; margin: 1.5rem 0; border-left-width: 4px; border-radius: 0.25rem; }
        .callout-title { display: flex; align-items: center; font-weight: 700; margin-bottom: 0.5rem; }
        .callout-title svg { width: 1.25rem; height: 1.25rem; margin-right: 0.75rem; }
        .callout > :last-child { margin-bottom: 0; }
        .callout-note { background-color: #eff6ff; border-color: #3b82f6; color: #1e40af; }
        html.dark .callout-note { background-color: #1e293b; border-color: #60a5fa; color: #dbeafe; }
    </style>
</head>
<body>
    <script>(function() { localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches) ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark'); })();</script>

    <div class="flex">
        <aside id="sidebar" class="w-72 bg-white dark:bg-gray-800 h-screen p-6 border-r border-gray-200 dark:border-gray-700 fixed top-0 left-0 z-30 transition-transform duration-300 flex-col flex -translate-x-full md:translate-x-0"></aside>

        <main id="main-content" class="w-full transition-all duration-300">
            <header class="sticky top-0 z-20 bg-gray-100/80 dark:bg-gray-900/80 backdrop-blur-md flex items-center justify-between p-4 md:p-6 border-b dark:border-gray-700 mb-6">
                <h1 id="site-title-mobile" class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer md:hidden">🌐 KAI STUDIO</h1>
                <button id="sidebar-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 ml-auto">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>

            <div class="px-6 sm:px-12 pb-12">
                <div id="home-view" class="view"><h2 id="page-title" class="text-3xl font-bold mb-8 border-l-4 border-indigo-500 pl-4"></h2><div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div></div>

    <div id="mobile-menu-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>
    <div id="mobile-menu" class="fixed top-0 right-0 h-full w-72 bg-white dark:bg-gray-800 z-40 p-6 transform translate-x-full transition-transform duration-300 md:hidden"></div>
    
    <div id="editor-overlay" class="fixed inset-0 bg-black/60 z-40 hidden items-center justify-center p-4"><div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl w-full max-w-7xl h-[95vh] flex flex-col md:flex-row overflow-hidden"><div class="w-full md:w-1/3 p-6 space-y-4 overflow-y-auto border-b md:border-b-0 md:border-r dark:border-gray-700"><h3 class="text-xl font-bold">文章設定</h3><div><label for="editor-title" class="block text-sm font-medium">標題</label><input type="text" id="editor-title" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600"></div><div><label for="editor-date" class="block text-sm font-medium">發布日期</label><input type="date" id="editor-date" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600"></div><div class="relative"><label class="block text-sm font-medium">標籤</label><div id="tags-input-container" class="form-input mt-1 flex flex-wrap gap-2 items-center dark:bg-gray-700 dark:border-gray-600"><input type="text" id="tags-input" class="flex-grow bg-transparent border-none focus:ring-0 p-0" placeholder="選擇或建立標籤..."></div><div id="tag-suggestions" class="absolute z-10 w-full bg-white dark:bg-gray-800 border dark:border-gray-600 rounded-md shadow-lg mt-1 hidden max-h-48 overflow-y-auto"></div></div><div><label class="block text-sm font-medium">封面圖片</label><div class="mt-1"><img id="cover-preview" class="w-full aspect-video object-cover rounded bg-gray-200 dark:bg-gray-700 hidden mb-2"><input type="text" id="editor-cover-image-url" class="form-input w-full mb-2 dark:bg-gray-700 dark:border-gray-600" placeholder="貼上 URL 或上傳"><label for="cover-upload" class="cursor-pointer bg-indigo-500 text-white text-center py-2 px-4 rounded-md hover:bg-indigo-600 w-full inline-block">上傳圖片</label><input type="file" id="cover-upload" class="hidden" accept="image/*"><div id="upload-progress-container" class="w-full bg-gray-200 rounded-full h-2.5 mt-2 hidden"><div id="upload-progress-bar" class="bg-indigo-600 h-2.5 rounded-full" style="width: 0%"></div></div></div></div></div><div class="flex-grow flex flex-col h-full w-full md:w-2/3"><div id="editor-container" class="flex-grow relative h-full"></div><div class="flex-shrink-0 p-4 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-700 flex justify-between items-center"><button id="delete-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">刪除</button><div class="space-x-4"><button id="cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="save-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">儲存</button></div></div></div></div></div>
    <div id="management-overlay" class="fixed inset-0 bg-black/60 z-40 hidden items-center justify-center p-4"><div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl w-full max-w-2xl h-[80vh] flex flex-col"><div class="flex justify-between items-center p-6 border-b dark:border-gray-700"><h3 class="text-2xl font-bold">管理中心</h3><button id="management-close-btn" class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200">&times;</button></div><div class="p-6 flex-grow overflow-y-auto space-y-4"><h4 class="text-lg font-semibold">標籤管理</h4><div id="tag-management-list"></div></div><div class="p-6 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-700"><form id="tag-edit-form" class="flex items-end gap-4"><input type="hidden" id="tag-edit-original-name"><div class="flex-grow"><label for="tag-edit-name" class="block text-sm font-medium">標籤名稱</label><input type="text" id="tag-edit-name" class="form-input mt-1 w-full dark:bg-gray-700" required></div><div><label for="tag-edit-color" class="block text-sm font-medium">顏色</label><input type="color" id="tag-edit-color" class="form-input mt-1 w-16 h-10 p-1 dark:bg-gray-700" value="#4f46e5"></div><button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">儲存</button><button type="button" id="tag-edit-cancel" class="bg-gray-200 px-4 py-2 rounded-md hover:bg-gray-300 dark:bg-gray-600">取消</button></form></div></div></div>
    <div id="confirmation-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center"><div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl p-6 w-11/12 max-w-sm text-center"><h3 id="confirmation-title" class="text-xl font-bold mb-4"></h3><p id="confirmation-message" class="text-gray-600 dark:text-gray-300 mb-6"></p><div class="flex justify-center space-x-4"><button id="confirm-cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-6 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="confirm-action-btn" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">確定</button></div></div></div>

    <template id="sidebar-template">
        <div class="text-center mb-6"><h1 data-action="go-home" class="text-3xl font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer">🌐 KAI STUDIO</h1><p class="text-sm text-gray-500 dark:text-gray-400 mt-2">探索音樂的無限可能。</p></div>
        <div class="relative mb-4"><input type="search" class="search-input w-full pl-10 pr-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700 border-transparent focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="搜尋文章..."><svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
        <div class="mb-4"><label class="text-xs font-bold uppercase text-gray-500 dark:text-gray-400">排序方式</label><select data-action="sort" class="sort-order form-select mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 shadow-sm focus:border-indigo-300 focus:ring-indigo-200 text-sm"><option value="newest">最新日期</option><option value="oldest">最舊日期</option><option value="views">最多觀看</option></select></div>
        <div class="mb-4"><h3 class="text-xs font-bold uppercase text-gray-500 dark:text-gray-400 mb-2">熱門標籤</h3><div class="popular-tags-container flex flex-wrap gap-2"></div></div>
        <nav class="flex-grow space-y-2"><a href="#" data-nav="home" class="nav-link flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700"><span>🏠</span><span>首頁</span></a><a href="#" data-nav="tags" class="nav-link flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700"><span>🏷️</span><span>所有標籤</span></a><a href="#" data-nav="manage" class="nav-link hidden flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700"><span>🔧</span><span>管理中心</span></a><a href="#" data-nav="new-article" class="nav-link hidden flex items-center space-x-3 py-2 px-4 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700"><span>➕</span><span>新增文章</span></a></nav>
        <div class="text-center space-y-4"><button data-action="toggle-theme" class="w-full flex justify-center items-center space-x-2 px-4 py-2 rounded-full border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><span class="theme-icon"></span></button><p data-action="admin-login" class="cursor-pointer text-gray-400 text-xs hover:text-indigo-400">&copy; 2025 KAI's Music Log</p></div>
    </template>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y", authDomain: "blog-63ad2.firebaseapp.com", projectId: "blog-63ad2", storageBucket: "blog-63ad2.appspot.com", messagingSenderId: "265914768921", appId: "1:265914768921:web:e4c752780e604d0be69488", databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let appState = { articles: {}, tags: {}, isEditMode: false, currentArticleId: null, sortedIds: [], isSidebarOpen: localStorage.getItem('sidebarOpen') !== 'false' };
        let editor;
        let searchIndex;
        let confirmationCallback = null;

        const ui = {
            body: document.body,
            main: document.getElementById('main-content'), sidebar: document.getElementById('sidebar'), mobileMenu: document.getElementById('mobile-menu'),
            mobileMenuOverlay: document.getElementById('mobile-menu-overlay'), pageTitle: document.getElementById('page-title'),
            editorOverlay: document.getElementById('editor-overlay'), managementOverlay: document.getElementById('management-overlay'),
            confirmationModal: document.getElementById('confirmation-modal'),
            editor: {
                title: document.getElementById('editor-title'), date: document.getElementById('editor-date'),
                tagsInput: document.getElementById('tags-input'), tagsContainer: document.getElementById('tags-input-container'),
                tagSuggestions: document.getElementById('tag-suggestions'), coverUrl: document.getElementById('editor-cover-image-url'), coverUpload: document.getElementById('cover-upload'),
                coverPreview: document.getElementById('cover-preview'), uploadProgressContainer: document.getElementById('upload-progress-container'),
                uploadProgressBar: document.getElementById('upload-progress-bar'), container: document.getElementById('editor-container'),
                saveBtn: document.getElementById('save-btn'), cancelBtn: document.getElementById('cancel-btn'), deleteBtn: document.getElementById('delete-btn'),
            },
            tagManagement: {
                list: document.getElementById('tag-management-list'), form: document.getElementById('tag-edit-form'),
                name: document.getElementById('tag-edit-name'), color: document.getElementById('tag-edit-color'),
                originalName: document.getElementById('tag-edit-original-name'), cancelBtn: document.getElementById('tag-edit-cancel')
            }
        };

        const calloutIcons = { NOTE: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"></path></svg>` };
        const markedExtensions = { gfm: true, breaks: true, extensions: [{ name: 'highlight', level: 'inline', start(src) { return src.indexOf('=='); }, tokenizer(src) { const match = src.match(/^==([^=]+)==/); if (match) return { type: 'highlight', raw: match[0], text: this.lexer.inlineTokens(match[1]) }; }, renderer(token) { return `<mark>${this.parser.parseInline(token.text)}</mark>`; } }], renderer: (() => { const r = new marked.Renderer(); const o = r.blockquote.bind(r); r.blockquote = q => { const m = q.match(/<p>\s*\[\!(.*?)\]\s?(.*?)<\/p>([\s\S]*)/); if(m){const t=m[1].toUpperCase(),i=m[2],c=m[3],e=calloutIcons[t]||calloutIcons.NOTE; return `<div class="callout callout-${t.toLowerCase()}"><div class="callout-title">${e}${i}</div>${c}</div>`;} return o(q); }; return r; })() };
        
        const getTagStyle = tag => { const tagData = appState.tags[tag]; return tagData ? `background-color: ${tagData.color}` : `background-color: hsl(${((str) => { let h = 0; for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h); return h; })(tag) % 360}, 60%, 45%)`; };
        const formatDate = dateStr => new Date(dateStr).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
        
        async function init() {
            switchView('loading-view');
            try {
                const [articlesSnap, tagsSnap] = await Promise.all([get(ref(db, 'blogData/articles')), get(ref(db, 'blogData/tags'))]);
                appState.articles = articlesSnap.exists() ? articlesSnap.val() : {};
                appState.tags = tagsSnap.exists() ? tagsSnap.val() : {};
                appState.sortedIds = Object.keys(appState.articles);
                
                setupSearch();
                renderSidebars();
                sortArticles(); // This also calls renderArticleGrid
                
            } catch (error) {
                console.error("Initialization failed:", error);
                document.getElementById('home-view').innerHTML = `<p class="text-red-500">無法載入資料，請檢查 Firebase 設定或網路連線。</p>`;
            }
            switchView('home-view');
            ui.body.style.opacity = 1; // Show body after everything is ready
        }

        function sortArticles() {
            const sortMethod = document.querySelector('#sidebar .sort-order').value;
            appState.sortedIds.sort((a, b) => {
                const artA = appState.articles[a], artB = appState.articles[b];
                if (sortMethod === 'oldest') return new Date(artA.date) - new Date(artB.date);
                if (sortMethod === 'views') return (artB.viewCount || 0) - (artA.viewCount || 0);
                return new Date(artB.date) - new Date(artA.date);
            });
            renderArticleGrid();
        }

        function setupSearch() {
            if (!Object.keys(appState.articles).length) return;
            searchIndex = lunr(function () { this.ref('id'); this.field('title', { boost: 10 }); this.field('tags', { boost: 5 }); this.field('content'); appState.sortedIds.forEach(id => this.add({ id, ...appState.articles[id], tags: (appState.articles[id].tags || []).join(' ') })); });
        }
        
        function renderArticleGrid(ids = appState.sortedIds) {
            ui.pageTitle.textContent = "最新文章";
            const grid = document.getElementById('article-grid');
            if (!ids || ids.length === 0) {
                grid.innerHTML = `<p class="text-gray-500 col-span-full text-center">找不到文章。</p>`;
                return;
            }
            grid.innerHTML = ids.map(id => { const article = appState.articles[id]; if (!article) return ''; const tagsHtml = (article.tags || []).map(tag => `<span class="text-xs font-semibold py-1 px-2 uppercase rounded-full text-white" style="${getTagStyle(tag)}">${tag}</span>`).join(' '); return `<div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden transform hover:-translate-y-1 transition-all duration-300 group" data-id="${id}"><div class="relative"><img src="${article.coverImage || `https://placehold.co/600x400/a78bfa/ffffff?text=${encodeURIComponent(article.title)}`}" alt="${article.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"><div class="absolute inset-0 bg-black/20"></div></div><div class="p-6 relative"><h3 class="text-xl font-bold mb-2 truncate group-hover:text-indigo-500 dark:group-hover:text-indigo-400 cursor-pointer">${article.title}</h3><p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${formatDate(article.date)}</p><div class="flex flex-wrap gap-2">${tagsHtml}</div>${appState.isEditMode ? `<button class="card-edit-btn absolute top-4 right-4 bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center opacity-80 hover:opacity-100" data-id="${id}">✏️</button>` : ''}</div></div>`; }).join('');
        }
        async function renderArticle(id) { const article = appState.articles[id]; if (!article) return; if (!sessionStorage.getItem(`viewed_${id}`)) { sessionStorage.setItem(`viewed_${id}`, 'true'); const newCount = (article.viewCount || 0) + 1; await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount }); article.viewCount = newCount; } const contentHtml = marked.parse(article.content || '', markedExtensions); const view = document.getElementById('article-view'); view.innerHTML = `<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-lg shadow-lg"><button class="back-to-list-btn text-indigo-600 dark:text-indigo-400 hover:underline mb-6">← 返回列表</button><h1 class="text-3xl md:text-5xl font-bold mb-4">${article.title}</h1><div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-gray-500 dark:text-gray-400 mb-6 pb-6 border-b dark:border-gray-600"><span>📅 ${formatDate(article.date)}</span><span>👁️ ${article.viewCount || 1} 次檢視</span></div>${article.coverImage ? `<img src="${article.coverImage}" class="w-full rounded-lg mb-8 aspect-video object-cover">` : ''}<div class="prose dark:prose-invert max-w-none">${contentHtml}</div></div>`; if (window.hljs) view.querySelectorAll('pre code').forEach(el => hljs.highlightBlock(el)); switchView('article-view'); }
        function renderAllTagsPage() { const c = document.getElementById('tags-container'); const articleCounts = {}; Object.values(appState.articles).forEach(a => (a.tags || []).forEach(t => articleCounts[t] = (articleCounts[t] || 0) + 1)); const sortedTags = Object.keys(appState.tags).sort((a,b) => (articleCounts[b] || 0) - (articleCounts[a] || 0)); c.innerHTML = sortedTags.map(t=>`<button class="tag-filter-btn text-white font-semibold py-2 px-4 rounded-full transition-transform hover:scale-105" style="${getTagStyle(t)}" data-tag="${t}">${t} <span class="ml-2 text-xs opacity-75">${articleCounts[t] || 0}</span></button>`).join(''); }
        function renderSidebars() { const content = document.getElementById('sidebar-template').innerHTML; ui.sidebar.innerHTML = content; ui.mobileMenu.innerHTML = content; const articleCounts = {}; Object.values(appState.articles).forEach(a => (a.tags || []).forEach(t => articleCounts[t] = (articleCounts[t] || 0) + 1)); const sortedTags = Object.keys(appState.tags).sort((a, b) => (articleCounts[b] || 0) - (articleCounts[a] || 0)).slice(0, 7); const tagsHtml = sortedTags.map(tag => `<button class="tag-filter-btn text-xs font-semibold py-1 px-2 rounded-full text-white" style="${getTagStyle(tag)}" data-tag="${tag}">${tag}</button>`).join(''); document.querySelectorAll('.popular-tags-container').forEach(c => c.innerHTML = tagsHtml); updateThemeUI(); toggleAdminUI(); }
        
        function openEditor(id = null) { if (!editor) { editor = new toastui.Editor({ el: ui.editor.container, height: '100%', initialEditType: 'markdown', previewStyle: 'vertical' }); } resetEditorForm(); const article = id ? appState.articles[id] : null; if (article) { ui.editor.title.value = article.title || ''; ui.editor.date.value = article.date ? article.date.split('T')[0] : ''; ui.editor.coverUrl.value = article.coverImage || ''; updateCoverPreview(article.coverImage); (article.tags || []).forEach(addTagToEditor); editor.setMarkdown(article.content || ''); } else { ui.editor.date.value = new Date().toISOString().split('T')[0]; editor.setMarkdown("> [!NOTE] 這是一個提示框。\n\n一般文字可以用 `==` 來 ==高亮== 顯示。"); } ui.editor.saveBtn.dataset.id = id; ui.editor.deleteBtn.dataset.id = id; ui.editor.deleteBtn.style.display = id ? 'block' : 'none'; ui.editorOverlay.style.display = 'flex'; }
        async function saveArticle() { const id = ui.editor.saveBtn.dataset.id || `post_${Date.now()}`; let coverImageUrl = ui.editor.coverUrl.value.trim(); const file = ui.editor.coverUpload.files[0]; if (file) { try { coverImageUrl = await uploadCoverImage(file, id); } catch (error) { alert('圖片上傳失敗!'); console.error(error); return; } } const tags = getTagsFromEditor(); for (const tag of tags) { if (!appState.tags[tag]) { await set(ref(db, `blogData/tags/${tag}`), { color: `#${Math.floor(Math.random()*16777215).toString(16)}` }); } } const articleData = { title: ui.editor.title.value.trim() || '未命名文章', date: new Date(ui.editor.date.value).toISOString(), tags: tags, coverImage: coverImageUrl, content: editor.getMarkdown(), viewCount: (id && appState.articles[id]?.viewCount) || 0, }; await set(ref(db, `blogData/articles/${id}`), articleData); ui.editorOverlay.style.display = 'none'; await init(); if (appState.currentArticleId === id) renderArticle(id); else switchView('home-view'); }
        function deleteArticle(id) { if (!id || !appState.articles[id]) return; showConfirmation(`確定刪除 "${appState.articles[id].title}"?`, '此操作無法復原。', async () => { await remove(ref(db, `blogData/articles/${id}`)); ui.editorOverlay.style.display = 'none'; ui.confirmationModal.style.display = 'none'; await init(); switchView('home-view'); }); }
        function uploadCoverImage(file, id) { return new Promise((resolve, reject) => { const fileRef = storageRef(storage, `covers/${id}_${Date.now()}_${file.name}`); const uploadTask = uploadBytesResumable(fileRef, file); ui.editor.uploadProgressContainer.style.display = 'block'; uploadTask.on('state_changed', (s) => { ui.editor.uploadProgressBar.style.width = ((s.bytesTransferred / s.totalBytes) * 100) + '%'; }, (e) => reject(e), async () => { resolve(await getDownloadURL(uploadTask.snapshot.ref)); }); }); }
        function updateCoverPreview(url) { ui.editor.coverPreview.style.display = url ? 'block' : 'none'; if (url) ui.editor.coverPreview.src = url; }
        function resetEditorForm() { ui.editor.title.value = ''; ui.editor.date.value = ''; ui.editor.coverUrl.value = ''; ui.editor.coverUpload.value = ''; updateCoverPreview(''); ui.editor.tagsContainer.querySelectorAll('.tag-pill').forEach(el => el.remove()); editor?.setMarkdown(''); ui.editor.uploadProgressContainer.style.display = 'none'; }
        
        function getTagsFromEditor() { return [...ui.editor.tagsContainer.querySelectorAll('.tag-pill')].map(p => p.dataset.tag); }
        function addTagToEditor(tag) { tag = tag.trim(); if (!tag || getTagsFromEditor().includes(tag)) return; const pill = document.createElement('span'); pill.className = 'tag-pill flex items-center text-white text-sm font-medium pl-2.5 pr-1 py-0.5 rounded-full'; pill.style.cssText = getTagStyle(tag); pill.dataset.tag = tag; pill.innerHTML = `${tag} <button type="button" class="ml-1.5 flex-shrink-0 h-4 w-4 rounded-full inline-flex items-center justify-center text-white/70 hover:bg-black/20 focus:outline-none">&times;</button>`; ui.editor.tagsContainer.insertBefore(pill, ui.editor.tagsInput); }
        function updateTagSuggestions() { const query = ui.editor.tagsInput.value.toLowerCase(); const selectedTags = getTagsFromEditor(); const suggestions = Object.keys(appState.tags).filter(t => !selectedTags.includes(t) && t.toLowerCase().includes(query)); if(suggestions.length > 0) { ui.editor.tagSuggestions.innerHTML = suggestions.map(t => `<div class="p-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700" data-tag="${t}">${t}</div>`).join(''); ui.editor.tagSuggestions.classList.remove('hidden'); } else { ui.editor.tagSuggestions.classList.add('hidden'); } }
        
        function openManagementCenter() { renderTagManagementList(); ui.managementOverlay.style.display = 'flex'; }
        function renderTagManagementList() { const tags = Object.entries(appState.tags).sort((a,b)=>a[0].localeCompare(b[0])); ui.tagManagement.list.innerHTML = tags.map(([name, {color}])=>`<div class="flex items-center justify-between p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700"><div class="flex items-center"><span class="w-4 h-4 rounded-full mr-3" style="background-color:${color}"></span><span>${name}</span></div><div class="space-x-2"><button data-action="edit-tag" data-tag-name="${name}" class="text-sm text-indigo-500 hover:underline">編輯</button><button data-action="delete-tag" data-tag-name="${name}" class="text-sm text-red-500 hover:underline">刪除</button></div></div>`).join(''); }
        function editTag(name) { const tag = appState.tags[name]; ui.tagManagement.name.value = name; ui.tagManagement.color.value = tag.color; ui.tagManagement.originalName.value = name; }
        async function saveTag(e) { e.preventDefault(); const newName = ui.tagManagement.name.value.trim(); const oldName = ui.tagManagement.originalName.value; const color = ui.tagManagement.color.value; if(!newName) return; if (oldName && oldName !== newName) await remove(ref(db, `blogData/tags/${oldName}`)); await set(ref(db, `blogData/tags/${newName}`), {color}); ui.tagManagement.form.reset(); ui.tagManagement.originalName.value = ''; await init(); renderTagManagementList(); }
        async function deleteTag(name) { showConfirmation(`確定刪除標籤 "${name}"?`, '此操作不會從文章中移除該標籤，僅刪除其設定。', async () => { await remove(ref(db, `blogData/tags/${name}`)); ui.confirmationModal.style.display = 'none'; await init(); renderTagManagementList(); }); }
        
        function switchView(viewName) { ['home-view', 'article-view', 'tags-view', 'loading-view'].forEach(id => document.getElementById(id).classList.toggle('active', id === viewName)); window.scrollTo(0, 0); }
        function toggleDesktopSidebar(forceState) { const shouldBeOpen = typeof forceState === 'boolean' ? forceState : !appState.isSidebarOpen; appState.isSidebarOpen = shouldBeOpen; ui.sidebar.classList.toggle('-translate-x-full', !shouldBeOpen); ui.main.classList.toggle('md:ml-72', shouldBeOpen); localStorage.setItem('sidebarOpen', shouldBeOpen); }
        function toggleMobileMenu(show) { ui.mobileMenuOverlay.classList.toggle('hidden', !show); ui.mobileMenu.classList.toggle('translate-x-full', !show); }
        function updateThemeUI() { const isDark = document.documentElement.classList.contains('dark'); document.querySelectorAll('.theme-icon').forEach(i => i.textContent = isDark ? '☀️' : '🌙'); }
        function toggleAdminUI() { document.querySelectorAll('[data-nav="new-article"], [data-nav="manage"]').forEach(el => el.classList.toggle('hidden', !appState.isEditMode)); }
        function showConfirmation(title, message, onConfirm) { document.getElementById('confirmation-title').textContent = title; document.getElementById('confirmation-message').textContent = message; ui.confirmationModal.style.display = 'flex'; confirmationCallback = onConfirm; }

        document.addEventListener('DOMContentLoaded', () => {
            init();

            document.body.addEventListener('click', e => {
                const target = e.target; const action = target.closest('[data-action]')?.dataset.action;
                const nav = target.closest('[data-nav]')?.dataset.nav; const card = target.closest('.group[data-id]');
                const tagBtn = target.closest('.tag-filter-btn');

                const handleNav = (navAction) => {
                    switch(navAction) {
                        case 'home': sortArticles(); switchView('home-view'); break;
                        case 'tags': renderAllTagsPage(); switchView('tags-view'); break;
                        case 'new-article': openEditor(); break;
                        case 'manage': openManagementCenter(); break;
                    }
                    toggleMobileMenu(false);
                };

                if (action === 'go-home' || nav === 'home' || target.id === 'site-title-mobile') { e.preventDefault(); document.querySelector('.search-input').value = ''; handleNav('home'); }
                else if (nav) { e.preventDefault(); handleNav(nav); }
                else if (action === 'toggle-theme') { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); updateThemeUI(); }
                else if (action === 'admin-login') { const p = prompt('Admin Password:'); if (p === "980621") { appState.isEditMode = true; toggleAdminUI(); renderArticleGrid(); alert('管理模式已啟用！'); } else if (p) { alert('密碼錯誤！'); } }
                else if (target.closest('#sidebar-toggle')) { window.innerWidth < 768 ? toggleMobileMenu(true) : toggleDesktopSidebar(); }
                else if (target.id === 'mobile-menu-overlay') toggleMobileMenu(false);
                else if (target.closest('.card-edit-btn')) openEditor(target.closest('[data-id]').dataset.id);
                else if (card) renderArticle(card.dataset.id);
                else if (target.closest('.back-to-list-btn')) switchView('home-view');
                else if (tagBtn) { const tag = tagBtn.dataset.tag; const ids = appState.sortedIds.filter(id => (appState.articles[id].tags || []).includes(tag)); renderArticleGrid(ids); ui.pageTitle.textContent = `標籤: #${tag}`; switchView('home-view'); toggleMobileMenu(false); }
                else if (target.id === 'save-btn') saveArticle();
                else if (target.id === 'cancel-btn') ui.editorOverlay.style.display = 'none';
                else if (target.id === 'delete-btn') deleteArticle(target.dataset.id);
                else if (target.id === 'confirm-action-btn') confirmationCallback && confirmationCallback();
                else if (target.id === 'confirm-cancel-btn') ui.confirmationModal.style.display = 'none';
                else if (target.closest('.tag-pill button')) target.closest('.tag-pill').remove();
                else if (target.id === 'management-close-btn') ui.managementOverlay.style.display = 'none';
                else if (action === 'edit-tag') editTag(target.dataset.tagName);
                else if (action === 'delete-tag') deleteTag(target.dataset.tagName);
                else if (target.closest('#tag-suggestions > div')) { addTagToEditor(target.dataset.tag); ui.editor.tagsInput.value = ''; ui.editor.tagSuggestions.classList.add('hidden'); }
            });

            ui.tagManagement.form.addEventListener('submit', saveTag);
            ui.tagManagement.cancelBtn.addEventListener('click', () => { ui.tagManagement.form.reset(); ui.tagManagement.originalName.value = ''; });
            document.body.addEventListener('change', e => { if (e.target.matches('.sort-order')) sortArticles(); });
            document.body.addEventListener('keyup', e => { if (e.target.matches('.search-input')) { const query = e.target.value.trim(); if (!query) { sortArticles(); return; } if(!searchIndex) return; const results = searchIndex.search(query + '*').map(r => r.ref); renderArticleGrid(results); ui.pageTitle.textContent = `搜尋結果: "${query}"`; switchView('home-view'); }});
            
            ui.editor.coverUpload.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = e => updateCoverPreview(e.target.result); r.readAsDataURL(f); } });
            ui.editor.coverUrl.addEventListener('input', e => updateCoverPreview(e.target.value));
            ui.editor.tagsInput.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTagToEditor(ui.editor.tagsInput.value); ui.editor.tagsInput.value = ''; ui.editor.tagSuggestions.classList.add('hidden'); } });
            ui.editor.tagsInput.addEventListener('keyup', updateTagSuggestions);
            ui.editor.tagsInput.addEventListener('focus', updateTagSuggestions);
        });
    </script>
</body>
</html>
