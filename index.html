<style>
    /* --- Base & Fonts --- */
    body { font-family: 'Noto Sans TC', 'Inter', sans-serif; }
    .view { display: none; }
    .view.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- Scrollbar --- */
    :root { --scrollbar-thumb: #a0aec0; --scrollbar-track: #edf2f7; }
    html.dark { --scrollbar-thumb: #4a5568; --scrollbar-track: #1a202c; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #718096; }
    html.dark ::-webkit-scrollbar-thumb:hover { background: #a0aec0; }

    /* --- Editor Dark Mode --- */
    .toastui-editor-defaultUI { border: 0 !important; }
    html.dark .toastui-editor-defaultUI, html.dark .toastui-editor-toolbar { background-color: #1f2937; }
    html.dark .toastui-editor-md-container, html.dark .toastui-editor-ww-container { background-color: #374151; }
    html.dark .ProseMirror, html.dark .toastui-editor-md-preview { color: #d1d5db; }
    html.dark .toastui-editor-toolbar-icons { background-image: url('https://uicdn.toast.com/editor/latest/dist/theme/dark/toastui-editor-icons.png'); }

    /* --- Callouts & Mark --- */
    mark { background-color: #fef08a; padding: 0.1em 0.2em; border-radius: 3px; }
    html.dark mark { background-color: #a16207; color: #fefce8; }
    .callout { padding: 1rem; margin: 1.2rem 0; border-left-width: 4px; border-radius: 0.25rem; }
    .callout-title { display:flex; align-items:center; font-weight:700; margin-bottom:0.4rem; }
    .callout-title svg{ width:1.1rem; height:1.1rem; margin-right:0.6rem }

    /* Color-safe tag pill */
    .tag-pill { cursor: pointer }

    /* Admin toolbar */
    #admin-toolbar { display:none }
    .editor-dirty-indicator { width:8px; height:8px; border-radius:50%; display:inline-block; margin-left:6px }
</style>

</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
    <script>
      (function() {
        // immediate theme apply
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else document.documentElement.classList.remove('dark');
      })();
    </script><div class="flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-white dark:bg-gray-800 h-screen p-6 border-r border-gray-200 dark:border-gray-700 fixed top-0 left-0 z-30 transition-transform duration-300 flex-col flex">
        <div class="text-center mb-6"><h1 id="site-title-sidebar" class="text-3xl font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer">🌐 KAI STUDIO</h1><p class="text-sm text-gray-500 dark:text-gray-400 mt-2">探索音樂的無限可能。</p></div>
        <div class="relative mb-4"><input type="search" id="search-input" placeholder="搜尋文章..." class="w-full pl-10 pr-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700 border-transparent focus:ring-2 focus:ring-indigo-500 outline-none"><svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
        <div class="mb-4"><label for="sort-order" class="text-xs font-bold uppercase text-gray-500 dark:text-gray-400">排序方式</label><select id="sort-order" class="form-select mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 text-sm"><option value="newest">最新日期</option><option value="oldest">最舊日期</option><option value="views">最多觀看</option></select></div>
        <div class="mb-4"><h3 class="text-xs font-bold uppercase text-gray-500 dark:text-gray-400 mb-2">熱門標籤</h3><div id="popular-tags-container" class="flex flex-wrap gap-2"></div></div>
        <nav class="flex-grow space-y-2"><a href="#" data-nav="home" class="nav-link flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700"><span>🏠</span><span>首頁</span></a><a href="#" data-nav="tags" class="nav-link flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700"><span>🏷️</span><span>所有標籤</span></a><a href="#" data-nav="new-article" id="new-article-link" class="hidden nav-link flex items-center space-x-3 py-2 px-4 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700"><span>➕</span><span>新增文章</span></a></nav>

        <!-- Admin toolbar (visible in admin mode) -->
        <div id="admin-toolbar" class="mt-6 space-y-2">
            <button id="export-json" class="w-full text-sm py-2 px-3 rounded-md border border-gray-300 dark:border-gray-600">匯出 JSON</button>
            <label class="w-full text-sm py-2 px-3 rounded-md bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 cursor-pointer text-center">匯入 JSON<input type="file" id="import-json-input" accept="application/json" class="hidden"></label>
            <div class="text-xs text-gray-400 mt-1">管理模式工具列</div>
        </div>

        <div class="text-center space-y-4 mt-6"><button id="theme-toggle" class="w-full flex justify-center items-center space-x-2 px-4 py-2 rounded-full border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><span id="theme-icon"></span></button><p id="admin-login" class="cursor-pointer text-gray-400 text-xs hover:text-indigo-400">管理員登入</p></div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="w-full transition-all duration-300 md:ml-72">
        <header class="sticky top-0 z-20 bg-gray-100/80 dark:bg-gray-900/80 backdrop-blur-md flex items-center p-4 md:p-6 border-b dark:border-gray-700 mb-6"><button id="sidebar-toggle" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button></header>
        <div class="px-6 sm:px-12 pb-12">
            <div id="home-view" class="view active"><h2 id="page-title" class="text-3xl font-bold mb-8 border-l-4 border-indigo-500 pl-4">最新文章</h2><div id="article-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div></div>
            <div id="article-view" class="view"></div>
            <div id="tags-view" class="view"><h2 class="text-3xl font-bold mb-8 border-l-4 border-indigo-500 pl-4">所有標籤</h2><div id="tags-container" class="flex flex-wrap gap-4"></div></div>
            <div id="loading-view" class="view flex justify-center items-center h-64"><div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-indigo-500"></div></div>
        </div>
    </main>
</div>

<!-- Modals -->
<div id="editor-overlay" class="fixed inset-0 bg-black/60 z-40 hidden items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl w-full max-w-7xl h-[90vh] flex flex-col md:flex-row overflow-hidden">
    <div class="w-full md:w-1/3 p-6 space-y-4 overflow-y-auto border-r dark:border-gray-700">
        <h3 class="text-xl font-bold">文章設定 <span id="dirty-indicator" class="editor-dirty-indicator" style="background:#a0aec0"></span></h3>
        <div><label for="editor-title" class="block text-sm font-medium">標題</label><input type="text" id="editor-title" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600"></div>
        <div><label for="editor-date" class="block text-sm font-medium">發布日期</label><input type="date" id="editor-date" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600"></div>
        <div><label class="block text-sm font-medium">標籤</label><div id="tags-input-container" class="form-input mt-1 flex flex-wrap gap-2 items-center dark:bg-gray-700 dark:border-gray-600"><input type="text" id="tags-input" class="flex-grow bg-transparent border-none focus:ring-0 p-0" placeholder="輸入後按 Enter..."></div></div>
        <div><label class="block text-sm font-medium">封面圖片</label><div class="mt-1"><img id="cover-preview" class="w-full aspect-video object-cover rounded bg-gray-200 dark:bg-gray-700 hidden mb-2"><input type="text" id="editor-cover-image-url" class="form-input w-full mb-2 dark:bg-gray-700 dark:border-gray-600" placeholder="貼上 URL 或上傳"><label for="cover-upload" class="cursor-pointer bg-indigo-500 text-white text-center py-2 px-4 rounded-md hover:bg-indigo-600 w-full inline-block">上傳圖片</label><input type="file" id="cover-upload" class="hidden" accept="image/*"><div id="upload-progress-container" class="w-full bg-gray-200 rounded-full h-2.5 mt-2 hidden"><div id="upload-progress-bar" class="bg-indigo-600 h-2.5 rounded-full" style="width: 0%"></div></div></div></div>
    </div>
    <div class="flex-grow flex flex-col h-full w-full md:w-2/3">
        <div id="editor-container" class="flex-grow relative h-full"></div>
        <div class="flex-shrink-0 p-4 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-700 flex justify-between items-center"><button id="delete-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">刪除</button><div class="space-x-4"><button id="cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="save-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">儲存</button></div></div>
    </div>
  </div>
</div>

<div id="confirmation-modal" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center"><div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl p-6 w-11/12 max-w-sm text-center"><h3 id="confirmation-title" class="text-xl font-bold mb-4"></h3><p id="confirmation-message" class="text-gray-600 dark:text-gray-300 mb-6"></p><div class="flex justify-center space-x-4"><button id="confirm-cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-6 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="confirm-action-btn" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">確定</button></div></div></div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

    // Firebase Config (保留原有設定)
    const firebaseConfig = { apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y", authDomain: "blog-63ad2.firebaseapp.com", projectId: "blog-63ad2", storageBucket: "blog-63ad2.appspot.com", messagingSenderId: "265914768921", appId: "1:265914768921:web:e4c752780e604d0be69488", databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com", };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // --- GLOBAL STATE & UI ELEMENTS ---
    let appState = { articles: {}, allTags: new Map(), isEditMode: false, currentArticleId: null, sortedIds: [], isSidebarOpen: localStorage.getItem('sidebarOpen') !== 'false' };
    let editor; let searchIndex; let confirmationCallback = null; let searchDebounceTimer = null; let editorIsDirty = false;

    const ui = {
        html: document.documentElement, sidebar: document.getElementById('sidebar'), mainContent: document.getElementById('main-content'),
        sortOrder: document.getElementById('sort-order'), popularTagsContainer: document.getElementById('popular-tags-container'),
        pageTitle: document.getElementById('page-title'), editorOverlay: document.getElementById('editor-overlay'), confirmationModal: document.getElementById('confirmation-modal'),
        adminToolbar: document.getElementById('admin-toolbar'), newArticleLink: document.getElementById('new-article-link'),
        editor: { title: document.getElementById('editor-title'), date: document.getElementById('editor-date'), tagsInput: document.getElementById('tags-input'), tagsContainer: document.getElementById('tags-input-container'), coverUrl: document.getElementById('editor-cover-image-url'), coverUpload: document.getElementById('cover-upload'), coverPreview: document.getElementById('cover-preview'), uploadProgressContainer: document.getElementById('upload-progress-container'), uploadProgressBar: document.getElementById('upload-progress-bar'), container: document.getElementById('editor-container'), saveBtn: document.getElementById('save-btn'), cancelBtn: document.getElementById('cancel-btn'), deleteBtn: document.getElementById('delete-btn') }
    };

    // Callout icons (保留)
    const calloutIcons = {/* same icons kept minimal for readability */
        NOTE: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"></path></svg>`,
        TIP: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414z"></path></svg>`,
        INFO: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16z"></path></svg>`,
        WARNING: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.22 3.009-1.742 3.009H4.42c-1.522 0-2.492-1.675-1.742-3.009l5.58-9.92z"></path></svg>`,
        DANGER: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16z"></path></svg>`
    };

    // --- Helpers ---
    const getHash = str => { let h = 0; for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h); return Math.abs(h); };
    const formatDate = dateStr => new Date(dateStr).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });

    // --- Core ---
    async function loadData() {
        switchView('loading-view');
        try {
            const snap = await get(ref(db, 'blogData/articles'));
            appState.articles = snap.exists() ? snap.val() : {};
            appState.sortedIds = Object.keys(appState.articles);
            processTags(); setupSearch(); sortArticles(); renderPopularTags();
        } catch (error) { console.error('Data loading failed:', error); }
        switchView('home-view');
    }

    function processTags() {
        appState.allTags.clear();
        Object.values(appState.articles).forEach(a => (a.tags || []).forEach(t => appState.allTags.set(t, (appState.allTags.get(t) || 0) + 1)));
    }

    function sortArticles() {
        const sortMethod = ui.sortOrder.value;
        appState.sortedIds.sort((a, b) => {
            const artA = appState.articles[a], artB = appState.articles[b];
            if (sortMethod === 'oldest') return new Date(artA.date) - new Date(artB.date);
            if (sortMethod === 'views') return (artB.viewCount || 0) - (artA.viewCount || 0);
            return new Date(artB.date) - new Date(artA.date);
        });
        renderArticleGrid();
    }

    function setupSearch() {
        try {
            searchIndex = lunr(function () { this.ref('id'); this.field('title', { boost: 10 }); this.field('tags', { boost: 5 }); this.field('content'); appState.sortedIds.forEach(id => this.add({ id, ...appState.articles[id], tags: (appState.articles[id].tags || []).join(' ') })); });
        } catch (e) { console.warn('lunr 建立失敗，將使用簡易搜尋備援', e); searchIndex = null; }
    }

    // --- Rendering ---
    function renderArticleGrid(ids = appState.sortedIds) {
        ui.pageTitle.textContent = document.getElementById('page-title').textContent || '最新文章';
        const grid = document.getElementById('article-grid');
        grid.innerHTML = ids.length === 0 ? `<p class="text-gray-500 col-span-full text-center">找不到文章。</p>` : ids.map(id => {
            const article = appState.articles[id]; if (!article) return '';
            const tagsHtml = (article.tags || []).map(tag => `<span class="text-xs font-semibold py-1 px-2 uppercase rounded-full text-white" style="background-color: hsl(${getHash(tag) % 360}, 60%, 45%);">${tag}</span>`).join(' ');
            const cover = article.coverImage || `https://placehold.co/600x400/a78bfa/ffffff?text=${encodeURIComponent(article.title)}`;
            return `<div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden transform hover:-translate-y-1 transition-all duration-300 group" data-id="${id}"><div class="relative"><img src="${cover}" alt="${article.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"><div class="absolute inset-0 bg-black/20"></div></div><div class="p-6 relative"><h3 class="text-xl font-bold mb-2 truncate group-hover:text-indigo-500 dark:group-hover:text-indigo-400 cursor-pointer">${article.title}</h3><p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${formatDate(article.date)}</p><div class="flex flex-wrap gap-2">${tagsHtml}</div>${appState.isEditMode ? `<button class="card-edit-btn absolute top-4 right-4 bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center opacity-80 hover:opacity-100" data-id="${id}">✏️</button>` : ''}</div></div>`;
        }).join('');
    }

    async function renderArticle(id) {
        const article = appState.articles[id]; if (!article) return;
        if (!sessionStorage.getItem(`viewed_${id}`)) {
            sessionStorage.setItem(`viewed_${id}`, 'true');
            const newCount = (article.viewCount || 0) + 1;
            try { await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount }); article.viewCount = newCount; } catch(e) { console.warn('更新檢視次數失敗', e); }
        }
        // 先把 ==highlight== 換成 <mark>
        const preprocessed = (article.content || '').replace(/==([^=]+)==/g, '<mark>$1</mark>');
        const contentHtml = marked.parse(preprocessed);
        const view = document.getElementById('article-view');
        view.innerHTML = `<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-lg shadow-lg"><button class="back-to-list-btn text-indigo-600 dark:text-indigo-400 hover:underline mb-6">← 返回列表</button><h1 class="text-3xl md:text-5xl font-bold mb-4">${article.title}</h1><div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-gray-500 dark:text-gray-400 mb-6 pb-6 border-b dark:border-gray-600"><span>📅 ${formatDate(article.date)}</span><span>👁️ ${article.viewCount || 1} 次檢視</span></div>${article.coverImage ? `<img src="${article.coverImage}" class="w-full rounded-lg mb-8 aspect-video object-cover">` : ''}<div class="prose dark:prose-invert max-w-none">${contentHtml}</div></div>`;
        // highlight.js: 使用新版 API
        if (window.hljs) view.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        switchView('article-view');
    }

    function renderAllTagsPage() {
        const container = document.getElementById('tags-container');
        const sortedTags = [...appState.allTags.entries()].sort((a, b) => b[1] - a[1]);
        container.innerHTML = sortedTags.map(([tag, count]) => `<button class="tag-filter-btn text-white font-semibold py-2 px-4 rounded-full transition-transform hover:scale-105" style="background-color: hsl(${getHash(tag) % 360}, 60%, 45%);" data-tag="${tag}">${tag} <span class="ml-2 text-xs opacity-75">${count}</span></button>`).join('');
    }

    function renderPopularTags() {
        const sortedTags = [...appState.allTags.entries()].sort((a, b) => b[1] - a[1]).slice(0, 7);
        ui.popularTagsContainer.innerHTML = sortedTags.map(([tag]) => `<button class="tag-filter-btn text-xs font-semibold py-1 px-2 rounded-full text-white" style="background-color: hsl(${getHash(tag) % 360}, 60%, 45%);" data-tag="${tag}">${tag}</button>`).join('');
    }

    // --- Editor & Data Mutation ---
    function openEditor(id = null) {
        if (!editor) {
            editor = new toastui.Editor({ el: ui.editor.container, height: '100%', initialEditType: 'markdown', previewStyle: 'vertical' });
            // 監聽變更，標示為 dirty
            editor.on('change', () => { setEditorDirty(true); });
        }
        resetEditorForm();
        const article = id ? appState.articles[id] : null;
        if (article) {
            ui.editor.title.value = article.title || '';
            ui.editor.date.value = article.date ? article.date.split('T')[0] : '';
            ui.editor.coverUrl.value = article.coverImage || '';
            updateCoverPreview(article.coverImage);
            (article.tags || []).forEach(createTagPill);
            editor.setMarkdown(article.content || '');
            setEditorDirty(false);
        } else {
            ui.editor.date.value = new Date().toISOString().split('T')[0];
            const starter = "> [!NOTE] 這是一個提示框。\n\n> [!TIP] Title\n> 這是另一個帶有標題的提示框。\n\n一般文字可以用 `==` 來 ==高亮== 顯示。";
            editor.setMarkdown(starter);
            setEditorDirty(true);
        }
        ui.editor.saveBtn.dataset.id = id;
        ui.editor.deleteBtn.dataset.id = id;
        ui.editor.deleteBtn.style.display = id ? 'block' : 'none';
        ui.editorOverlay.style.display = 'flex';
        ui.editor.title.focus();
    }

    function setEditorDirty(v) { editorIsDirty = !!v; document.getElementById('dirty-indicator').style.background = editorIsDirty ? '#ef4444' : '#a0aec0'; }

    async function saveArticle() {
        const id = ui.editor.saveBtn.dataset.id || `post_${Date.now()}`;
        let coverImageUrl = ui.editor.coverUrl.value.trim();
        const file = ui.editor.coverUpload.files[0];
        if (file) {
            try { coverImageUrl = await uploadCoverImage(file, id); }
            catch (error) { alert('圖片上傳失敗!'); console.error(error); return; }
        }
        const articleData = {
            title: ui.editor.title.value.trim() || '未命名文章', date: new Date(ui.editor.date.value).toISOString(),
            tags: getTagsFromEditor(), coverImage: coverImageUrl, content: editor.getMarkdown(),
            viewCount: (id && appState.articles[id]?.viewCount) || 0,
        };
        try { await set(ref(db, `blogData/articles/${id}`), articleData); } catch(e) { alert('儲存失敗'); console.error(e); return; }
        ui.editorOverlay.style.display = 'none'; setEditorDirty(false);
        await loadData();
        if (appState.currentArticleId === id) renderArticle(id); else switchView('home-view');
    }

    function deleteArticle(id) {
        if (!id || !appState.articles[id]) return;
        showConfirmation(`確定刪除 "${appState.articles[id].title}"?`, '此操作無法復原。', async () => {
            await remove(ref(db, `blogData/articles/${id}`)); ui.editorOverlay.style.display = 'none'; ui.confirmationModal.style.display = 'none'; await loadData(); switchView('home-view');
        });
    }

    function uploadCoverImage(file, id) {
        return new Promise((resolve, reject) => {
            const fileRef = storageRef(storage, `covers/${id}_${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(fileRef, file);
            ui.editor.uploadProgressContainer.style.display = 'block';
            uploadTask.on('state_changed', (s) => { ui.editor.uploadProgressBar.style.width = ((s.bytesTransferred / s.totalBytes) * 100) + '%'; }, (e) => reject(e), async () => { resolve(await getDownloadURL(uploadTask.snapshot.ref)); });
        });
    }

    function updateCoverPreview(url) { ui.editor.coverPreview.style.display = url ? 'block' : 'none'; if (url) ui.editor.coverPreview.src = url; }

    function resetEditorForm() {
        ui.editor.title.value = ''; ui.editor.date.value = ''; ui.editor.coverUrl.value = '';
        ui.editor.coverUpload.value = ''; updateCoverPreview('');
        ui.editor.tagsContainer.querySelectorAll('.tag-pill').forEach(el => el.remove());
        editor?.setMarkdown(''); ui.editor.uploadProgressContainer.style.display = 'none'; setEditorDirty(false);
    }

    function getTagsFromEditor() { return [...ui.editor.tagsContainer.querySelectorAll('.tag-pill')].map(p => p.dataset.tag); }
    function createTagPill(tag) {
        tag = tag.trim(); if (!tag || getTagsFromEditor().includes(tag)) return;
        const pill = document.createElement('span');
        pill.className = 'tag-pill flex items-center bg-indigo-100 dark:bg-indigo-800 text-indigo-800 dark:text-indigo-100 text-sm font-medium pl-2.5 pr-1 py-0.5 rounded-full';
        pill.dataset.tag = tag; pill.innerHTML = `${tag} <button type="button" class="ml-1.5 flex-shrink-0 h-4 w-4 rounded-full inline-flex items-center justify-center text-indigo-400 hover:bg-indigo-200 dark:hover:bg-indigo-700 hover:text-indigo-500 focus:outline-none">&times;</button>`;
        ui.editor.tagsContainer.insertBefore(pill, ui.editor.tagsInput);
    }

    // --- UI & Modals ---
    function switchView(viewName) { ['home-view', 'article-view', 'tags-view', 'loading-view'].forEach(id => document.getElementById(id).classList.toggle('active', id === viewName)); window.scrollTo(0, 0); }
    function toggleSidebar(forceState) {
        const shouldBeOpen = typeof forceState === 'boolean' ? forceState : !appState.isSidebarOpen;
        appState.isSidebarOpen = shouldBeOpen; document.getElementById('sidebar').classList.toggle('-translate-x-full', !shouldBeOpen);
        document.getElementById('main-content').classList.toggle('md:ml-72', shouldBeOpen);
        localStorage.setItem('sidebarOpen', shouldBeOpen);
    }
    function updateTheme(isDark) { localStorage.setItem('theme', isDark ? 'dark' : 'light'); document.documentElement.classList.toggle('dark', isDark); document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙'; }
    function toggleAdminMode(enable) { appState.isEditMode = enable; ui.newArticleLink.classList.toggle('hidden', !enable); ui.adminToolbar.style.display = enable ? 'block' : 'none'; renderArticleGrid(); }
    function showConfirmation(title, message, onConfirm) { document.getElementById('confirmation-title').textContent = title; document.getElementById('confirmation-message').textContent = message; ui.confirmationModal.style.display = 'flex'; confirmationCallback = onConfirm; }

    // --- Init & Events ---
    document.addEventListener('DOMContentLoaded', () => {
        updateTheme(document.documentElement.classList.contains('dark'));
        toggleSidebar(appState.isSidebarOpen);
        loadData();

        // Central click handler
        document.body.addEventListener('click', e => {
            const target = e.target; const closest = sel => target.closest(sel);
            if (closest('#sidebar-toggle')) toggleSidebar();
            else if (closest('#site-title-sidebar')) { document.getElementById('search-input').value = ''; sortArticles(); switchView('home-view'); }
            else if (closest('.nav-link')) { e.preventDefault(); const nav = closest('.nav-link').dataset.nav; if (nav === 'home') { sortArticles(); switchView('home-view'); } else if (nav === 'tags') { renderAllTagsPage(); switchView('tags-view'); } else if (nav === 'new-article') openEditor(); }
            else if (closest('.card-edit-btn')) openEditor(closest('[data-id]').dataset.id);
            else if (closest('.group[data-id]')) renderArticle(closest('[data-id]').dataset.id);
            else if (closest('.back-to-list-btn')) switchView('home-view');
            else if (closest('.tag-filter-btn')) { const tag = closest('.tag-filter-btn').dataset.tag; const ids = appState.sortedIds.filter(id => (appState.articles[id].tags || []).includes(tag)); renderArticleGrid(ids); document.getElementById('page-title').textContent = `標籤: #${tag}`; switchView('home-view'); }
            else if (closest('#theme-toggle')) updateTheme(!document.documentElement.classList.contains('dark'));
            else if (closest('#admin-login')) { const p = prompt('Admin Password:'); if (p === "980621") { toggleAdminMode(true); alert('管理模式已啟用！'); } else if (p) { alert('密碼錯誤！'); } }
            else if (closest('#save-btn')) saveArticle();
            else if (closest('#cancel-btn')) { if (editorIsDirty && confirm('有未儲存變更，確定要離開？')) ui.editorOverlay.style.display = 'none'; else if (!editorIsDirty) ui.editorOverlay.style.display = 'none'; }
            else if (closest('#delete-btn')) deleteArticle(closest('#delete-btn').dataset.id);
            else if (closest('#confirm-action-btn')) confirmationCallback && confirmationCallback();
            else if (closest('#confirm-cancel-btn')) ui.confirmationModal.style.display = 'none';
            else if (closest('.tag-pill button')) closest('.tag-pill').remove();
        });

        // Sort control
        ui.sortOrder.addEventListener('change', sortArticles);

        // Search with debounce and fallback
        document.getElementById('search-input').addEventListener('input', e => {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                const query = e.target.value.trim();
                if (!query) { sortArticles(); return; }
                if (searchIndex) {
                    try { const results = searchIndex.search(query + '*').map(r => r.ref); renderArticleGrid(results); document.getElementById('page-title').textContent = `搜尋結果: "${query}"`; switchView('home-view'); return; } catch (err) { console.warn('lunr 搜尋錯誤，退回簡易搜尋', err); }
                }
                // fallback: simple filter
                const results = appState.sortedIds.filter(id => { const a = appState.articles[id]; return (a.title||'').toLowerCase().includes(query.toLowerCase()) || (a.tags||[]).join(' ').toLowerCase().includes(query.toLowerCase()) || (a.content||'').toLowerCase().includes(query.toLowerCase()); });
                renderArticleGrid(results); document.getElementById('page-title').textContent = `搜尋結果: "${query}"`; switchView('home-view');
            }, 250);
        });

        ui.editor.coverUpload.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => updateCoverPreview(ev.target.result); r.readAsDataURL(f); setEditorDirty(true); } });
        ui.editor.coverUrl.addEventListener('input', e => { updateCoverPreview(e.target.value); setEditorDirty(true); });
        ui.editor.tagsInput.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); createTagPill(ui.editor.tagsInput.value); ui.editor.tagsInput.value = ''; setEditorDirty(true); } });

        // Import/Export JSON (admin)
        document.getElementById('export-json').addEventListener('click', () => {
            const blob = new Blob([JSON.stringify(appState.articles, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `kai_studio_articles_${Date.now()}.json`; a.click(); URL.revokeObjectURL(url);
        });
        document.getElementById('import-json-input').addEventListener('change', async (e) => {
            const f = e.target.files[0]; if (!f) return; const text = await f.text(); try { const obj = JSON.parse(text); // overwrite remote (confirmation)
                if (!confirm('匯入將會覆蓋遠端文章，確定要繼續？')) return; for (const [id, data] of Object.entries(obj)) { await set(ref(db, `blogData/articles/${id}`), data); } alert('匯入完成'); await loadData(); } catch (err) { alert('匯入失敗，檔案格式錯誤'); console.error(err); }
        });

        // Admin: keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { if (ui.editorOverlay.style.display === 'flex') { if (editorIsDirty && !confirm('有未儲存變更，確定要關閉？')) return; ui.editorOverlay.style.display = 'none'; } if (ui.confirmationModal.style.display === 'flex') ui.confirmationModal.style.display = 'none'; }
            if (e.key === 'n' && appState.isEditMode) openEditor();
        });

        // beforeunload: warn if editor dirty
        window.addEventListener('beforeunload', (e) => { if (editorIsDirty) { e.preventDefault(); e.returnValue = ''; } });
    });

</script>

</body>
</html>
