<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAI Studio — 手機優化版</title>
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link id="hl-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
    <link id="hl-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

    <!-- Fonts & Styles -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- Base & Fonts --- */
        body { font-family: 'Noto Sans TC', 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Scrollbar --- */
        :root { --scrollbar-thumb: #a0aec0; --scrollbar-track: #edf2f7; }
        html.dark { --scrollbar-thumb: #4a5568; --scrollbar-track: #1a202c; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #718096; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #a0aec0; }

        /* --- Callouts & Mark --- */
        mark { background-color: #fef08a; padding: 0.1em 0.2em; border-radius: 3px; }
        html.dark mark { background-color: #a16207; color: #fefce8; }
        .callout { padding: 1rem; margin: 1.2rem 0; border-left-width: 4px; border-radius: 0.25rem; background-color: #f3f4f6; }
        html.dark .callout { background-color: #1f2937; }
        .callout-title { display:flex; align-items:center; font-weight:700; margin-bottom:0.4rem; }
        .callout-title svg{ width:1.1rem; height:1.1rem; margin-right:0.6rem }

        /* Admin toolbar */
        #admin-toolbar { display:none }
        .editor-dirty-indicator { width:8px; height:8px; border-radius:50%; display:inline-block; margin-left:6px }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200">
    <script>
      (function() {
        // 立即套用主題以避免畫面閃爍
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

<div class="flex">

        <div class="text-center mb-6"><h1 id="site-title-sidebar" class="text-3xl font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer">🌐 KAI STUDIO</h1><p class="text-sm text-gray-500 dark:text-gray-400 mt-2">探索音樂的無限可能。</p></div>
        <div class="relative mb-4"><input type="search" id="search-input" placeholder="搜尋文章..." class="w-full pl-10 pr-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700 border-transparent focus:ring-2 focus:ring-indigo-500 outline-none"><svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
        <div class="mb-4"><label for="sort-order" class="text-xs font-bold uppercase text-gray-500 dark:text-gray-400">排序方式</label><select id="sort-order" class="form-select mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 text-sm"><option value="newest">最新日期</option><option value="oldest">最舊日期</option><option value="views">最多觀看</option></select></div>

  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl w-full h-full flex flex-col overflow-hidden md:max-w-7xl md:h-[90vh]">
    <!-- Settings Panel (Mobile: Top, Desktop: Left) -->

        <div><label for="editor-title" class="block text-sm font-medium">標題</label><input type="text" id="editor-title" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600"></div>
        <div><label for="editor-date" class="block text-sm font-medium">發布日期</label><input type="date" id="editor-date" class="form-input mt-1 block w-full dark:bg-gray-700 dark:border-gray-600"></div>
        <div><label class="block text-sm font-medium">標籤</label><div id="tags-input-container" class="form-input mt-1 flex flex-wrap gap-2 items-center dark:bg-gray-700 dark:border-gray-600"><input type="text" id="tags-input" class="flex-grow bg-transparent border-none focus:ring-0 p-0" placeholder="輸入後按 Enter..."></div></div>

        <div><label class="block text-sm font-medium">封面圖片</label><div class="mt-1"><img id="cover-preview" class="w-full aspect-video object-cover rounded bg-gray-200 dark:bg-gray-700 hidden mb-2"><input type="text" id="editor-cover-image-url" class="form-input w-full mb-2 dark:bg-gray-700 dark:border-gray-600" placeholder="貼上 URL 或上傳"><label for="cover-upload" class="cursor-pointer bg-indigo-500 text-white text-center py-2 px-4 rounded-md hover:bg-indigo-600 w-full inline-block">上傳圖片</label><input type="file" id="cover-upload" class="hidden" accept="image/*"><div id="upload-progress-container" class="w-full bg-gray-200 rounded-full h-2.5 mt-2 hidden"><div id="upload-progress-bar" class="bg-indigo-600 h-2.5 rounded-full" style="width: 0%"></div></div></div></div>

            <div class="space-x-4">
                <button id="cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded-lg hover:bg-gray-300">取消</button>
                <button id="save-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">儲存</button>

<!-- Confirmation Modal -->
<div id="confirmation-modal" class="fixed inset-0 bg-black/60 z-[60] hidden items-center justify-center"><div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl p-6 w-11/12 max-w-sm text-center"><h3 id="confirmation-title" class="text-xl font-bold mb-4"></h3><p id="confirmation-message" class="text-gray-600 dark:text-gray-300 mb-6"></p><div class="flex justify-center space-x-4"><button id="confirm-cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-6 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="confirm-action-btn" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">確定</button></div></div></div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y", authDomain: "blog-63ad2.firebaseapp.com", projectId: "blog-63ad2", storageBucket: "blog-63ad2.appspot.com", messagingSenderId: "265914768921", appId: "1:265914768921:web:e4c752780e604d0be69488", databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com", };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // --- GLOBAL STATE & UI ELEMENTS ---
    let appState = { articles: {}, allTags: new Map(), tagColors: {}, isEditMode: false, currentArticleId: null, sortedIds: [], isSidebarOpen: false };
    let editor; let searchIndex; let confirmationCallback = null; let searchDebounceTimer = null; let editorIsDirty = false;

    const ui = {
        editorOverlay: document.getElementById('editor-overlay'),
        confirmationModal: document.getElementById('confirmation-modal'),
        adminToolbar: document.getElementById('admin-toolbar'),
        newArticleLink: document.getElementById('new-article-link'),
        sortOrder: document.getElementById('sort-order'),
        pageTitle: document.getElementById('page-title'),
        popularTagsContainer: document.getElementById('popular-tags-container'),
        editor: {
            title: document.getElementById('editor-title'),
            date: document.getElementById('editor-date'),
            tagsInput: document.getElementById('tags-input'),
            tagsContainer: document.getElementById('tags-input-container'),
            coverUrl: document.getElementById('editor-cover-image-url'),
            coverUpload: document.getElementById('cover-upload'),
            coverPreview: document.getElementById('cover-preview'),
            uploadProgressContainer: document.getElementById('upload-progress-container'),
            uploadProgressBar: document.getElementById('upload-progress-bar'),
            container: document.getElementById('editor-container'),
            saveBtn: document.getElementById('save-btn'),
            cancelBtn: document.getElementById('cancel-btn'),
            deleteBtn: document.getElementById('delete-btn')
        },
        tagColorEditor: document.getElementById('tag-color-editor')
    };

    // --- Helpers ---
    const getHash = str => { let h = 0; for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h); return Math.abs(h); };
    const formatDate = dateStr => new Date(dateStr).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
    const getTagColor = tag => appState.tagColors[tag] || `hsl(${getHash(tag) % 360}, 60%, 45%)`;

    // --- Core ---
    async function loadData() {
        switchView('loading-view');
        try {
            const articlesSnap = await get(ref(db, 'blogData/articles'));
            appState.articles = articlesSnap.exists() ? articlesSnap.val() : {};

            const tagColorsSnap = await get(ref(db, 'blogData/tagColors'));
            appState.tagColors = tagColorsSnap.exists() ? tagColorsSnap.val() : {};

            appState.sortedIds = Object.keys(appState.articles);
            processTags();
            setupSearch();
            sortArticles(); // This function calls renderArticleGrid
            renderPopularTags();

            switchView('home-view');
        } catch (error) {
            console.error('Data loading or processing failed:', error);
            const grid = document.getElementById('article-grid');
            if(grid) grid.innerHTML = `<p class="text-red-500 col-span-full text-center">無法載入文章。請檢查網路連線或稍後再試。</p>`;
            switchView('home-view');
        }
    }

    function processTags() {
        appState.allTags.clear();
        Object.values(appState.articles).forEach(a => (a.tags || []).forEach(t => appState.allTags.set(t, (appState.allTags.get(t) || 0) + 1)));
    }

    function sortArticles() {
        const sortMethod = ui.sortOrder.value;
        appState.sortedIds.sort((a, b) => {
            const artA = appState.articles[a], artB = appState.articles[b];
            if (sortMethod === 'oldest') return new Date(artA.date) - new Date(artB.date);
            if (sortMethod === 'views') return (artB.viewCount || 0) - (artA.viewCount || 0);
            return new Date(artB.date) - new Date(artA.date);
        });
        const titleMap = { newest: '最新文章', oldest: '最舊文章', views: '最多觀看文章' };
        ui.pageTitle.textContent = titleMap[sortMethod] || '最新文章';
        renderArticleGrid();
    }

    function setupSearch() {
        try {
            searchIndex = lunr(function () { this.ref('id'); this.field('title', { boost: 10 }); this.field('tags', { boost: 5 }); this.field('content'); appState.sortedIds.forEach(id => this.add({ id, ...appState.articles[id], tags: (appState.articles[id].tags || []).join(' ') })); });
        } catch (e) { console.warn('lunr failed to build index, falling back to simple search', e); searchIndex = null; }
    }

    // --- Rendering ---
    function renderArticleGrid(ids = appState.sortedIds) {
        const grid = document.getElementById('article-grid');
        grid.innerHTML = ids.length === 0 ? `<p class="text-gray-500 col-span-full text-center">找不到文章。</p>` : ids.map(id => {
            const article = appState.articles[id]; if (!article) return '';
            const tagsHtml = (article.tags || []).map(tag => `<span class="text-xs font-semibold py-1 px-2 uppercase rounded-full text-white" style="background-color: ${getTagColor(tag)};">${tag}</span>`).join(' ');
            const cover = article.coverImage || `https://placehold.co/600x400/a78bfa/ffffff?text=${encodeURIComponent(article.title)}`;
            return `<div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transform hover:-translate-y-2 transition-all duration-300 group" data-id="${id}"><div class="relative"><img src="${cover}" alt="${article.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"></div><div class="p-6 relative"><h3 class="text-xl font-bold mb-2 truncate group-hover:text-indigo-500 dark:group-hover:text-indigo-400 cursor-pointer">${article.title}</h3><p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${formatDate(article.date)}</p><div class="flex flex-wrap gap-2">${tagsHtml}</div>${appState.isEditMode ? `<button class="card-edit-btn absolute top-4 right-4 bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center opacity-80 hover:opacity-100" data-id="${id}">✏️</button>` : ''}</div></div>`;
        }).join('');
    }

    async function renderArticle(id) {
        const article = appState.articles[id]; if (!article) return;
        if (!sessionStorage.getItem(`viewed_${id}`)) {
            sessionStorage.setItem(`viewed_${id}`, 'true');
            const newCount = (article.viewCount || 0) + 1;
            try { await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount }); article.viewCount = newCount; } catch(e) { console.warn('Failed to update view count', e); }
        }
        const preprocessed = (article.content || '').replace(/==([^=]+)==/g, '<mark>$1</mark>');
        const contentHtml = marked.parse(preprocessed);
        const view = document.getElementById('article-view');
        view.innerHTML = `<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-xl shadow-md"><button class="back-to-list-btn text-indigo-600 dark:text-indigo-400 hover:underline mb-6">← 返回列表</button><h1 class="text-3xl md:text-5xl font-bold mb-4">${article.title}</h1><div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-gray-500 dark:text-gray-400 mb-6 pb-6 border-b dark:border-gray-600"><span>📅 ${formatDate(article.date)}</span><span>👁️ ${article.viewCount || 1} 次檢視</span></div>${article.coverImage ? `<img src="${article.coverImage}" class="w-full rounded-lg mb-8 aspect-video object-cover shadow-sm">` : ''}<div class="prose dark:prose-invert max-w-none">${contentHtml}</div></div>`;
        if (window.hljs) view.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        switchView('article-view');
    }

    function renderAllTagsPage() {
        const container = document.getElementById('tags-container');
        const sortedTags = [...appState.allTags.entries()].sort((a, b) => b[1] - a[1]);
        container.innerHTML = sortedTags.map(([tag, count]) => `<button class="tag-filter-btn text-white font-semibold py-2 px-4 rounded-full transition-transform hover:scale-105" style="background-color: ${getTagColor(tag)};" data-tag="${tag}">${tag} <span class="ml-2 text-xs opacity-75">${count}</span></button>`).join('');
    }

    function renderPopularTags() {
        const sortedTags = [...appState.allTags.entries()].sort((a, b) => b[1] - a[1]).slice(0, 7);
        ui.popularTagsContainer.innerHTML = sortedTags.map(([tag]) => `<button class="tag-filter-btn text-xs font-semibold py-1 px-2 rounded-full text-white" style="background-color: ${getTagColor(tag)};" data-tag="${tag}">${tag}</button>`).join('');
    }

    // --- Editor & Data Mutation ---
    function openEditor(id = null) {
        if (editor) editor.destroy();
        const isMobile = window.innerWidth < 768;
        editor = new toastui.Editor({
            el: ui.editor.container,
            height: '100%',
            initialEditType: 'markdown',
            previewStyle: isMobile ? 'tab' : 'vertical', // Mobile uses tab for more space
            theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light',
            toolbarItems: [['heading', 'bold', 'italic'], ['hr', 'quote'], ['ul', 'ol', 'task'], ['table', 'image', 'link'], ['code', 'codeblock']]
        });
        editor.on('change', () => { setEditorDirty(true); });
        resetEditorForm();
        const article = id ? appState.articles[id] : null;
        if (article) {
            ui.editor.title.value = article.title || '';
            ui.editor.date.value = article.date ? article.date.split('T')[0] : '';
            ui.editor.coverUrl.value = article.coverImage || '';
            updateCoverPreview(article.coverImage);
            (article.tags || []).forEach(createTagPill);
            editor.setMarkdown(article.content || '');
            setEditorDirty(false);
        } else {
            ui.editor.date.value = new Date().toISOString().split('T')[0];
            editor.setMarkdown('');
            setEditorDirty(true);
        }
        renderTagColorEditors((article ? article.tags : []) || []);
        ui.editor.saveBtn.dataset.id = id;
        ui.editor.deleteBtn.dataset.id = id;
        ui.editor.deleteBtn.style.display = id ? 'block' : 'none';
        ui.editorOverlay.style.display = 'flex';
        document.body.classList.add('overflow-hidden');
        ui.editor.title.focus();
    }

    function renderTagColorEditors(tags) {
        ui.tagColorEditor.innerHTML = tags.map(tag => `<div><label class="block text-sm font-medium">${tag} 顏色</label><input type="color" value="${getTagColor(tag)}" data-tag="${tag}" class="mt-1 block w-full h-8 rounded-md border-gray-300 dark:border-gray-600"></div>`).join('');
    }

    function setEditorDirty(v) { editorIsDirty = !!v; document.getElementById('dirty-indicator').style.background = editorIsDirty ? '#ef4444' : '#a0aec0'; }

    function closeEditor() {
        if (editorIsDirty && !confirm('有未儲存的變更，確定要離開嗎？')) return;
        ui.editorOverlay.style.display = 'none';
        document.body.classList.remove('overflow-hidden');
        setEditorDirty(false);
    }

    async function saveArticle() {
        const id = ui.editor.saveBtn.dataset.id || `post_${Date.now()}`;
        let coverImageUrl = ui.editor.coverUrl.value.trim();
        const file = ui.editor.coverUpload.files[0];
        if (file) {
            try { coverImageUrl = await uploadCoverImage(file, id); }
            catch (error) { alert('圖片上傳失敗!'); console.error(error); return; }
        }
        const articleData = {
            title: ui.editor.title.value.trim() || '未命名文章', date: new Date(ui.editor.date.value).toISOString(),
            tags: getTagsFromEditor(), coverImage: coverImageUrl, content: editor.getMarkdown(),
            viewCount: (id && appState.articles[id]?.viewCount) || 0,
        };
        try { await set(ref(db, `blogData/articles/${id}`), articleData); } catch(e) { alert('儲存失敗'); console.error(e); return; }
        const newColors = {};
        ui.tagColorEditor.querySelectorAll('input[type="color"]').forEach(input => { newColors[input.dataset.tag] = input.value; });
        await update(ref(db, 'blogData/tagColors'), newColors);
        ui.editorOverlay.style.display = 'none';
        document.body.classList.remove('overflow-hidden');
        setEditorDirty(false);
        await loadData();
        if (appState.currentArticleId === id) renderArticle(id); else switchView('home-view');
    }

    function deleteArticle(id) {
        if (!id || !appState.articles[id]) return;
        showConfirmation(`確定刪除 "${appState.articles[id].title}"?`, '此操作無法復原。', async () => {
            await remove(ref(db, `blogData/articles/${id}`));
            ui.editorOverlay.style.display = 'none';
            document.body.classList.remove('overflow-hidden');
            ui.confirmationModal.style.display = 'none';
            await loadData();
            switchView('home-view');
        });
    }

    function uploadCoverImage(file, id) {
        return new Promise((resolve, reject) => {
            const fileRef = storageRef(storage, `covers/${id}_${Date.now()}_${file.name}`);
            const uploadTask = uploadBytesResumable(fileRef, file);
            ui.editor.uploadProgressContainer.style.display = 'block';
            uploadTask.on('state_changed', (s) => { ui.editor.uploadProgressBar.style.width = ((s.bytesTransferred / s.totalBytes) * 100) + '%'; }, (e) => reject(e), async () => { resolve(await getDownloadURL(uploadTask.snapshot.ref)); });
        });
    }

    function updateCoverPreview(url) { ui.editor.coverPreview.style.display = url ? 'block' : 'none'; if (url) ui.editor.coverPreview.src = url; }
    function resetEditorForm() { ui.editor.title.value = ''; ui.editor.date.value = ''; ui.editor.coverUrl.value = ''; ui.editor.coverUpload.value = ''; updateCoverPreview(''); ui.editor.tagsContainer.querySelectorAll('.tag-pill').forEach(el => el.remove()); editor?.setMarkdown(''); ui.editor.uploadProgressContainer.style.display = 'none'; setEditorDirty(false); ui.tagColorEditor.innerHTML = ''; }
    function getTagsFromEditor() { return [...ui.editor.tagsContainer.querySelectorAll('.tag-pill')].map(p => p.dataset.tag); }
    function createTagPill(tag) {
        tag = tag.trim(); if (!tag || getTagsFromEditor().includes(tag)) return;
        const pill = document.createElement('span');
        pill.className = 'tag-pill flex items-center bg-indigo-100 dark:bg-indigo-800 text-indigo-800 dark:text-indigo-100 text-sm font-medium pl-2.5 pr-1 py-0.5 rounded-full';
        pill.dataset.tag = tag; pill.innerHTML = `${tag} <button type="button" class="ml-1.5 flex-shrink-0 h-4 w-4 rounded-full inline-flex items-center justify-center text-indigo-400 hover:bg-indigo-200 dark:hover:bg-indigo-700 hover:text-indigo-500 focus:outline-none">&times;</button>`;
        ui.editor.tagsContainer.insertBefore(pill, ui.editor.tagsInput);
        renderTagColorEditors(getTagsFromEditor());
    }

    // --- UI & Modals ---
    function switchView(viewName) { ['home-view', 'article-view', 'tags-view', 'loading-view'].forEach(id => document.getElementById(id).classList.toggle('active', id === viewName)); window.scrollTo(0, 0); }
    
    function toggleSidebar(forceState) {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        if (!sidebar || !backdrop) return;
        const shouldBeOpen = typeof forceState === 'boolean' ? forceState : !appState.isSidebarOpen;
        appState.isSidebarOpen = shouldBeOpen;
        if (shouldBeOpen) {
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
            if (window.innerWidth < 768) document.body.classList.add('overflow-hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }
    }

    function updateTheme(isDark) {
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', isDark);
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.textContent = isDark ? '☀️' : '🌙';
        const hlLight = document.getElementById('hl-light');
        const hlDark = document.getElementById('hl-dark');
        if (hlLight) hlLight.disabled = isDark;
        if (hlDark) hlDark.disabled = !isDark;
        if (editor && editor.getUI().getRootElement().parentElement) {
            editor.setTheme(isDark ? 'dark' : 'light');
        }
    }

    function toggleAdminMode(enable) { appState.isEditMode = enable; ui.newArticleLink.classList.toggle('hidden', !enable); ui.adminToolbar.style.display = enable ? 'block' : 'none'; renderArticleGrid(); }
    function showConfirmation(title, message, onConfirm) { document.getElementById('confirmation-title').textContent = title; document.getElementById('confirmation-message').textContent = message; ui.confirmationModal.style.display = 'flex'; confirmationCallback = onConfirm; }

    // --- Init & Events ---
    document.addEventListener('DOMContentLoaded', () => {
        const isDark = document.documentElement.classList.contains('dark');
        updateTheme(isDark);
        loadData();

        document.body.addEventListener('click', e => {
            const target = e.target; const closest = sel => target.closest(sel);
            if (closest('#sidebar-toggle')) toggleSidebar();
            else if (closest('#site-title-sidebar')) { document.getElementById('search-input').value = ''; sortArticles(); switchView('home-view'); toggleSidebar(false); }
            else if (closest('.nav-link')) { e.preventDefault(); const nav = closest('.nav-link').dataset.nav; if (nav === 'home') { sortArticles(); switchView('home-view'); } else if (nav === 'tags') { renderAllTagsPage(); switchView('tags-view'); } else if (nav === 'new-article') openEditor(); toggleSidebar(false); }
            else if (closest('.card-edit-btn')) openEditor(closest('[data-id]').dataset.id);
            else if (closest('.group[data-id]')) renderArticle(closest('[data-id]').dataset.id);
            else if (closest('.back-to-list-btn')) switchView('home-view');
            else if (closest('.tag-filter-btn')) { const tag = closest('.tag-filter-btn').dataset.tag; const ids = appState.sortedIds.filter(id => (appState.articles[id].tags || []).includes(tag)); renderArticleGrid(ids); document.getElementById('page-title').textContent = `標籤: #${tag}`; switchView('home-view'); toggleSidebar(false); }
            else if (closest('#theme-toggle')) updateTheme(!document.documentElement.classList.contains('dark'));
            else if (closest('#copyright-info')) { const p = prompt('Admin Password:'); if (p === "980621") { toggleAdminMode(true); alert('管理模式已啟用！'); } else if (p) { alert('密碼錯誤！'); } }
            else if (closest('#save-btn')) saveArticle();
            else if (closest('#cancel-btn')) closeEditor();
            else if (closest('#delete-btn')) deleteArticle(closest('#delete-btn').dataset.id);
            else if (closest('#confirm-action-btn')) confirmationCallback && confirmationCallback();
            else if (closest('#confirm-cancel-btn')) ui.confirmationModal.style.display = 'none';
            else if (closest('.tag-pill button')) { closest('.tag-pill').remove(); setEditorDirty(true); renderTagColorEditors(getTagsFromEditor()); }
            else if (closest('#sidebar-backdrop')) toggleSidebar(false);
        });

        ui.sortOrder.addEventListener('change', sortArticles);
        document.getElementById('search-input').addEventListener('input', e => {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                const query = e.target.value.trim();
                if (!query) { sortArticles(); return; }
                if (searchIndex) {
                    try { const results = searchIndex.search(query + '*').map(r => r.ref); renderArticleGrid(results); document.getElementById('page-title').textContent = `搜尋結果: "${query}"`; switchView('home-view'); return; } catch (err) { console.warn('lunr search error, falling back to simple search', err); }
                }
                const results = appState.sortedIds.filter(id => { const a = appState.articles[id]; return (a.title||'').toLowerCase().includes(query.toLowerCase()) || (a.tags||[]).join(' ').toLowerCase().includes(query.toLowerCase()) || (a.content||'').toLowerCase().includes(query.toLowerCase()); });
                renderArticleGrid(results); document.getElementById('page-title').textContent = `搜尋結果: "${query}"`; switchView('home-view');
            }, 250);
        });

        ui.editor.coverUpload.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => updateCoverPreview(ev.target.result); r.readAsDataURL(f); setEditorDirty(true); } });
        ui.editor.coverUrl.addEventListener('input', e => { updateCoverPreview(e.target.value); setEditorDirty(true); });
        ui.editor.tagsInput.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); createTagPill(ui.editor.tagsInput.value); ui.editor.tagsInput.value = ''; setEditorDirty(true); } });
        ui.editor.title.addEventListener('input', () => setEditorDirty(true));
        ui.editor.date.addEventListener('input', () => setEditorDirty(true));
        ui.tagColorEditor.addEventListener('input', e => { if (e.target.type === 'color') setEditorDirty(true); });

        document.getElementById('export-json').addEventListener('click', () => {
            const blob = new Blob([JSON.stringify(appState.articles, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `kai_studio_articles_${Date.now()}.json`; a.click(); URL.revokeObjectURL(url);
        });
        document.getElementById('import-json-input').addEventListener('change', async (e) => {
            const f = e.target.files[0]; if (!f) return; const text = await f.text(); try { const obj = JSON.parse(text); if (!confirm('匯入將會覆蓋遠端文章，確定要繼續？')) return; for (const [id, data] of Object.entries(obj)) { await set(ref(db, `blogData/articles/${id}`), data); } alert('匯入完成'); await loadData(); } catch (err) { alert('匯入失敗，檔案格式錯誤'); console.error(err); }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (ui.editorOverlay.style.display === 'flex') closeEditor();
                if (ui.confirmationModal.style.display === 'flex') ui.confirmationModal.style.display = 'none';
            }
        });
        window.addEventListener('beforeunload', (e) => { if (editorIsDirty) { e.preventDefault(); e.returnValue = ''; } });
    });
</script>
</body>
</html>
