        .callout-tip     { background-color: #f0fdf4; border-color: #22c55e; color: #166534; }

class="flex-shrink-0 p-4 bg-gray-50 dark:bg-gray-900 border-t dark:border-gray-700 flex justify-between items-center"><button id="delete-btn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">刪除</button><div class="space-x-4"><button id="cancel-btn" class="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded-lg hover:bg-gray-300">取消</button><button id="save-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">儲存</button></div></div></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y", authDomain: "blog-63ad2.firebaseapp.com", projectId: "blog-63ad2", storageBucket: "blog-63ad2.appspot.com", messagingSenderId: "265914768921", appId: "1:265914768921:web:e4c752780e604d0be69488", databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let appState = { articles: {}, allTags: new Map(), isEditMode: false, currentArticleId: null, sortedIds: [], isSidebarOpen: localStorage.getItem('sidebarOpen') !== 'false' };
        let editor;
        let searchIndex;
        let confirmationCallback = null;

        const ui = {
            main: document.getElementById('main-content'),
            sidebar: document.getElementById('sidebar'),
            mobileMenu: document.getElementById('mobile-menu'),
            mobileMenuOverlay: document.getElementById('mobile-menu-overlay'),
            pageTitle: document.getElementById('page-title'),
            editorOverlay: document.getElementById('editor-overlay'),
            confirmationModal: document.getElementById('confirmation-modal'),
            editor: {
                title: document.getElementById('editor-title'), date: document.getElementById('editor-date'),
                tagsInput: document.getElementById('tags-input'), tagsContainer: document.getElementById('tags-input-container'),
                coverUrl: document.getElementById('editor-cover-image-url'), coverUpload: document.getElementById('cover-upload'),
                coverPreview: document.getElementById('cover-preview'), uploadProgressContainer: document.getElementById('upload-progress-container'),
                uploadProgressBar: document.getElementById('upload-progress-bar'), container: document.getElementById('editor-container'),
                saveBtn: document.getElementById('save-btn'), cancelBtn: document.getElementById('cancel-btn'), deleteBtn: document.getElementById('delete-btn'),
            },
        };

        const calloutIcons = { NOTE: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"></path></svg>`, TIP: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm-.707 10.607a1 1 0 011.414 0l.707-.707a1 1 0 111.414 1.414l-.707.707a1 1 0 01-1.414 0zM4 11a1 1 0 100-2H3a1 1 0 100 2h1z"></path></svg>`, INFO: `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 5.168A1 1 0 008 6v.083c1.135.346 2.095.966 2.744 1.858A1 1 0 0012 8.373V10.5a1 1 0 001.903.428l.013-.037a1 1 0 00-1.229-1.242l-.025.01C11.642 9.21 11.12 8.5 10.5 8.055V6.621a1 1 0 00-.945-1.453zM10 14a1 1 0 100 2 1 1 0 000-2z"></path></svg>`, WARNING: `<svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.22 3.009-1.742 3.009H4.42c-1.522 0-2.492-1.675-1.742-3.009l5.58-9.92zM10 13a1 1 0 110-2 1 1 0 010 2zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"></path></svg>`, DANGER: `<svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"></path></svg>`,};
        const markedExtensions = { gfm: true, breaks: true, extensions: [{ name: 'highlight', level: 'inline', start(src) { return src.indexOf('=='); }, tokenizer(src) { const match = src.match(/^==([^=]+)==/); if (match) return { type: 'highlight', raw: match[0], text: this.lexer.inlineTokens(match[1]) }; }, renderer(token) { return `<mark>${this.parser.parseInline(token.text)}</mark>`; } }], renderer: (() => { const r = new marked.Renderer(); const o = r.blockquote.bind(r); r.blockquote = q => { const m = q.match(/<p>\s*\[\!(.*?)\]\s?(.*?)<\/p>([\s\S]*)/); if(m){const t=m[1].toUpperCase(),i=m[2],c=m[3],e=calloutIcons[t]||calloutIcons.NOTE; return `<div class="callout callout-${t.toLowerCase()}"><div class="callout-title">${e}${i}</div>${c}</div>`;} return o(q); }; return r; })() };
        
        const getHash = str => { let h = 0; for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h); return h; };
        const formatDate = dateStr => new Date(dateStr).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
        
        async function loadData() { switchView('loading-view'); try { const snap = await get(ref(db, 'blogData/articles')); appState.articles = snap.exists() ? snap.val() : {}; appState.sortedIds = Object.keys(appState.articles); processTags(); setupSearch(); sortArticles(); renderSidebars(); } catch (error) { console.error("Data loading failed:", error); } switchView('home-view'); }
        function processTags() { appState.allTags.clear(); Object.values(appState.articles).forEach(a => (a.tags || []).forEach(t => appState.allTags.set(t, (appState.allTags.get(t) || 0) + 1))); }
        function sortArticles() { const sortMethod = document.querySelector('#sidebar .sort-order').value; appState.sortedIds.sort((a, b) => { const artA = appState.articles[a], artB = appState.articles[b]; if (sortMethod === 'oldest') return new Date(artA.date) - new Date(artB.date); if (sortMethod === 'views') return (artB.viewCount || 0) - (artA.viewCount || 0); return new Date(artB.date) - new Date(artA.date); }); renderArticleGrid(); }
        function setupSearch() { searchIndex = lunr(function () { this.ref('id'); this.field('title', { boost: 10 }); this.field('tags', { boost: 5 }); this.field('content'); appState.sortedIds.forEach(id => this.add({ id, ...appState.articles[id], tags: (appState.articles[id].tags || []).join(' ') })); }); }
        
        function renderArticleGrid(ids = appState.sortedIds) { ui.pageTitle.textContent = "最新文章"; const grid = document.getElementById('article-grid'); grid.innerHTML = ids.length === 0 ? `<p class="text-gray-500 col-span-full text-center">找不到文章。</p>` : ids.map(id => { const article = appState.articles[id]; if (!article) return ''; const tagsHtml = (article.tags || []).map(tag => `<span class="text-xs font-semibold py-1 px-2 uppercase rounded-full text-white" style="background-color: hsl(${getHash(tag) % 360}, 60%, 45%);">${tag}</span>`).join(' '); return `<div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden transform hover:-translate-y-1 transition-all duration-300 group" data-id="${id}"><div class="relative"><img src="${article.coverImage || `https://placehold.co/600x400/a78bfa/ffffff?text=${encodeURIComponent(article.title)}`}" alt="${article.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300"><div class="absolute inset-0 bg-black/20"></div></div><div class="p-6 relative"><h3 class="text-xl font-bold mb-2 truncate group-hover:text-indigo-500 dark:group-hover:text-indigo-400 cursor-pointer">${article.title}</h3><p class="text-sm text-gray-500 dark:text-gray-400 mb-4">${formatDate(article.date)}</p><div class="flex flex-wrap gap-2">${tagsHtml}</div>${appState.isEditMode ? `<button class="card-edit-btn absolute top-4 right-4 bg-indigo-500 text-white rounded-full w-8 h-8 flex items-center justify-center opacity-80 hover:opacity-100" data-id="${id}">✏️</button>` : ''}</div></div>`; }).join(''); }
        async function renderArticle(id) { const article = appState.articles[id]; if (!article) return; if (!sessionStorage.getItem(`viewed_${id}`)) { sessionStorage.setItem(`viewed_${id}`, 'true'); const newCount = (article.viewCount || 0) + 1; await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount }); article.viewCount = newCount; } const contentHtml = marked.parse(article.content || '', markedExtensions); const view = document.getElementById('article-view'); view.innerHTML = `<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-4 sm:p-8 rounded-lg shadow-lg"><button class="back-to-list-btn text-indigo-600 dark:text-indigo-400 hover:underline mb-6">← 返回列表</button><h1 class="text-3xl md:text-5xl font-bold mb-4">${article.title}</h1><div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-gray-500 dark:text-gray-400 mb-6 pb-6 border-b dark:border-gray-600"><span>📅 ${formatDate(article.date)}</span><span>👁️ ${article.viewCount || 1} 次檢視</span></div>${article.coverImage ? `<img src="${article.coverImage}" class="w-full rounded-lg mb-8 aspect-video object-cover">` : ''}<div class="prose dark:prose-invert max-w-none">${contentHtml}</div></div>`; if (window.hljs) view.querySelectorAll('pre code').forEach(el => hljs.highlightBlock(el)); switchView('article-view'); }
        function renderAllTagsPage() { const c = document.getElementById('tags-container'); const s = [...appState.allTags.entries()].sort((a,b)=>b[1]-a[1]); c.innerHTML = s.map(([t,co])=>`<button class="tag-filter-btn text-white font-semibold py-2 px-4 rounded-full transition-transform hover:scale-105" style="background-color: hsl(${getHash(t)%360}, 60%, 45%);" data-tag="${t}">${t} <span class="ml-2 text-xs opacity-75">${co}</span></button>`).join(''); }
        function renderSidebars() { const content = document.getElementById('sidebar-template').innerHTML; ui.sidebar.innerHTML = content; ui.mobileMenu.innerHTML = content; const sortedTags = [...appState.allTags.entries()].sort((a, b) => b[1] - a[1]).slice(0, 7); const tagsHtml = sortedTags.map(([tag]) => `<button class="tag-filter-btn text-xs font-semibold py-1 px-2 rounded-full text-white" style="background-color: hsl(${getHash(tag) % 360}, 60%, 45%);" data-tag="${tag}">${tag}</button>`).join(''); document.querySelectorAll('.popular-tags-container').forEach(c => c.innerHTML = tagsHtml); updateThemeUI(); toggleAdminUI(); }
        
        function openEditor(id = null) { if (!editor) { editor = new toastui.Editor({ el: ui.editor.container, height: '100%', initialEditType: 'markdown', previewStyle: 'vertical' }); } resetEditorForm(); const article = id ? appState.articles[id] : null; if (article) { ui.editor.title.value = article.title || ''; ui.editor.date.value = article.date ? article.date.split('T')[0] : ''; ui.editor.coverUrl.value = article.coverImage || ''; updateCoverPreview(article.coverImage); (article.tags || []).forEach(createTagPill); editor.setMarkdown(article.content || ''); } else { ui.editor.date.value = new Date().toISOString().split('T')[0]; editor.setMarkdown("> [!NOTE] 這是一個提示框。\n\n> [!TIP] Title\n> 這是另一個帶有標題的提示框。\n\n一般文字可以用 `==` 來 ==高亮== 顯示。"); } ui.editor.saveBtn.dataset.id = id; ui.editor.deleteBtn.dataset.id = id; ui.editor.deleteBtn.style.display = id ? 'block' : 'none'; ui.editorOverlay.style.display = 'flex'; }
        async function saveArticle() { const id = ui.editor.saveBtn.dataset.id || `post_${Date.now()}`; let coverImageUrl = ui.editor.coverUrl.value.trim(); const file = ui.editor.coverUpload.files[0]; if (file) { try { coverImageUrl = await uploadCoverImage(file, id); } catch (error) { alert('圖片上傳失敗!'); console.error(error); return; } } const articleData = { title: ui.editor.title.value.trim() || '未命名文章', date: new Date(ui.editor.date.value).toISOString(), tags: getTagsFromEditor(), coverImage: coverImageUrl, content: editor.getMarkdown(), viewCount: (id && appState.articles[id]?.viewCount) || 0, }; await set(ref(db, `blogData/articles/${id}`), articleData); ui.editorOverlay.style.display = 'none'; await loadData(); if (appState.currentArticleId === id) renderArticle(id); else switchView('home-view'); }
        function deleteArticle(id) { if (!id || !appState.articles[id]) return; showConfirmation(`確定刪除 "${appState.articles[id].title}"?`, '此操作無法復原。', async () => { await remove(ref(db, `blogData/articles/${id}`), {}); ui.editorOverlay.style.display = 'none'; ui.confirmationModal.style.display = 'none'; await loadData(); switchView('home-view'); }); }
        function uploadCoverImage(file, id) { return new Promise((resolve, reject) => { const fileRef = storageRef(storage, `covers/${id}_${Date.now()}_${file.name}`); const uploadTask = uploadBytesResumable(fileRef, file); ui.editor.uploadProgressContainer.style.display = 'block'; uploadTask.on('state_changed', (s) => { ui.editor.uploadProgressBar.style.width = ((s.bytesTransferred / s.totalBytes) * 100) + '%'; }, (e) => reject(e), async () => { resolve(await getDownloadURL(uploadTask.snapshot.ref)); }); }); }
        function updateCoverPreview(url) { ui.editor.coverPreview.style.display = url ? 'block' : 'none'; if (url) ui.editor.coverPreview.src = url; }
        function resetEditorForm() { ui.editor.title.value = ''; ui.editor.date.value = ''; ui.editor.coverUrl.value = ''; ui.editor.coverUpload.value = ''; updateCoverPreview(''); ui.editor.tagsContainer.querySelectorAll('.tag-pill').forEach(el => el.remove()); editor?.setMarkdown(''); ui.editor.uploadProgressContainer.style.display = 'none'; }
        function getTagsFromEditor() { return [...ui.editor.tagsContainer.querySelectorAll('.tag-pill')].map(p => p.dataset.tag); }
        function createTagPill(tag) { tag = tag.trim(); if (!tag || getTagsFromEditor().includes(tag)) return; const pill = document.createElement('span'); pill.className = 'tag-pill flex items-center bg-indigo-100 dark:bg-indigo-800 text-indigo-800 dark:text-indigo-100 text-sm font-medium pl-2.5 pr-1 py-0.5 rounded-full'; pill.dataset.tag = tag; pill.innerHTML = `${tag} <button type="button" class="ml-1.5 flex-shrink-0 h-4 w-4 rounded-full inline-flex items-center justify-center text-indigo-400 hover:bg-indigo-200 dark:hover:bg-indigo-700 hover:text-indigo-500 focus:outline-none">&times;</button>`; ui.editor.tagsContainer.insertBefore(pill, ui.editor.tagsInput); }
        
        function switchView(viewName) { ['home-view', 'article-view', 'tags-view', 'loading-view'].forEach(id => document.getElementById(id).classList.toggle('active', id === viewName)); window.scrollTo(0, 0); }
        function toggleDesktopSidebar(forceState) { const shouldBeOpen = typeof forceState === 'boolean' ? forceState : !appState.isSidebarOpen; appState.isSidebarOpen = shouldBeOpen; ui.sidebar.classList.toggle('-translate-x-full', !shouldBeOpen); ui.main.classList.toggle('md:ml-72', shouldBeOpen); localStorage.setItem('sidebarOpen', shouldBeOpen); }
        function toggleMobileMenu(show) { ui.mobileMenuOverlay.classList.toggle('hidden', !show); ui.mobileMenu.classList.toggle('translate-x-full', !show); }
        function updateThemeUI() { const isDark = document.documentElement.classList.contains('dark'); document.querySelectorAll('.theme-icon').forEach(i => i.textContent = isDark ? '☀️' : '🌙'); }
        function toggleAdminUI() { document.querySelectorAll('[data-nav="new-article"]').forEach(el => el.classList.toggle('hidden', !appState.isEditMode)); }
        function showConfirmation(title, message, onConfirm) { document.getElementById('confirmation-title').textContent = title; document.getElementById('confirmation-message').textContent = message; ui.confirmationModal.style.display = 'flex'; confirmationCallback = onConfirm; }

        document.addEventListener('DOMContentLoaded', () => {
            toggleDesktopSidebar(appState.isSidebarOpen);
            loadData();

            document.body.addEventListener('click', e => {
                const target = e.target; const action = target.closest('[data-action]')?.dataset.action;
                const nav = target.closest('[data-nav]')?.dataset.nav;
                const card = target.closest('.group[data-id]');
                const tagBtn = target.closest('.tag-filter-btn');

                if (action === 'go-home' || nav === 'home' || target.id === 'site-title-mobile') { e.preventDefault(); document.querySelector('.search-input').value = ''; sortArticles(); switchView('home-view'); toggleMobileMenu(false); }
                else if (nav === 'tags') { e.preventDefault(); renderAllTagsPage(); switchView('tags-view'); toggleMobileMenu(false); }
                else if (nav === 'new-article') { e.preventDefault(); openEditor(); toggleMobileMenu(false); }
                else if (action === 'toggle-theme') { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); updateThemeUI(); }
                else if (action === 'admin-login') { const p = prompt('Admin Password:'); if (p === "980621") { appState.isEditMode = true; toggleAdminUI(); renderArticleGrid(); alert('管理模式已啟用！'); } else if (p) { alert('密碼錯誤！'); } }
                else if (target.id === 'sidebar-toggle') { window.innerWidth < 768 ? toggleMobileMenu(true) : toggleDesktopSidebar(); }
                else if (target.id === 'mobile-menu-overlay') { toggleMobileMenu(false); }
                else if (target.closest('.card-edit-btn')) openEditor(target.closest('[data-id]').dataset.id);
                else if (card) renderArticle(card.dataset.id);
                else if (target.closest('.back-to-list-btn')) switchView('home-view');
                else if (tagBtn) { const tag = tagBtn.dataset.tag; const ids = appState.sortedIds.filter(id => (appState.articles[id].tags || []).includes(tag)); renderArticleGrid(ids); ui.pageTitle.textContent = `標籤: #${tag}`; switchView('home-view'); toggleMobileMenu(false); }
                else if (target.id === 'save-btn') saveArticle();
                else if (target.id === 'cancel-btn') ui.editorOverlay.style.display = 'none';
                else if (target.id === 'delete-btn') deleteArticle(target.dataset.id);
                else if (target.id === 'confirm-action-btn') confirmationCallback && confirmationCallback();
                else if (target.id === 'confirm-cancel-btn') ui.confirmationModal.style.display = 'none';
                else if (target.closest('.tag-pill button')) target.closest('.tag-pill').remove();
            });

            document.body.addEventListener('change', e => { if (e.target.matches('.sort-order')) sortArticles(); });
            document.body.addEventListener('keyup', e => { if (e.target.matches('.search-input')) { const query = e.target.value.trim(); if (!query) { sortArticles(); return; } const results = searchIndex.search(query + '*').map(r => r.ref); renderArticleGrid(results); ui.pageTitle.textContent = `搜尋結果: "${query}"`; switchView('home-view'); }});
            
            ui.editor.coverUpload.addEventListener('change', e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = e => updateCoverPreview(e.target.result); r.readAsDataURL(f); } });
            ui.editor.coverUrl.addEventListener('input', e => updateCoverPreview(e.target.value));
            ui.editor.tagsInput.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); createTagPill(ui.editor.tagsInput.value); ui.editor.tagsInput.value = ''; } });
        });
    </script>
</body>
</html>
