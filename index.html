<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link id="hl-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css" media="all">
    <link id="hl-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" media="none">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <script src="https://unpkg.com/lunr/lunr.js"></script>

    <!-- Fonts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f8fafc; --text-color: #0f172a; --card-bg: #ffffff; --border-color: #e6eef6;
            --primary-color: #0ea5e9; --primary-color-hover: #0284c7; --shadow-color: rgba(0,0,0,0.05);
            --scrollbar-thumb: #cbd5e1; --scrollbar-track: #f1f5f9;
        }
        body.dark-mode {
            --bg-color: #0b1220; --text-color: #e2e8f0; --card-bg: #0f1724; --border-color: #1f2937;
            --primary-color: #38bdf8; --primary-color-hover: #0ea5e9; --shadow-color: rgba(0,0,0,0.25);
            --scrollbar-thumb: #475569; --scrollbar-track: #1e293b;
        }
        body {
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            transition: background-color .25s ease, color .25s ease;
        }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn .28s ease; }
        @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: var(--scrollbar-track); } ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        .toastui-editor-defaultUI, .toastui-editor-md-preview, .toastui-editor-ww-container .toastui-editor-contents { background-color: var(--card-bg) !important; color: var(--text-color) !important; }
        .nav-link.active-nav { background-color: color-mix(in srgb, var(--primary-color) 12%, transparent); color: var(--primary-color); font-weight: 600; }
        .editor-tab.active { background-color: var(--primary-color); color: white; }
        /* toast */
        #toast-container{position:fixed;top:1.5rem;right:1.5rem;z-index:10000;display:flex;flex-direction:column;gap:.75rem}
        .toast{padding:0.8rem 1.2rem;border-radius:.5rem;box-shadow:0 8px 20px rgba(2,6,23,.08);color:white;opacity:0;transform:translateX(12px);animation:toastIn .28s forwards}
        .toast.success{background:#22c55e}.toast.error{background:#ef4444}.toast.info{background:#3b82f6}
        @keyframes toastIn { to { opacity:1; transform:translateX(0) } }
        /* small responsive */
        @media (min-width: 768px) { .md\\:ml-72 { margin-left: 18rem; } }
        /* tag pill fallback */
        .tag-pill { display:inline-flex; align-items:center; gap:.4rem; padding:.12rem .5rem; border-radius:999px; font-size:.825rem; }
    </style>
</head>

<script type="module">
    // Firebase 模組引入（請確認你的網域與設定允許）
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, get, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKiC62bh50NXLMWwbfNHekmVCBtTtam6Y",
        authDomain: "blog-63ad2.firebaseapp.com",
        projectId: "blog-63ad2",
        storageBucket: "blog-63ad2.appspot.com",
        messagingSenderId: "265914768921",
        appId: "1:265914768921:web:e4c752780e604d0be69488",
        databaseURL: "https://blog-63ad2-default-rtdb.firebaseio.com",
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    // APP state & UI
    let appState = { articles: {}, allTags: new Map(), tagColors: {}, isEditMode: false, currentArticleId: null, sortedIds: [] };
    let editor = null;
    let searchIndex = null;
    let confirmationCallback = null;
    let searchDebounceTimer = null;
    let editorIsDirty = false;

    // 改為較不刺眼的標籤色盤（避免亮黃+白字）
    const TAG_PALETTE = ['#ef4444','#fb8c00','#d97706','#f59e0b','#10b981','#38bdf8','#60a5fa','#7dd3fc','#64748b','#0ea5e9'];

    // 幫助函式：根據背景色選擇適合的文字顏色（黑或白）
    const getTextColorForBg = (hex) => {
        if(!hex || hex[0] !== '#') return '#ffffff';
        const rgb = hex.slice(1).match(/.{2}/g).map(c => parseInt(c,16));
        const [r,g,b] = rgb;
        // 計算感知亮度 (YIQ)
        const yiq = (r*299 + g*587 + b*114) / 1000;
        return yiq >= 150 ? '#0f1724' : '#ffffff';
    };

    const getTagColor = (tag) => {
        if (appState.tagColors && appState.tagColors[tag]) return appState.tagColors[tag];
        // fallback: hash tag to palette index
        const sum = Array.from(tag).reduce((a,c)=>a + c.charCodeAt(0), 0);
        return TAG_PALETTE[sum % TAG_PALETTE.length];
    };

    const showToast = (message, type='info') => {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        t.textContent = message;
        c.appendChild(t);
        setTimeout(()=> { t.style.opacity = '0'; try{ t.remove(); }catch(e){} }, 4000);
    };

    const formatDate = d => {
        if(!d) return '';
        return new Date(d).toLocaleDateString('zh-TW', { year:'numeric', month:'short', day:'numeric' });
    };

    // UI 缓存 (會在 DOMContentLoaded 做映射)
    const ui = {};

    // Data load / process
    async function loadData() {
        switchView('loading-view');
        try {
            const [articlesSnap, tagColorsSnap] = await Promise.all([
                get(ref(db, `blogData/articles`)),
                get(ref(db, `blogData/tagColors`))
            ]);
            appState.articles = articlesSnap.exists() ? articlesSnap.val() : {};
            appState.tagColors = tagColorsSnap.exists() ? tagColorsSnap.val() : {};
            appState.sortedIds = Object.keys(appState.articles || {});
            processTags();
            setupSearch();
            sortArticles();
            renderPopularTags();
            switchView('home-view');
        } catch(e) {
            console.error("Data loading failed:", e);
            switchView('home-view');
            showToast('載入資料失敗，請檢查網路或 Firebase 設定','error');
        }
    }

    function processTags(){
        appState.allTags.clear();
        Object.values(appState.articles || {}).forEach(a => (a.tags || []).forEach(t => {
            appState.allTags.set(t, (appState.allTags.get(t) || 0) + 1);
        }));
    }

    function sortArticles(){
        const sort = ui.sortOrder.value;
        appState.sortedIds.sort((a,b)=>{
            const artA = appState.articles[a] || {};
            const artB = appState.articles[b] || {};
            if(sort === 'oldest') return new Date(artA.date || 0) - new Date(artB.date || 0);
            if(sort === 'views') return (artB.viewCount||0) - (artA.viewCount||0);
            return new Date(artB.date || 0) - new Date(artA.date || 0);
        });
        ui.pageTitle.textContent = { newest:'最新文章', oldest:'最舊文章', views:'最多觀看' }[sort];
        renderArticleGrid();
    }

    function setupSearch(){
        try {
            searchIndex = lunr(function(){
                this.ref('id');
                this.field('title', {boost: 10});
                this.field('content');
                this.field('tags', {boost: 5});
                Object.values(appState.articles || {}).forEach(doc => {
                    this.add(Object.assign({}, doc, { tags: (doc.tags || []).join(' ') }));
                });
            });
        } catch(e) {
            console.warn('Search index 建立失敗', e);
            searchIndex = null;
        }
    }

    function renderArticleGrid(ids = appState.sortedIds) {
        const grid = ui.articleGrid;
        if(!ids || ids.length === 0) {
            grid.innerHTML = `<p>找不到文章</p>`;
            return;
        }
        const html = ids.map(id=>{
            const article = appState.articles[id];
            if(!article) return '';
            const tagsHtml = (article.tags || []).map(t => {
                const color = getTagColor(t);
                const textColor = getTextColorForBg(color);
                return `<span class="tag-pill" style="background:${color};color:${textColor}">${escapeHtml(t)}</span>`;
            }).join(' ');
            const cover = article.coverImage || `https://placehold.co/600x400/0ea5e9/ffffff?text=${encodeURIComponent(article.title||'')}`;
            return `
            <div class="article-card bg-[var(--card-bg)] shadow-lg rounded-xl overflow-hidden group" data-id="${escapeHtml(id)}">
                <div class="relative">
                    <img src="${escapeAttr(cover)}" class="w-full h-48 object-cover" alt="${escapeAttr(article.title||'cover')}">
                    <a href="#" data-action="view" class="absolute inset-0" aria-label="查看文章"></a>
                    <div class="admin-controls absolute top-2 right-2 flex flex-col gap-2 z-10">
                        <button data-action="edit" class="bg-sky-500 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg">✏️</button>
                        <button data-action="copy" class="bg-green-500 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg">📄</button>
                        <button data-action="delete" class="bg-red-500 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg">🗑️</button>
                    </div>
                </div>
                <div class="p-6">
                    <h3 class="font-bold text-lg"><a href="#" data-action="view">${escapeHtml(article.title||'未命名')}</a></h3>
                    <p class="text-sm text-gray-500 mt-2">${formatDate(article.date)}</p>
                    <div class="flex flex-wrap gap-2 mt-4">${tagsHtml}</div>
                </div>
            </div>
            `;
        }).join('');
        grid.innerHTML = html;
    }

    async function handleArticleAction(action, id){
        if(!action || !id) return;
        switch(action){
            case 'view': await renderArticle(id); break;
            case 'edit': openEditor(id); break;
            case 'copy': await copyArticle(id); break;
            case 'delete': deleteArticle(id); break;
        }
    }

    async function renderArticle(id){
        appState.currentArticleId = id;
        const article = appState.articles[id];
        if(!article) return;
        if(!sessionStorage.getItem(`viewed${id}`)){
            const newCount = (article.viewCount || 0) + 1;
            try {
                await update(ref(db, `blogData/articles/${id}`), { viewCount: newCount });
                article.viewCount = newCount;
                sessionStorage.setItem(`viewed${id}`, 'true');
            } catch(e) { console.warn('更新觀看次數失敗', e); }
        }
        const content = marked.parse(article.content || '');
        ui.articleView.innerHTML = `
            <div class="max-w-4xl mx-auto bg-[var(--card-bg)] p-8 rounded-lg shadow-lg">
                <button id="back-to-list" class="text-[var(--primary-color)] mb-4">← 返回</button>
                <h1 class="text-4xl font-bold">${escapeHtml(article.title)}</h1>
                <p class="text-gray-500 my-4">📅 ${formatDate(article.date)} | 👁️ ${article.viewCount||1} 次檢視</p>
                <div class="prose dark:prose-invert max-w-none prose-p:text-[var(--text-color)] prose-a:text-[var(--primary-color)]">${content}</div>
            </div>
        `;
        // highlight code
        ui.articleView.querySelectorAll('pre code').forEach(el => {
            try { hljs.highlightElement(el); } catch(e){}
        });
        switchView('article-view');
        const back = document.getElementById('back-to-list');
        if(back) back.addEventListener('click', (e) => { e.preventDefault(); switchView('home-view'); });
    }

    function switchView(viewName){
        ['home-view','article-view','tags-view','tag-manager-view','loading-view'].forEach(v=>{
            ui[v].classList.toggle('active', v === viewName);
        });
        window.scrollTo(0,0);
        const activeNav = { 'home-view':'home','article-view':'home','tags-view':'tags','tag-manager-view':'tag-manager' }[viewName];
        ui.mainNav.querySelectorAll('.nav-link').forEach(n => n.classList.toggle('active-nav', n.dataset.nav === activeNav));
    }

    function toggleSidebar(force){
        const isOpen = typeof force === 'boolean' ? force : !document.documentElement.classList.contains('sidebar-open');
        document.documentElement.classList.toggle('sidebar-open', isOpen);
        ui.sidebar.classList.toggle('-translate-x-full', !isOpen);
        if(window.innerWidth < 768){
            ui.sidebarBackdrop.classList.toggle('hidden', !isOpen);
            document.body.classList.toggle('overflow-hidden', isOpen);
        } else {
            ui.mainContent.classList.toggle('md:ml-72', isOpen);
        }
    }

    function toggleAdminMode(){
        appState.isEditMode = !appState.isEditMode;
        document.body.classList.toggle('edit-mode', appState.isEditMode);
        showToast(appState.isEditMode ? "管理模式已啟用" : "已退出管理模式", 'info');
        renderArticleGrid();
    }

    function renderPopularTags(){
        const sortedTags = [...appState.allTags.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);
        ui.popularTagsContainer.innerHTML = sortedTags.map(([t])=>{
            const color = getTagColor(t);
            const text = getTextColorForBg(color);
            return `<button data-tag="${escapeAttr(t)}" class="tag-filter-btn text-xs font-semibold py-1 px-2 rounded-full" style="background:${color};color:${text}">${escapeHtml(t)}</button>`;
        }).join('');
    }

    function renderAllTagsPage(){
        const sortedTags = [...appState.allTags.entries()].sort((a,b)=>b[1]-a[1]);
        ui.tagsContainer.innerHTML = sortedTags.map(([t,c])=>{
            const color = getTagColor(t);
            const text = getTextColorForBg(color);
            return `<button data-tag="${escapeAttr(t)}" class="tag-filter-btn font-semibold py-2 px-4 rounded-full" style="background:${color};color:${text}">${escapeHtml(t)} <span class="opacity-75">${c}</span></button>`;
        }).join('');
    }

    function renderTagManager(){
        const merged = Array.from(new Set([ ...Object.keys(appState.tagColors || {}), ...appState.allTags.keys() ]));
        merged.sort();
        ui.tagManagerContainer.innerHTML = merged.map(t=>{
            const color = getTagColor(t);
            return `<div class="flex items-center gap-3 p-2 rounded-md"><input type="color" value="${escapeAttr(color)}" data-tag="${escapeAttr(t)}" class="h-8 w-10 rounded"><span class="flex-grow">${escapeHtml(t)}</span><span class="text-xs text-gray-400">${appState.allTags.get(t)||0}篇</span><button data-action="delete-tag" data-tag="${escapeAttr(t)}" class="text-red-500 text-xl">&times;</button></div>`;
        }).join('');
    }

    async function addNewTag(){
        const name = ui.newTagName.value.trim();
        const color = ui.newTagColor.value;
        if(!name){ showToast('請輸入標籤名稱','error'); return; }
        appState.tagColors[name] = color;
        await update(ref(db, 'blogData/tagColors'), appState.tagColors);
        ui.newTagName.value = '';
        renderTagManager();
        showToast('標籤已新增','success');
    }

    async function deleteTag(tag){
        showConfirmation(`確定刪除標籤 "${tag}"?`, '這將從所有文章中移除此標籤。', async ()=>{
            const updates = {};
            Object.entries(appState.articles || {}).forEach(([id, art])=>{
                if(art.tags?.includes(tag)){
                    updates[`blogData/articles/${id}/tags`] = art.tags.filter(t=>t !== tag);
                }
            });
            updates[`blogData/tagColors/${tag}`] = null;
            try {
                await update(ref(db), updates);
                ui.confirmationModal.style.display = 'none';
                await loadData();
                renderTagManager();
                showToast('標籤已刪除','info');
            } catch(e) {
                showToast('刪除失敗','error');
            }
        });
    }

    async function saveTagColors(){
        const newColors = {};
        ui.tagManagerContainer.querySelectorAll('input[type="color"]').forEach(i => {
            newColors[i.dataset.tag] = i.value;
        });
        try {
            await update(ref(db, 'blogData/tagColors'), newColors);
            appState.tagColors = newColors;
            showToast('顏色已儲存','success');
            await loadData();
        } catch(e) {
            showToast('儲存顏色失敗','error');
        }
    }

    function openEditor(id=null){
        // destroy old editor
        if(editor && typeof editor.destroy === 'function') { editor.destroy(); editor = null; }
        editor = new toastui.Editor({
            el: ui.editorContainer,
            height: '100%',
            initialEditType: 'markdown',
            previewStyle: window.innerWidth < 768 ? 'tab' : 'vertical',
            theme: document.body.classList.contains('dark-mode') ? 'dark' : 'light'
        });
        editor.on('change', () => setEditorDirty(true));
        resetEditorForm();
        const article = id ? appState.articles[id] : null;
        if(article){
            ui.editorTitle.value = article.title || '';
            ui.editorDate.value = article.date ? article.date.split('T')[0] : '';
            ui.editorCoverImageUrl.value = article.coverImage || '';
            updateCoverPreview(article.coverImage || '');
            (article.tags || []).forEach(createTagPill);
            editor.setMarkdown(article.content || '');
            ui.editorDeleteBtn.style.display = 'inline-block';
        } else {
            ui.editorDate.value = new Date().toISOString().split('T')[0];
            ui.editorDeleteBtn.style.display = 'none';
        }
        appState.currentArticleId = id;
        ui.editorOverlay.style.display = 'flex';
    }

    function closeEditor(){
        if(editorIsDirty && !confirm('有未儲存的變更，確定離開?')) return;
        ui.editorOverlay.style.display = 'none';
        if(editor && typeof editor.destroy === 'function') { editor.destroy(); editor = null; }
        setEditorDirty(false);
    }

    async function saveArticle(){
        const id = appState.currentArticleId || `post_${Date.now()}`;
        let coverImage = ui.editorCoverImageUrl.value.trim();
        const file = ui.editorCoverUpload.files[0];
        try {
            if(file){
                coverImage = await uploadCoverImage(file, id);
            }
            const articleData = Object.assign({}, appState.articles[id] || {}, {
                id,
                title: ui.editorTitle.value.trim() || '未命名',
                date: new Date(ui.editorDate.value).toISOString(),
                tags: getTagsFromEditor(),
                coverImage,
                content: editor ? editor.getMarkdown() : '',
                viewCount: (id && appState.articles[id]) ? (appState.articles[id].viewCount || 0) : 0
            });
            await set(ref(db, `blogData/articles/${id}`), articleData);
            showToast('文章已儲存','success');
            closeEditor();
            await loadData();
        } catch(e) {
            console.error(e);
            showToast('儲存失敗','error');
        }
    }

    async function copyArticle(id){
        const original = appState.articles[id];
        if(!original) return;
        const newId = `post_${Date.now()}`;
        try {
            await set(ref(db, `blogData/articles/${newId}`), Object.assign({}, original, { id: newId, title: (original.title||'') + ' (複製)', date: new Date().toISOString(), viewCount: 0 }));
            await loadData();
            openEditor(newId);
        } catch(e){ showToast('複製失敗','error'); }
    }

    function deleteArticle(id){
        showConfirmation(`確定刪除 "${(appState.articles[id] && appState.articles[id].title) || ''}"?`, '此操作無法復原。', async ()=>{
            try {
                await remove(ref(db, `blogData/articles/${id}`));
                showToast('文章已刪除','info');
                closeEditor();
                await loadData();
                switchView('home-view');
            } catch(e) {
                showToast('刪除失敗','error');
            }
        });
    }

    function uploadCoverImage(file, id){
        return new Promise((resolve, reject) => {
            const fileRef = storageRef(storage, `covers/${id}_${file.name}`);
            const task = uploadBytesResumable(fileRef, file);
            task.on('state_changed', null, reject, async ()=>{
                try {
                    const url = await getDownloadURL(fileRef);
                    resolve(url);
                } catch(e){ reject(e); }
            });
        });
    }

    function setEditorDirty(v){
        editorIsDirty = v;
        ui.editorDirtyIndicator.style.backgroundColor = v ? '#ef4444' : '#a0aec0';
    }

    function resetEditorForm(){
        ui.editorTitle.value = '';
        ui.editorDate.value = '';
        ui.editorCoverImageUrl.value = '';
        updateCoverPreview('');
        ui.tagsInputContainer.querySelectorAll('.tag-pill').forEach(e=>e.remove());
        if(editor && typeof editor.setMarkdown === 'function') editor.setMarkdown('');
        setEditorDirty(false);
    }

    function updateCoverPreview(url){
        ui.editorCoverPreview.src = url || '';
        ui.editorCoverPreview.style.display = url ? 'block' : 'none';
    }

    function getTagsFromEditor(){
        return [...ui.tagsInputContainer.querySelectorAll('.tag-pill')].map(p => p.dataset.tag);
    }

    function createTagPill(tag){
        tag = (tag || '').trim();
        if(!tag) return;
        const current = getTagsFromEditor();
        if(current.includes(tag)) return;
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.dataset.tag = tag;
        const color = getTagColor(tag);
        const text = getTextColorForBg(color);
        pill.style.background = color;
        pill.style.color = text;
        pill.innerHTML = `<span style="padding-right:.35rem">${escapeHtml(tag)}</span><button type="button" class="ml-1" aria-label="移除標籤">&times;</button>`;
        ui.tagsInputContainer.insertBefore(pill, ui.tagsInput);
        pill.querySelector('button').addEventListener('click', ()=> pill.remove());
    }

    function showConfirmation(title, msg, cb){
        ui.confirmationTitle.textContent = title;
        ui.confirmationMessage.textContent = msg;
        ui.confirmationModal.style.display = 'flex';
        confirmationCallback = cb;
    }

    function initTagColorPalette(){
        ui.tagColorPalette.innerHTML = TAG_PALETTE.map(c=>`<button class="w-full h-8 rounded-md ring-2 ring-transparent" style="background:${c}" data-color="${c}"></button>`).join('');
        const first = ui.tagColorPalette.querySelector('button');
        if(first){
            first.classList.add('ring-sky-500');
            ui.newTagColor.value = first.dataset.color;
        }
    }

    // DOMContentLoaded: map IDs to ui object for convenience
    document.addEventListener('DOMContentLoaded', ()=>{
        const allIds = Array.from(document.querySelectorAll('[id]')).map(el=>el.id);
        allIds.forEach(id=>{
            const camel = id.replace(/-([a-z])/g, (_,c)=>c.toUpperCase());
            ui[camel] = document.getElementById(id);
        });
        // body & some commonly used
        ui.body = document.body;
        // alias for readability
        ui.mainNav = ui['mainNav'];
        ui.articleGrid = ui['articleGrid'];
        ui.articleView = ui['articleView'];
        ui.popularTagsContainer = ui['popularTagsContainer'];
        ui.tagsContainer = ui['tagsContainer'];
        ui.tagManagerContainer = ui['tagManagerContainer'];
        ui.tagColorPalette = ui['tagColorPalette'];
        ui.newTagName = ui['newTagName'];
        ui.newTagColor = ui['newTagColor'];
        ui.addNewTagBtn = ui['addNewTagBtn'];
        ui.saveTagColors = ui['saveTagColors'];
        ui.sortOrder = ui['sortOrder'];
        ui.searchInput = ui['searchInput'];
        ui.pageTitle = ui['pageTitle'];
        ui.sidebar = ui['sidebar'];
        ui.sidebarToggle = ui['sidebarToggle'];
        ui.sidebarBackdrop = ui['sidebarBackdrop'];
        ui.mainContent = ui['mainContent'];
        ui.themeToggle = ui['themeToggle'];
        ui.editorOverlay = ui['editorOverlay'];
        // editor inner controls
        ui.editor = {};
        ui.editor.container = ui['editorContainer'];
        ui.editor.title = ui['editorTitle'];
        ui.editor.date = ui['editorDate'];
        ui.editor.tagsInput = ui['tagsInput'];
        ui.editor.tagsInputContainer = ui['tagsInputContainer'];
        ui.editor.coverImageUrl = ui['editorCoverImageUrl'];
        ui.editor.coverUpload = ui['editorCoverUpload'];
        ui.editor.coverPreview = ui['editorCoverPreview'];
        ui.editor.saveBtn = ui['editorSaveBtn'];
        ui.editor.cancelBtn = ui['editorCancelBtn'];
        ui.editor.deleteBtn = ui['editorDeleteBtn'];
        ui.editor.dirtyIndicator = ui['editorDirtyIndicator'];
        ui.editor.tabEdit = ui['editorTabEdit'];
        ui.editor.tabPreview = ui['editorTabPreview'];
        ui.editorOverlay = ui['editorOverlay'];
        ui.confirmationModal = ui['confirmationModal'];
        ui.confirmActionBtn = ui['confirmActionBtn'];
        ui.confirmCancelBtn = ui['confirmCancelBtn'];
        ui.confirmationTitle = ui['confirmationTitle'];
        ui.confirmationMessage = ui['confirmationMessage'];

        // event bindings
        ui.themeToggle.addEventListener('click', ()=>{
            const isDark = ui.body.classList.toggle('dark-mode');
            ui.themeToggle.textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('hl-light').media = isDark ? 'none' : 'all';
            document.getElementById('hl-dark').media = isDark ? 'all' : 'none';
            if(editor && typeof editor.setTheme === 'function') editor.setTheme(isDark ? 'dark' : 'light');
        });
        // set highlight styles initially
        if(ui.body.classList.contains('dark-mode')){
            document.getElementById('hl-light').media = 'none';
            document.getElementById('hl-dark').media = 'all';
            ui.themeToggle.textContent = '🌙';
        }

        ui.sidebarToggle.addEventListener('click', ()=> toggleSidebar());
        ui.sidebarBackdrop.addEventListener('click', ()=> toggleSidebar(false));

        // secret admin toggle
        let c = 0;
        ui.copyrightInfo.addEventListener('click', ()=>{
            c++; setTimeout(()=> c = 0, 1000);
            if(c >= 5){
                c = 0;
                const p = prompt("密碼:");
                if(p === "980621") toggleAdminMode(); else if(p) alert("密碼錯誤");
            }
        });

        ui.articleGrid.addEventListener('click', e=>{
            const t = e.target.closest('[data-action]');
            if(t){
                e.preventDefault();
                const card = t.closest('.article-card');
                if(!card) return;
                handleArticleAction(t.dataset.action, card.dataset.id);
            }
        });

        ui.mainNav.addEventListener('click', e=>{
            const t = e.target.closest('.nav-link');
            if(!t) return;
            e.preventDefault();
            const n = t.dataset.nav;
            if(n === 'home') switchView('home-view');
            else if(n === 'tags'){ renderAllTagsPage(); switchView('tags-view'); }
            else if(n === 'tag-manager'){ renderTagManager(); switchView('tag-manager-view'); }
            else if(n === 'new-article') openEditor();
            if(window.innerWidth < 768) toggleSidebar(false);
        });

        ui.sortOrder.addEventListener('change', sortArticles);

        ui.searchInput.addEventListener('input', e=>{
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(()=>{
                const q = e.target.value.trim();
                if(!q){
                    sortArticles(); return;
                }
                if(!searchIndex){
                    // fallback: simple text match
                    const ids = Object.keys(appState.articles).filter(id=>{
                        const a = appState.articles[id];
                        return (a.title || '').includes(q) || (a.content || '').includes(q) || (a.tags || []).join(' ').includes(q);
                    });
                    renderArticleGrid(ids);
                    ui.pageTitle.textContent = `搜尋: "${q}"`;
                    return;
                }
                try {
                    const results = searchIndex.search(q + '*').map(r => r.ref);
                    renderArticleGrid(results);
                    ui.pageTitle.textContent = `搜尋: "${q}"`;
                } catch(e) {
                    sortArticles();
                }
            }, 300);
        });

        document.body.addEventListener('click', e=>{
            const t = e.target;
            if(t.closest('.tag-filter-btn')){
                const btn = t.closest('.tag-filter-btn');
                const tag = btn.dataset.tag;
                const ids = Object.keys(appState.articles || {}).filter(id => (appState.articles[id].tags || []).includes(tag));
                renderArticleGrid(ids);
                ui.pageTitle.textContent = `標籤: #${tag}`;
                switchView('home-view');
                if(window.innerWidth < 768) toggleSidebar(false);
            }
        });

        ui.addNewTagBtn.addEventListener('click', addNewTag);
        ui.saveTagColors.addEventListener('click', saveTagColors);

        ui.tagManagerContainer.addEventListener('click', e=>{
            const del = e.target.closest('[data-action="delete-tag"]');
            if(del) deleteTag(del.dataset.tag);
        });

        ui.editor.saveBtn.addEventListener('click', saveArticle);
        ui.editor.cancelBtn.addEventListener('click', closeEditor);
        ui.editor.deleteBtn.addEventListener('click', ()=> deleteArticle(appState.currentArticleId));

        ui.tagsInput.addEventListener('keydown', e=>{
            if(e.key === 'Enter'){ e.preventDefault(); createTagPill(ui.tagsInput.value); ui.tagsInput.value = ''; }
        });

        ui.tagsInputContainer.addEventListener('click', e=>{
            const btn = e.target.closest('button');
            if(btn && btn.parentElement) btn.parentElement.remove();
        });

        ui.confirmActionBtn.addEventListener('click', ()=>{
            confirmationCallback?.();
            ui.confirmationModal.style.display = 'none';
        });
        ui.confirmCancelBtn.addEventListener('click', ()=> ui.confirmationModal.style.display = 'none');

        ui.tagColorPalette.addEventListener('click', e=>{
            const btn = e.target.closest('button');
            if(!btn) return;
            ui.newTagColor.value = btn.dataset.color;
            ui.tagColorPalette.querySelectorAll('button').forEach(b=>b.classList.remove('ring-sky-500'));
            btn.classList.add('ring-sky-500');
        });

        if (ui.toggleSettings) ui.toggleSettings.addEventListener('click', () => ui.editorSettingsContent.classList.toggle('hidden'));

        initTagColorPalette();
        if(window.innerWidth >= 768) toggleSidebar(true);
        loadData();
    });

    // util: escape to prevent XSS in innerHTML writes
    function escapeHtml(str){
        if(!str) return '';
        return String(str).replace(/[&<>"'`]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;'}[s]));
    }
    function escapeAttr(str){ return escapeHtml(str).replace(/"/g, '&quot;'); }

</script>
</body>
</html>
